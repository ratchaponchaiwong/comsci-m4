<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cirkit Designer Lab | PROT Smart Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', sans-serif; background: #0f172a; color: white; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: rgba(0, 0, 0, 0.5); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 1.2rem; font-weight: 700; color: #60a5fa; text-decoration: none; }
        
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; width: 100%; flex: 1; display: grid; grid-template-columns: 1fr; gap: 25px; }
        
        /* สไตล์กล่องต่างๆ */
        .card { background: #1e293b; border-radius: 16px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        /* ส่วนแสดงโจทย์ */
        .task-header { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 20px; }
        .task-title { font-size: 1.5rem; color: #a78bfa; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .task-meta { display: flex; gap: 15px; font-size: 0.85rem; color: #94a3b8; }
        .task-desc { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; line-height: 1.6; font-size: 1.05rem; white-space: pre-wrap; margin-bottom: 20px; border-left: 4px solid #8b5cf6;}
        .task-image { max-width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.2); display: none; }
        
        /* ฟอร์มส่งงาน */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #60a5fa; font-weight: 500; }
        input, textarea { width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-family: 'Prompt'; }
        input:focus, textarea:focus { outline: none; border-color: #3b82f6; }
        
        .btn { background: #3b82f6; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-family: 'Prompt'; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 1rem; width: 100%; justify-content: center; transition: 0.2s;}
        .btn:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-purple { background: #8b5cf6; } .btn-purple:hover { background: #7c3aed; }
        
        /* Loading State */
        #loading-screen { text-align: center; padding: 50px; font-size: 1.2rem; color: #94a3b8; }
        #main-content { display: none; }
        
        @media (min-width: 900px) {
            .container { grid-template-columns: 1fr 1fr; } /* แบ่ง 2 คอลัมน์ ซ้ายโจทย์ ขวาส่งงาน */
        }
    </style>
</head>
<body>
    <header>
        <a href="student.html" class="logo"><i class="fas fa-arrow-left"></i> กลับห้องเรียน</a>
        <div id="user-info" style="font-size: 0.9rem; opacity: 0.8;"></div>
    </header>

    <div id="loading-screen"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>กำลังโหลดข้อมูลใบงาน...</div>

    <div class="container" id="main-content">
        
        <div class="card" style="height: fit-content;">
            <div class="task-header">
                <h2 class="task-title"><i class="fas fa-clipboard-list"></i> <span id="display-title">กำลังโหลด...</span></h2>
                <div class="task-meta">
                    <span><i class="fas fa-clock"></i> กำหนดส่ง: <span id="display-date">-</span></span>
                    <span><i class="fas fa-star" style="color: #fbbf24;"></i> <span id="display-points">-</span> คะแนน</span>
                </div>
            </div>
            
            <h4 style="margin-bottom: 10px; color: #cbd5e1;">คำสั่ง / รายละเอียดงาน:</h4>
            <div class="task-desc" id="display-desc"></div>
            <img id="display-img" class="task-image" src="" alt="ภาพประกอบโจทย์">
            
            <hr style="border-color: rgba(255,255,255,0.1); margin: 25px 0;">
            
            <h4 style="margin-bottom: 15px; color: #8b5cf6;"><i class="fas fa-tools"></i> พื้นที่ปฏิบัติงาน:</h4>
            <p style="font-size: 0.9rem; opacity: 0.8; margin-bottom: 15px; line-height: 1.5;">คลิกปุ่มด้านล่างเพื่อเปิดเว็บ Cirkit Designer หากครูมีต้นแบบให้ ให้กดทำสำเนา (Duplicate) ก่อนเริ่มทำงาน</p>
            <a href="https://app.cirkitdesigner.com/project/ed2a2132-5dc3-44d4-95e7-d4ec93fc3a73" id="cirkit-btn" target="_blank" class="btn btn-purple" style="text-decoration: none;">
                <i class="fas fa-external-link-alt"></i> เปิดเว็บไซต์ Cirkit Designer
            </a>
        </div>

        <div class="card" style="height: fit-content;">
            <h3 style="margin-bottom: 20px; color: #fff;"><i class="fas fa-paper-plane" style="color: #60a5fa;"></i> ส่งผลงาน</h3>
            
            <div class="form-group">
                <label><i class="fas fa-link"></i> ลิงก์โปรเจกต์ (Cirkit Designer URL)</label>
                <input type="text" id="cd-link" placeholder="วางลิงก์ผลงานที่แชร์แบบ Public ที่นี่...">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-code"></i> ซอร์สโค้ด (ถ้ามี)</label>
                <textarea id="cd-code" rows="12" placeholder="หากในวงจรมีการเขียนโค้ด (เช่น C++) ให้คัดลอกมาวางที่นี่เพื่อให้ครูตรวจง่ายขึ้น..."></textarea>
            </div>

            <button class="btn" id="btn-submit" onclick="submitCirkitWork()">
                <i class="fas fa-check-circle"></i> ยืนยันการส่งงาน
            </button>
        </div>

    </div>

    <script>
        // 🌟 ใส่ลิงก์ Google Script ของครูให้ตรงกัน 🌟
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby901YIN3KkAJXTItn_ySYqqecw4tT8rArbASqOa768Mpgah8XQjYX8jMVSj9w0VC6C/exec";
        
        const email = localStorage.getItem('student_email');
        const studentName = localStorage.getItem('student_name');
        const studentId = localStorage.getItem(email + '_studentid');
        const urlParams = new URLSearchParams(window.location.search);
        const actId = urlParams.get('actid'); 
        
        window.onload = async () => {
            if(!email) { alert("กรุณาล็อกอินก่อนครับ"); window.location.href = "index.html"; return; }
            if(!actId) { alert("ไม่พบรหัสกิจกรรม กรุณาเข้าผ่านหน้าห้องเรียนครับ"); window.location.href = "student.html"; return; }
            
            document.getElementById('user-info').innerHTML = `ผู้ใช้งาน: <b>${studentName}</b>`;
            await loadTaskData();
        };

        // ฟังก์ชันดึงข้อมูลโจทย์มาแสดง
        async function loadTaskData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=readAll&t=${Date.now()}`);
                const db = await res.json();
                
                const task = (db.activities || []).find(a => (a.ID || a.id) === actId);
                
                if (task) {
                    document.getElementById('display-title').innerText = task.Title || task.title;
                    document.getElementById('display-points').innerText = task.Points || task.points || '0';
                    document.getElementById('display-desc').innerText = task.Description || task.desc || 'ไม่มีคำอธิบายเพิ่มเติม';
                    
                    let dateStr = task.Date || task.date;
                    if(dateStr) {
                        let d = new Date(dateStr);
                        document.getElementById('display-date').innerText = !isNaN(d.getTime()) ? `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}` : dateStr.split('T')[0];
                    }

                    // ถ้าระบบครูแนบลิงก์รูปมาให้ ก็แสดงรูปด้วย
                    const imgLink = task.ImageLink || task.image_link;
                    if (imgLink && imgLink.trim() !== '') {
                        document.getElementById('display-img').src = imgLink;
                        document.getElementById('display-img').style.display = 'block';
                    }
                } else {
                    document.getElementById('display-title').innerText = "ไม่พบข้อมูลกิจกรรม";
                }
                
                // ปิดหน้าโหลด แสดงเนื้อหา
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'grid';
                
            } catch(e) {
                document.getElementById('loading-screen').innerHTML = '<span style="color:#ef4444;"><i class="fas fa-wifi"></i> เชื่อมต่อล้มเหลว กรุณารีเฟรชหน้าเว็บ</span>';
            }
        }

        // ฟังก์ชันส่งงาน
        async function submitCirkitWork() {
            const cdLink = document.getElementById('cd-link').value.trim();
            const cdCode = document.getElementById('cd-code').value.trim();

            if(!cdLink && !cdCode) { alert("⚠️ กรุณาวางลิงก์ผลงาน หรือ ซอร์สโค้ด อย่างใดอย่างหนึ่งเพื่อส่งงานครับ"); return; }

            const btn = document.getElementById('btn-submit');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...';
            btn.disabled = true;

            let combinedContent = `ลิงก์ผลงาน: ${cdLink || '-'}\n\n[ซอร์สโค้ด]\n${cdCode || '-'}`;

            const payload = {
                action: "submitWork",
                student_id: studentId,
                student_name: studentName,
                activity_id: actId,
                work_content: combinedContent
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("✅ ส่งงาน Cirkit Designer เรียบร้อยแล้ว!");
                window.location.href = "student.html"; 
            } catch(e) {
                alert("❌ เกิดข้อผิดพลาด ไม่สามารถส่งงานได้ กรุณาลองใหม่");
                btn.innerHTML = '<i class="fas fa-check-circle"></i> ยืนยันการส่งงาน';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
