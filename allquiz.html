<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>คลังข้อสอบ (Exam Bank) | PROT Smart Workspace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', sans-serif; background: #0f172a; color: white; min-height: 100vh; display: flex; flex-direction: column; }
        
        header { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(12px); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; color: transparent; text-decoration: none; }
        
        .page-content-wrapper { padding: 30px 20px; max-width: 1200px; margin: 0 auto; width: 100%; flex: 1; }
        .glass-card { background: rgba(255,255,255,0.05); border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        .tab-menu { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .tab-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px 25px; border-radius: 15px; color: inherit; cursor: pointer; font-family: 'Prompt'; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; box-shadow: 0 5px 15px rgba(59,130,246,0.3); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .exam-folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .exam-folder { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); border-radius: 20px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; border-top: 5px solid #3b82f6; }
        .exam-folder:hover { transform: translateY(-5px); background: rgba(59,130,246,0.2); }
        .folder-icon { font-size: 3rem; color: #60a5fa; margin-bottom: 15px; }

        .q-card { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 25px; margin-bottom: 20px; border-left: 5px solid #3b82f6; border: 1px solid rgba(255,255,255,0.05); }
        .options-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; list-style: none; }
        .opt-item { padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: flex-start; gap: 10px; }
        .opt-item.correct { background: rgba(16, 185, 129, 0.2); border-color: #10b981; color: #34d399; font-weight: bold; }
        .opt-img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.2); background: #000; }

        .create-q-card { background: rgba(0,0,0,0.2); padding: 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); border-left: 5px solid #10b981; position: relative;}
        .remove-q-btn { position: absolute; top: 15px; right: 15px; background: rgba(239,68,68,0.2); color: #ef4444; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: white; font-family: 'Prompt'; margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: #60a5fa; margin-bottom: 5px; font-weight: 600; }

        .btn-action { background: #3b82f6; color: white; padding: 12px 20px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: 'Prompt'; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-success { background: #10b981; } .btn-danger { background: #ef4444; } .btn-warning { background: #f59e0b; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #1e293b; padding: 35px; border-radius: 25px; width: 90%; max-width: 650px; border: 1px solid #3b82f6; max-height: 90vh; overflow-y: auto; position: relative; }
        
        footer { text-align: center; padding: 30px; opacity: 0.6; font-size: 0.85rem; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <header>
        <a href="teacher_dashboard.html" class="logo"><i class="fas fa-database"></i> <span>Exam Manager</span></a>
        <div class="user-info" id="loginArea">
            <i class="fas fa-spinner fa-spin"></i>
        </div>
    </header>

    <div class="page-content-wrapper">
        <div class="glass-card">
            <div class="tab-menu">
                <button class="tab-btn active" onclick="switchTab('tab-view', this)"><i class="fas fa-folder-open"></i> ดูคลังข้อสอบ</button>
                <button class="tab-btn" onclick="switchTab('tab-create', this)"><i class="fas fa-plus-circle"></i> สร้างชุดใหม่</button>
            </div>

            <div id="tab-view" class="tab-content active">
                <div id="view-covers">
                    <h2 style="color: #60a5fa; margin-bottom: 20px;"><i class="fas fa-archive"></i> เลือกแฟ้มชุดข้อสอบ</h2>
                    <button class="btn-action btn-success" onclick="fetchExamBank()"><i class="fas fa-sync"></i> โหลดข้อมูลล่าสุด</button>
                    <div id="loading" style="text-align: center; padding: 50px; display: none;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
                    <div id="folder-container" class="exam-folder-grid"></div>
                </div>

                <div id="view-questions" style="display: none;">
                    <button class="btn-action" onclick="backToCovers()" style="background: #475569; margin-bottom: 20px;"><i class="fas fa-arrow-left"></i> กลับไปหน้าแฟ้ม</button>
                    
                    <div id="q-list-title" style="margin-bottom: 20px;"></div>
                    
                    <div id="questions-container"></div>
                </div>
            </div>

            <div id="tab-create" class="tab-content">
                <h2 style="color: #10b981; margin-bottom: 20px;"><i class="fas fa-magic"></i> ตั้งค่าและสร้างข้อสอบใหม่</h2>
                
                <div style="background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px;">
                    <div class="form-grid">
                        <div class="form-group"><label>🔑 รหัสชุดข้อสอบ (ActID)</label><input type="text" id="c-actid" placeholder="เช่น FINAL_M4"></div>
                        <div class="form-group"><label>📝 ชื่อแบบทดสอบ</label><input type="text" id="c-title" placeholder="เช่น สอบปลายภาค"></div>
                        <div class="form-group"><label>🎲 จำนวนข้อที่จะสุ่มให้นักเรียน</label><input type="number" id="c-total-q" value="40"></div>
                        <div class="form-group"><label>🏆 คะแนนเต็ม</label><input type="number" id="c-total-score" value="20"></div>
                        <div class="form-group"><label>⏳ วันเวลาเปิดสอบ</label><input type="datetime-local" id="c-start"></div>
                        <div class="form-group"><label>⌛ วันเวลาปิดสอบ</label><input type="datetime-local" id="c-end"></div>
                    </div>
                </div>

                <div id="create-q-list"></div>

                <div style="text-align: center; margin: 30px 0;">
                    <button class="btn-action" onclick="addQuestionBox()" style="background: rgba(59,130,246,0.2); border: 2px dashed #3b82f6; padding: 15px 40px; border-radius: 50px;"><i class="fas fa-plus-circle"></i> เพิ่มข้อสอบทีละข้อ</button>
                </div>

                <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px; display: flex; justify-content: flex-end;">
                    <button class="btn-action btn-success" id="btn-save-exam" onclick="saveNewExam()" style="padding: 15px 50px; font-size: 1.1rem;"><i class="fas fa-cloud-upload-alt"></i> ยืนยันการบันทึกชุดข้อสอบลงระบบ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <button onclick="closeEditModal()" style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
            <h3 style="color:#f59e0b; margin-bottom:20px;"><i class="fas fa-edit"></i> แก้ไขข้อสอบแถวที่ <span id="edit-row-display"></span></h3>
            
            <input type="hidden" id="edit-row">
            <input type="hidden" id="edit-actid">
            
            <label>โจทย์คำถาม</label>
            <textarea id="edit-q" rows="3"></textarea>
            
            <label>ลิงก์รูปภาพประกอบ (ถ้ามี)</label>
            <input type="text" id="edit-media" placeholder="https://...">
            
            <label>ตัวเลือก (ถ้าเป็นลิงก์รูปใส่ http... ได้เลย / ถ้าเติมคำให้เว้นว่างช่องช้อยส์ไว้ทั้งหมด)</label>
            <div style="display:flex; gap:10px; margin-bottom:10px;"><b style="width:30px; padding-top:10px;">1)</b><input type="text" id="edit-opt1" style="margin:0;"></div>
            <div style="display:flex; gap:10px; margin-bottom:10px;"><b style="width:30px; padding-top:10px;">2)</b><input type="text" id="edit-opt2" style="margin:0;"></div>
            <div style="display:flex; gap:10px; margin-bottom:10px;"><b style="width:30px; padding-top:10px;">3)</b><input type="text" id="edit-opt3" style="margin:0;"></div>
            <div style="display:flex; gap:10px; margin-bottom:10px;"><b style="width:30px; padding-top:10px;">4)</b><input type="text" id="edit-opt4" style="margin:0;"></div>
            
            <div class="form-grid" style="margin-top:20px;">
                <div><label>✅ เฉลยที่ถูกต้อง (1-4 หรือ ข้อความ)</label><input type="text" id="edit-ans"></div>
                <div><label>🌟 คะแนนประจำข้อ</label><input type="number" id="edit-points"></div>
            </div>
            
            <button class="btn-action btn-success" id="btn-save-edit" onclick="saveEditedQuestion()" style="width:100%; padding:18px; margin-top:10px; border-radius: 50px;"><i class="fas fa-save"></i> บันทึกการแก้ไขทับข้อมูลเดิม</button>
        </div>
    </div>

    <footer><p>&copy; 2026 PROT Exam System | All Rights Reserved</p></footer>

    <script>
        // 🌟 ใส่ลิงก์เว็บแอพของครูตรงนี้ให้ตรงกันนะครับ 🌟
        const VALIDATOR_URL = "https://script.google.com/macros/s/AKfycbw9pnMjkHA9233qQERlcmHqrmsOjQMDSIUGybkEyKq0z64C-i1m5p5aVGm34-a1PuV-Xw/exec"; 
        
        let allQuestions = [];
        let groupedExams = {};

        window.onload = () => {
            const currentEmail = localStorage.getItem('student_email');
            const adminEmails = ['ratchapon@prot.ac.th', 'teacher@prot.ac.th', 'ratchaponchaiwong@gmail.com'];
            if (!currentEmail || !adminEmails.includes(currentEmail)) { window.location.href = "index.html"; return; }
            
            const pic = localStorage.getItem('student_pic') || "https://ui-avatars.com/api/?name=Admin";
            document.getElementById('loginArea').innerHTML = `<img src="${pic}" style="width:35px; border-radius:50%; border:2px solid #3b82f6;"> <span style="font-size:0.9rem; margin-left:10px;">แอดมิน ${localStorage.getItem('student_name')?.split(' ')[0] || ''}</span>`;
            
            fetchExamBank();
            addQuestionBox(); 
        };

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        async function fetchExamBank() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('folder-container').innerHTML = '';
            try {
                const res = await fetch(`${VALIDATOR_URL}?action=getAllExamsAdmin`);
                const result = await res.json();
                allQuestions = result.data || [];
                
                groupedExams = {};
                allQuestions.forEach(q => {
                    if(!groupedExams[q.actid]) groupedExams[q.actid] = [];
                    groupedExams[q.actid].push(q);
                });

                document.getElementById('loading').style.display = 'none';
                renderFolders();
            } catch (e) { alert("เชื่อมต่อผิดพลาด กรุณาลองใหม่"); }
        }

        function renderFolders() {
            const container = document.getElementById('folder-container');
            container.innerHTML = '';
            const ids = Object.keys(groupedExams).sort();
            
            if(ids.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; opacity:0.5; padding:50px;">--- ยังไม่มีข้อมูลในคลังข้อสอบ ---</div>';
                return;
            }

            ids.forEach(actid => {
                container.innerHTML += `
                    <div class="exam-folder" onclick="openFolder('${actid}')">
                        <i class="fas fa-folder-open folder-icon"></i>
                        <h3 style="color:white;">${actid}</h3>
                        <p style="opacity:0.7; margin-top:8px; font-size:0.9rem;">พบทั้งหมด ${groupedExams[actid].length} ข้อ</p>
                    </div>`;
            });
        }

        function openFolder(actid) {
            document.getElementById('view-covers').style.display = 'none';
            document.getElementById('view-questions').style.display = 'block';
            
            document.getElementById('q-list-title').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; border-bottom: 2px dashed #3b82f6; padding-bottom: 15px;">
                    <span style="color: #60a5fa; font-size: 1.5rem; font-weight:bold;">📂 ชุดข้อสอบ: ${actid}</span>
                    <button class="btn-action btn-danger" onclick="deleteExamSet('${actid}')" style="font-size:0.9rem; padding:10px 20px; border-radius: 30px;">
                        <i class="fas fa-trash-alt"></i> ลบแฟ้มนี้ทิ้งทั้งหมด
                    </button>
                </div>
            `;
            renderQuestionsList(groupedExams[actid]);
        }

        function backToCovers() {
            document.getElementById('view-questions').style.display = 'none';
            document.getElementById('view-covers').style.display = 'block';
        }

        // 🌟 แก้บั๊กตัวเลขในช้อยส์ทำระบบพัง (ใส่ String คลุมก่อนเสมอ) 🌟
        function formatOpt(text) {
            if(text === undefined || text === null || text === '') return '-';
            let strText = String(text).trim();
            if(strText.startsWith('http')) return `<img src="${strText}" class="opt-img">`;
            return strText;
        }

        function renderQuestionsList(qList) {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            qList.forEach((q, index) => {
                const ansKey = String(q.answer).trim(); 
                const isA = (ansKey === '1' || ansKey === 'a' || ansKey === 'ก') ? 'correct' : '';
                const isB = (ansKey === '2' || ansKey === 'b' || ansKey === 'ข') ? 'correct' : '';
                const isC = (ansKey === '3' || ansKey === 'c' || ansKey === 'ค') ? 'correct' : '';
                const isD = (ansKey === '4' || ansKey === 'd' || ansKey === 'ง') ? 'correct' : '';
                
                // แก้บั๊ก: ป้องกัน Error ถ่าช้อยส์ a เป็นตัวเลข
                const optAStr = (q.options.a === undefined || q.options.a === null) ? "" : String(q.options.a).trim();
                const isShort = (optAStr === "");

                container.innerHTML += `
                    <div class="q-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                            <b style="color:#60a5fa; font-size:1.1rem;">ข้อที่ ${index + 1}</b>
                            <span style="opacity:0.5; font-size:0.8rem;">แถวในชีต: ${q.row}</span>
                        </div>
                        <p style="margin-bottom:15px; font-weight:600;">${q.question}</p>
                        ${q.media ? `<img src="${q.media}" style="max-width:300px; border-radius:10px; margin-bottom:15px; border:1px solid #333;">` : ''}
                        
                        ${isShort ? 
                            `<div style="background:rgba(16,185,129,0.1); padding:15px; border-radius:12px; border:1px dashed #10b981;"><b>เฉลย (เติมคำ):</b> ${q.answer}</div>` : 
                            `<ul class="options-list">
                                <li class="opt-item ${isA}"><span>1)</span> <div>${formatOpt(q.options.a)}</div></li>
                                <li class="opt-item ${isB}"><span>2)</span> <div>${formatOpt(q.options.b)}</div></li>
                                <li class="opt-item ${isC}"><span>3)</span> <div>${formatOpt(q.options.c)}</div></li>
                                <li class="opt-item ${isD}"><span>4)</span> <div>${formatOpt(q.options.d)}</div></li>
                            </ul>`
                        }
                        
                        <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; display:flex; gap:10px; justify-content:flex-end;">
                            <button class="btn-action btn-warning" onclick='openEditModal(${JSON.stringify(q).replace(/'/g, "&apos;")})'><i class="fas fa-edit"></i> แก้ไข</button>
                            <button class="btn-action btn-danger" onclick="deleteSingle(${q.row})"><i class="fas fa-trash"></i> ลบ</button>
                        </div>
                    </div>`;
            });
        }

        async function deleteExamSet(actid) {
            if(!confirm(`⚠️ คำเตือนขั้นสูงสุด!\n\nคุณแน่ใจหรือไม่ที่จะลบชุดข้อสอบรหัส "${actid}" ทิ้ง "ทั้งแฟ้ม"?\n\nการกระทำนี้จะลบข้อสอบทุกข้อในชุดนี้ออกจากฐานข้อมูลแบบถาวรและไม่สามารถกู้คืนได้!`)) return;

            const btn = document.querySelector('#q-list-title .btn-danger');
            if(btn) {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังล้างข้อมูลทั้งแฟ้ม...';
                btn.disabled = true;
            }

            try {
                await fetch(VALIDATOR_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "deleteExamSet", actid: actid })
                });
                alert("✅ ลบชุดข้อสอบทั้งแฟ้มเรียบร้อยแล้ว!");
                fetchExamBank();
                backToCovers();
            } catch(e) {
                alert("❌ เกิดข้อผิดพลาดในการลบชุดข้อสอบ");
                if(btn) { btn.innerHTML = '<i class="fas fa-trash-alt"></i> ลบแฟ้มนี้ทิ้งทั้งหมด'; btn.disabled = false; }
            }
        }

        function openEditModal(q) {
            document.getElementById('edit-row').value = q.row;
            document.getElementById('edit-row-display').innerText = q.row;
            document.getElementById('edit-actid').value = q.actid;
            document.getElementById('edit-q').value = q.question;
            document.getElementById('edit-media').value = q.media || '';
            document.getElementById('edit-opt1').value = q.options.a || '';
            document.getElementById('edit-opt2').value = q.options.b || '';
            document.getElementById('edit-opt3').value = q.options.c || '';
            document.getElementById('edit-opt4').value = q.options.d || '';
            document.getElementById('edit-ans').value = q.answer;
            document.getElementById('edit-points').value = q.points || 1;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

        async function saveEditedQuestion() {
            const btn = document.getElementById('btn-save-edit');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...';
            btn.disabled = true;

            const payload = {
                action: "updateQuestion",
                row: document.getElementById('edit-row').value,
                question: document.getElementById('edit-q').value,
                media: document.getElementById('edit-media').value,
                opts: [document.getElementById('edit-opt1').value, document.getElementById('edit-opt2').value, document.getElementById('edit-opt3').value, document.getElementById('edit-opt4').value],
                answer: document.getElementById('edit-ans').value,
                points: document.getElementById('edit-points').value
            };

            try {
                await fetch(VALIDATOR_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("✅ บันทึกการแก้ไขสำเร็จ!");
                closeEditModal();
                fetchExamBank();
                setTimeout(() => backToCovers(), 500);
            } catch(e) { alert("ล้มเหลว"); btn.disabled = false; }
        }

        async function deleteSingle(row) {
            if(!confirm("⚠️ ยืนยันการลบข้อสอบแถวที่ " + row + " ใช่หรือไม่?")) return;
            try {
                await fetch(VALIDATOR_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "deleteQuestion", row: row }) });
                alert("✅ ลบข้อมูลสำเร็จ");
                fetchExamBank();
                setTimeout(() => backToCovers(), 500);
            } catch(e) { alert("ลบไม่สำเร็จ"); }
        }

        function addQuestionBox() {
            const list = document.getElementById('create-q-list');
            const qId = `qbox-${Date.now()}`;
            const div = document.createElement('div');
            div.className = 'create-q-card';
            div.id = qId;
            div.innerHTML = `
                <button class="remove-q-btn" onclick="document.getElementById('${qId}').remove()"><i class="fas fa-trash"></i></button>
                <label>โจทย์คำถาม</label><textarea class="q-input-text" rows="2" placeholder="ระบุคำถาม..."></textarea>
                <label>ลิงก์รูปโจทย์ (ถ้ามี)</label><input type="text" class="q-input-media" placeholder="https://...">
                <div class="form-grid">
                    <div><label>1)</label><input type="text" class="q-opt" placeholder="ตัวเลือก 1 หรือ ลิงก์รูป"></div>
                    <div><label>2)</label><input type="text" class="q-opt" placeholder="ตัวเลือก 2 หรือ ลิงก์รูป"></div>
                    <div><label>3)</label><input type="text" class="q-opt" placeholder="ตัวเลือก 3 หรือ ลิงก์รูป"></div>
                    <div><label>4)</label><input type="text" class="q-opt" placeholder="ตัวเลือก 4 หรือ ลิงก์รูป"></div>
                </div>
                <div class="form-grid" style="margin-top:10px; border-top:1px dashed rgba(255,255,255,0.2); padding-top:15px;">
                    <div><label>✅ เฉลย (1,2,3,4 หรือ คำตอบ)</label><input type="text" class="q-answer" placeholder="เช่น 1"></div>
                    <div><label>🌟 คะแนน</label><input type="number" class="q-points" value="1"></div>
                </div>`;
            list.appendChild(div);
        }

        async function saveNewExam() {
            const actid = document.getElementById('c-actid').value.trim();
            const title = document.getElementById('c-title').value.trim();
            if(!actid || !title) return alert("⚠️ กรุณาระบุรหัสชุดข้อสอบและชื่อชุดข้อสอบก่อนครับ");

            const payload = {
                action: "createExam",
                actid: actid,
                title: title,
                totalQuestions: document.getElementById('c-total-q').value,
                totalScore: document.getElementById('c-total-score').value,
                startTime: document.getElementById('c-start').value,
                endTime: document.getElementById('c-end').value,
                targetRoom: "ทุกห้อง",
                questions: []
            };

            const boxes = document.querySelectorAll('.create-q-card');
            boxes.forEach(box => {
                const optInputs = box.querySelectorAll('.q-opt');
                payload.questions.push({
                    question: box.querySelector('.q-input-text').value,
                    media: box.querySelector('.q-input-media').value,
                    opts: Array.from(optInputs).map(inp => inp.value.trim()),
                    answer: box.querySelector('.q-answer').value,
                    points: box.querySelector('.q-points').value || 1
                });
            });

            if(payload.questions.length === 0) return alert("❌ ยังไม่ได้เพิ่มข้อสอบเลยครับ");

            const btn = document.getElementById('btn-save-exam');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึกข้อมูลลงชีต...';
            btn.disabled = true;

            try {
                await fetch(VALIDATOR_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("✅ บันทึกชุดข้อสอบใหม่เรียบร้อยแล้ว!");
                location.reload();
            } catch(e) { alert("ผิดพลาด"); btn.disabled = false; }
        }
    </script>
