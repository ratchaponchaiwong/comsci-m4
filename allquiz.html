<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>คลังข้อสอบ (Exam Bank) | PROT Smart Workspace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', sans-serif; min-height: 100vh; display: flex; flex-direction: column; background: #0f172a; color: white; }
        header { background: rgba(0, 0, 0, 0.4); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .page-content-wrapper { padding: 30px 20px; max-width: 1200px; margin: 0 auto; width: 100%; flex: 1;}
        .glass-card { background: rgba(255,255,255,0.05); border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .tab-btn { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding: 12px 25px; border-radius: 15px; color: inherit; cursor: pointer; }
        .tab-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .btn-action { background: #3b82f6; color: white; padding: 10px 20px; border: none; border-radius: 12px; cursor: pointer; font-family: 'Prompt'; font-weight: bold;}
        .btn-success { background: #10b981; } .btn-danger { background: #ef4444; } .btn-warning { background: #f59e0b; }

        /* 🌟 สไตล์แฟ้มหน้าปก (Cover UI) 🌟 */
        .exam-folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px;}
        .exam-folder { background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(37,99,235,0.1)); border: 1px solid rgba(59,130,246,0.3); border-radius: 20px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; }
        .exam-folder:hover { transform: translateY(-5px); background: rgba(59,130,246,0.3); box-shadow: 0 10px 20px rgba(59,130,246,0.2); }
        .folder-icon { font-size: 3rem; color: #60a5fa; margin-bottom: 15px; }
        
        .q-card { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 20px; margin-bottom: 20px; border-left: 5px solid #3b82f6; border: 1px solid rgba(255,255,255,0.05); }
        .options-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; list-style: none;}
        .opt-item { padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .opt-item.correct { background: rgba(16, 185, 129, 0.2); border-color: #10b981; color: #34d399; font-weight: bold;}
        
        /* 🌟 สไตล์รูปภาพในช้อยส์ 🌟 */
        .opt-img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.2); background: #000; }

        /* Modal แก้ไข */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);}
        .modal-content { background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; border: 1px solid #3b82f6; position: relative;}
        
        input, select, textarea { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-family: 'Prompt'; margin-bottom: 10px;}
    </style>
</head>
<body>
    <header>
        <div style="font-weight: 800; font-size:1.5rem; color:#60a5fa;"><i class="fas fa-database"></i> Exam Manager</div>
        <div>
            <button class="btn-action" onclick="window.location.href='teacher_dashboard.html'"><i class="fas fa-arrow-left"></i> กลับ Admin</button>
        </div>
    </header>

    <div class="page-content-wrapper">
        <div class="glass-card">
            <div class="tab-menu">
                <button class="tab-btn active" onclick="switchTab('tab-view', this)"><i class="fas fa-folder-open"></i> คลังข้อสอบ (View)</button>
                <button class="tab-btn" onclick="switchTab('tab-create', this)"><i class="fas fa-plus-circle"></i> สร้างชุดใหม่ (Create)</button>
            </div>

            <div id="tab-view" class="tab-content active">
                
                <div id="view-covers">
                    <h2 style="color: #60a5fa; margin-bottom: 10px;"><i class="fas fa-archive"></i> หมวดหมู่ชุดข้อสอบ</h2>
                    <button class="btn-action btn-success" onclick="fetchExamBank()"><i class="fas fa-sync"></i> โหลดข้อมูลล่าสุด</button>
                    
                    <div id="loading" style="text-align: center; padding: 40px;"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>กำลังดึงข้อมูล...</div>
                    <div id="folder-container" class="exam-folder-grid"></div>
                </div>

                <div id="view-questions" style="display: none;">
                    <button class="btn-action" onclick="backToCovers()" style="margin-bottom: 20px; background: #475569;"><i class="fas fa-arrow-left"></i> กลับไปหน้าหมวดหมู่</button>
                    <h2 id="q-list-title" style="color: #10b981; margin-bottom: 20px;">ข้อสอบรหัส: -</h2>
                    <div id="questions-container"></div>
                </div>
            </div>

            <div id="tab-create" class="tab-content">
                <h2 style="color: #10b981; margin-bottom: 20px;"><i class="fas fa-magic"></i> สร้างชุดข้อสอบใหม่</h2>
                <p>*(ส่วนสร้างข้อสอบใช้โค้ด HTML เดิมได้เลยครับ)*</p>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <button onclick="document.getElementById('editModal').style.display='none'" style="position:absolute; top:15px; right:20px; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
            <h3 style="color:#f59e0b; margin-bottom:20px;"><i class="fas fa-edit"></i> แก้ไขข้อสอบ</h3>
            
            <input type="hidden" id="edit-row">
            <input type="hidden" id="edit-actid">
            
            <label>โจทย์ข้อสอบ</label>
            <textarea id="edit-q" rows="3"></textarea>
            
            <label>ลิงก์รูปโจทย์ (ถ้ามี)</label>
            <input type="text" id="edit-media">
            
            <label>ตัวเลือก (ถ้าเป็นรูปลิงก์ใส่ http... ได้เลย / ถ้าเติมคำเว้นว่างไว้)</label>
            <div style="display:flex; gap:10px;"><span style="width:30px; font-weight:bold;">1)</span><input type="text" id="edit-opt1"></div>
            <div style="display:flex; gap:10px;"><span style="width:30px; font-weight:bold;">2)</span><input type="text" id="edit-opt2"></div>
            <div style="display:flex; gap:10px;"><span style="width:30px; font-weight:bold;">3)</span><input type="text" id="edit-opt3"></div>
            <div style="display:flex; gap:10px;"><span style="width:30px; font-weight:bold;">4)</span><input type="text" id="edit-opt4"></div>
            
            <div style="display:flex; gap:15px; margin-top:15px;">
                <div style="flex:1;">
                    <label style="color:#10b981;">เฉลย (เลข 1-4)</label>
                    <select id="edit-ans"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select>
                </div>
                <div style="flex:1;">
                    <label style="color:#f59e0b;">คะแนน</label>
                    <input type="number" id="edit-points" value="1">
                </div>
            </div>
            
            <button class="btn-action btn-success" id="btn-save-edit" onclick="saveEditedQuestion()" style="width:100%; padding:15px; margin-top:20px;"><i class="fas fa-save"></i> บันทึกการแก้ไขทับข้อเดิม</button>
        </div>
    </div>

    <script>
        const VALIDATOR_URL = "https://script.google.com/macros/s/AKfycbw9pnMjkHA9233qQERlcmHqrmsOjQMDSIUGybkEyKq0z64C-i1m5p5aVGm34-a1PuV-Xw/exec"; 
        let allQuestions = [];
        let groupedExams = {};

        window.onload = () => { fetchExamBank(); };

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        async function fetchExamBank() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('folder-container').innerHTML = '';
            try {
                const res = await fetch(`${VALIDATOR_URL}?action=getAllExamsAdmin`);
                const result = await res.json();
                allQuestions = result.data || [];
                
                // จัดกลุ่มข้อสอบเป็นแฟ้ม (Group by ActID)
                groupedExams = {};
                allQuestions.forEach(q => {
                    if(!groupedExams[q.actid]) groupedExams[q.actid] = [];
                    groupedExams[q.actid].push(q);
                });

                document.getElementById('loading').style.display = 'none';
                renderFolders();
            } catch (e) { alert("เชื่อมต่อผิดพลาด"); }
        }

        // 🌟 1. ระบบวาดแฟ้มหน้าปก 🌟
        function renderFolders() {
            const container = document.getElementById('folder-container');
            container.innerHTML = '';
            
            for (let actid in groupedExams) {
                const qList = groupedExams[actid];
                container.innerHTML += `
                    <div class="exam-folder" onclick="openFolder('${actid}')">
                        <i class="fas fa-folder-open folder-icon"></i>
                        <h3>รหัส: ${actid}</h3>
                        <p style="opacity:0.8; margin-top:10px;">มีข้อสอบทั้งหมด ${qList.length} ข้อ</p>
                    </div>
                `;
            }
        }

        function openFolder(actid) {
            document.getElementById('view-covers').style.display = 'none';
            document.getElementById('view-questions').style.display = 'block';
            document.getElementById('q-list-title').innerText = `รายการข้อสอบ: ${actid} (${groupedExams[actid].length} ข้อ)`;
            renderQuestionsList(groupedExams[actid]);
        }

        function backToCovers() {
            document.getElementById('view-questions').style.display = 'none';
            document.getElementById('view-covers').style.display = 'block';
        }

        // 🌟 2. ระบบเช็ครูปภาพ และวาดข้อสอบ 🌟
        function formatOpt(text) {
            if(!text) return '-';
            // ถ้าช้อยส์ขึ้นต้นด้วย http ให้โชว์เป็นรูป
            if(text.trim().startsWith('http')) {
                return `<img src="${text}" class="opt-img">`;
            }
            return text;
        }

        function renderQuestionsList(qList) {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            qList.forEach((q, index) => {
                const ansKey = q.answer; 
                const isA = (ansKey === 'a' || ansKey === '1' || ansKey === 'ก') ? 'correct' : '';
                const isB = (ansKey === 'b' || ansKey === '2' || ansKey === 'ข') ? 'correct' : '';
                const isC = (ansKey === 'c' || ansKey === '3' || ansKey === 'ค') ? 'correct' : '';
                const isD = (ansKey === 'd' || ansKey === '4' || ansKey === 'ง') ? 'correct' : '';
                
                // ตรวจสอบว่าเป็นแบบ เติมคำตอบ หรือไม่ (ถ้าตัวเลือก a ว่าง = พิมพ์ตอบ)
                let isShortAnswer = (!q.options.a || q.options.a.trim() === "");

                let optionsHtml = '';
                if(isShortAnswer) {
                    optionsHtml = `<div style="background: rgba(16,185,129,0.1); padding: 15px; border-radius: 10px; border: 1px dashed #10b981; color: #34d399;"><b>คำตอบที่ถูกต้อง (เติมคำ):</b> ${q.answer}</div>`;
                } else {
                    optionsHtml = `
                    <ul class="options-list">
                        ${q.options.a ? `<li class="opt-item ${isA}"><span>1)</span> ${formatOpt(q.options.a)}</li>` : ''}
                        ${q.options.b ? `<li class="opt-item ${isB}"><span>2)</span> ${formatOpt(q.options.b)}</li>` : ''}
                        ${q.options.c ? `<li class="opt-item ${isC}"><span>3)</span> ${formatOpt(q.options.c)}</li>` : ''}
                        ${q.options.d ? `<li class="opt-item ${isD}"><span>4)</span> ${formatOpt(q.options.d)}</li>` : ''}
                    </ul>`;
                }

                container.innerHTML += `
                    <div class="q-card">
                        <div class="q-header">
                            <div class="q-title">${index + 1}. ${q.question}</div>
                            <div class="q-meta">แถวที่ ${q.row}</div>
                        </div>
                        ${q.media ? `<img src="${q.media}" style="max-width:200px; border-radius:10px; margin-bottom:10px;">` : ''}
                        ${optionsHtml}
                        
                        <div style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; text-align: right;">
                            <button class="btn-action btn-warning" style="padding: 6px 12px; font-size:0.85rem;" onclick='openEditModal(${JSON.stringify(q).replace(/'/g, "\\'")})'><i class="fas fa-edit"></i> แก้ไข</button>
                            <button class="btn-action btn-danger" style="padding: 6px 12px; font-size:0.85rem;" onclick="deleteSingle(${q.row})"><i class="fas fa-trash"></i> ลบ</button>
                        </div>
                    </div>
                `;
            });
        }

        // 🌟 3. ระบบแก้ไขแบบ Modal 🌟
        function openEditModal(q) {
            document.getElementById('edit-row').value = q.row;
            document.getElementById('edit-actid').value = q.actid;
            document.getElementById('edit-q').value = q.question;
            document.getElementById('edit-media').value = q.media || '';
            document.getElementById('edit-opt1').value = q.options.a || '';
            document.getElementById('edit-opt2').value = q.options.b || '';
            document.getElementById('edit-opt3').value = q.options.c || '';
            document.getElementById('edit-opt4').value = q.options.d || '';
            
            let ansVal = q.answer;
            if(ansVal === 'a' || ansVal === 'ก') ansVal = '1';
            if(ansVal === 'b' || ansVal === 'ข') ansVal = '2';
            if(ansVal === 'c' || ansVal === 'ค') ansVal = '3';
            if(ansVal === 'd' || ansVal === 'ง') ansVal = '4';
            document.getElementById('edit-ans').value = ansVal;
            
            document.getElementById('editModal').style.display = 'flex';
        }

        async function saveEditedQuestion() {
            const btn = document.getElementById('btn-save-edit');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...';
            btn.disabled = true;

            const payload = {
                action: "updateQuestion",
                row: document.getElementById('edit-row').value,
                actid: document.getElementById('edit-actid').value,
                question: document.getElementById('edit-q').value,
                media: document.getElementById('edit-media').value,
                opts: [
                    document.getElementById('edit-opt1').value,
                    document.getElementById('edit-opt2').value,
                    document.getElementById('edit-opt3').value,
                    document.getElementById('edit-opt4').value
                ],
                answer: document.getElementById('edit-ans').value,
                points: document.getElementById('edit-points').value
            };

            try {
                await fetch(VALIDATOR_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("✅ แก้ไขและบันทึกทับสำเร็จ!");
                document.getElementById('editModal').style.display = 'none';
                fetchExamBank(); // รีโหลดข้อมูลใหม่
                setTimeout(()=> backToCovers(), 500); // เด้งกลับหน้าปกเพื่อรีเซ็ต
            } catch(e) {
                alert("❌ บันทึกไม่สำเร็จ");
            } finally {
                btn.innerHTML = '<i class="fas fa-save"></i> บันทึกการแก้ไขทับข้อเดิม';
                btn.disabled = false;
            }
        }

        async function deleteSingle(row) {
            if(!confirm("⚠️ ยืนยันการลบข้อสอบแถวที่ " + row + " ใช่หรือไม่?")) return;
            try {
                await fetch(VALIDATOR_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "deleteQuestion", row: row }) });
                alert("✅ ลบสำเร็จ");
                fetchExamBank();
                setTimeout(()=> backToCovers(), 500);
            } catch(e) { alert("ลบไม่สำเร็จ"); }
        }
    </script>
</body>
</html>
