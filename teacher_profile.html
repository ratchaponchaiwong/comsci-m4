<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลผู้สอน | PROT Smart Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; min-height: 100vh; color: white; }
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); }
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .circle { position: absolute; border-radius: 50%; animation: float 20s infinite ease-in-out; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0) 70%); }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-30px) scale(1.05); } }
        .circle:nth-child(1) { width: 400px; height: 400px; top: -100px; left: -100px; animation-duration: 25s; }
        
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(59,130,246,0.3); }
        .logo { font-size: 1.5rem; font-weight: 700; color: #60a5fa; text-decoration: none; display: flex; align-items: center; gap: 10px;}
        .nav-links { display: flex; gap: 20px; list-style: none; align-items: center; }
        .nav-links a { text-decoration: none; color: #e2e8f0; font-weight: 500; transition: 0.3s; padding: 8px 15px; border-radius: 30px; }
        .nav-links a:hover, .nav-links a.active { color: #60a5fa; background: rgba(59,130,246,0.1); }
        
        .container { max-width: 800px; margin: 40px auto; padding: 20px; text-align: center; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-radius: 20px; padding: 40px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .profile-img { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border: 4px solid #60a5fa; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(59,130,246,0.4); }
        .bio-text { font-size: 1rem; line-height: 1.8; color: #cbd5e1; white-space: pre-wrap; margin-bottom: 30px; text-align: left; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; }
        .yt-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .yt-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body data-theme="default">
    <div class="bg-animation"><div class="circle"></div><div class="circle"></div></div>
    
    <header>
        <a href="index.html" class="logo"><i class="fas fa-robot"></i> PROT Smart Workspace</a>
        <ul class="nav-links">
            <li><a href="index.html">หน้าหลัก</a></li>
            <li><a href="student.html">ห้องเรียนของฉัน</a></li>
            <li><a href="teacher_profile.html" class="active">ข้อมูลผู้สอน</a></li>
            <li><a href="student_portfolio.html">ผลงานนักเรียน</a></li>
        </ul>
    </header>

    <div class="container">
        <div id="loading" style="font-size: 1.2rem; color: #60a5fa;"><i class="fas fa-spinner fa-spin"></i> กำลังโหลดข้อมูลครูผู้สอน...</div>
        <div id="content" style="display: none;"></div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby901YIN3KkAJXTItn_ySYqqecw4tT8rArbASqOa768Mpgah8XQjYX8jMVSj9w0VC6C/exec";
        
        window.onload = async () => {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL + "?action=getCMS&t=" + Date.now());
                const data = await res.json();
                const t = data.teacher || {};
                
                const name = t.name || 'ยังไม่ระบุชื่อครูผู้สอน';
                const img = t.img || 'https://ui-avatars.com/api/?name=Teacher&background=3b82f6&color=fff';
                const bio = t.bio || 'ยังไม่ได้เพิ่มประวัติหรือข้อมูลส่วนตัว';
                
                let ytHtml = '';
                if(t.yt) {
                    let ytUrl = t.yt.replace("watch?v=", "embed/").split("&")[0];
                    ytHtml = `<h3 style="color:#60a5fa; margin-bottom:15px; text-align:left;"><i class="fab fa-youtube"></i> วิดีโอแนะนำตัว/รายวิชา</h3>
                              <div class="yt-container"><iframe src="${ytUrl}" allowfullscreen></iframe></div>`;
                }

                document.getElementById('content').innerHTML = `
                    <div class="glass-card">
                        <img src="${img}" class="profile-img" alt="Teacher">
                        <h2 style="color: #60a5fa; font-size: 2rem; margin-bottom: 20px;">${name}</h2>
                        <div class="bio-text">${bio}</div>
                        ${ytHtml}
                    </div>
                `;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch(e) {
                document.getElementById('loading').innerHTML = '<span style="color:#ef4444;">⚠️ ไม่สามารถดึงข้อมูลได้ในขณะนี้</span>';
            }
        };
    </script>
</body>
</html>
