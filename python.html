<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ห้องเรียนของฉัน | PROT Smart Workspace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* CSS หลักคงเดิมทั้งหมดเพื่อให้ธีมไม่เพี้ยน */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; overflow-x: hidden; cursor: default; }
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); color: white; }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff 0%, #e0f0ff 50%, #f0f8ff 100%); color: #1e293b; }
        body[data-theme="forest"] { background: linear-gradient(135deg, #1a3c1a 0%, #2d5a2d 50%, #3e7a3e 100%); color: white; }
        body[data-theme="halloween"] { background: linear-gradient(135deg, #1a0b1a 0%, #2d1a2d 50%, #401040 100%); color: white; }
        body[data-theme="love"] { background: linear-gradient(135deg, #ffb7c5 0%, #ff9eb0 50%, #ff85a0 100%); color: #1e293b; }
        
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .bg-animation .circle { position: absolute; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0) 70%); border-radius: 50%; animation: float 20s infinite ease-in-out; }
        
        .content-layer { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(59,130,246,0.3); }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; color: transparent; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { text-decoration: none; color: inherit; padding: 8px 12px; border-radius: 30px; transition: 0.3s; }
        .nav-links a.active { color: #60a5fa; background: rgba(96,165,250,0.1); }
        
        .dashboard-container { display: grid; grid-template-columns: 320px 1fr; gap: 30px; max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); padding: 30px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.1); color: inherit; }
        
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 15px; border: 3px solid #60a5fa; display: none; object-fit: cover;}
        .task-card { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin-bottom: 8px; display: inline-block; }
        .badge.pending { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .badge.submitted { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .badge.done { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        
        .btn-action { background: #3b82f6; color: white; padding: 8px 20px; border-radius: 30px; text-decoration: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.2s;}
        .btn-action:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-edit { background: #f59e0b; }
        .btn-locked { background: #64748b; cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body data-theme="default">
    <div class="bg-animation"><div class="circle"></div><div class="circle"></div></div>
    <div class="content-layer">
        <header>
            <a href="index.html" class="logo"><i class="fas fa-robot"></i><span>Smart Workspace</span></a>
            <ul class="nav-links">
                <li><a href="index.html">หน้าหลัก</a></li>
                <li><a href="student.html" class="active">ห้องเรียน</a></li>
                <li><a href="teacher_profile.html">ข้อมูลผู้สอน</a></li>
            </ul>
        </header>

        <div class="page-content-wrapper">
            <div class="dashboard-container">
                <div class="glass-card">
                    <img src="" id="profile-pic" class="profile-pic">
                    <h3 id="profile-name">นักเรียน</h3>
                    <p id="profile-email" style="font-size:0.8rem; opacity:0.7; margin-bottom:15px;"></p>
                    <button class="btn-action" style="width:100%" onclick="location.href='index.html'">ออกจากระบบ</button>
                </div>

                <div class="content-area">
                    <h2 style="margin-bottom:20px;"><i class="fas fa-book-open"></i> บทเรียนและภารกิจ</h2>
                    <div id="dynamic-modules-container">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadStudentData() {
            const email = localStorage.getItem('student_email');
            const name = localStorage.getItem('student_name');
            const pic = localStorage.getItem('student_pic');

            if (!email) { window.location.href = 'index.html'; return; }

            document.getElementById('profile-name').innerText = name;
            document.getElementById('profile-email').innerText = email;
            if(pic) {
                const img = document.getElementById('profile-pic');
                img.src = pic; img.style.display = 'block';
            }

            loadActivities(email);
        }

        function loadActivities(email) {
            const container = document.getElementById('dynamic-modules-container');
            const activities = JSON.parse(localStorage.getItem('global_activities') || '[]');
            
            if(activities.length === 0) {
                container.innerHTML = '<p style="opacity:0.5; text-align:center;">ยังไม่มีบทเรียนที่เปิดสอน</p>';
                return;
            }

            container.innerHTML = '';
            activities.forEach(act => {
                const status = localStorage.getItem(email + '_act_' + act.id + '_status') || 'pending';
                const now = new Date();
                const deadline = new Date(act.date + ' ' + (act.time || '23:59'));
                const isPastDeadline = now > deadline;

                let badge = '<span class="badge pending">⏳ ค้างส่ง</span>';
                let actionBtn = `<a href="${act.link}?actid=${act.id}" class="btn-action">ทำกิจกรรม <i class="fas fa-arrow-right"></i></a>`;

                if (status === 'graded') {
                    badge = '<span class="badge done">⭐ ตรวจแล้ว</span>';
                    actionBtn = '<span style="font-size:0.8rem; opacity:0.6;"><i class="fas fa-lock"></i> ปิดการแก้ไขแล้ว</span>';
                } else if (status === 'submitted') {
                    badge = '<span class="badge submitted">✅ ส่งแล้ว (รอตรวจ)</span>';
                    // ถ้ายังไม่ตรวจ หรือ ยังไม่หมดเวลา ให้กดแก้ไขได้
                    if(!isPastDeadline) {
                        actionBtn = `<a href="${act.link}?actid=${act.id}" class="btn-action btn-edit">✏️ แก้ไขงาน</a>`;
                    } else {
                        actionBtn = '<span style="font-size:0.8rem; opacity:0.6;"><i class="fas fa-history"></i> เลยกำหนดแก้ไข</span>';
                    }
                } else if (isPastDeadline && act.strict) {
                    badge = '<span class="badge" style="background:rgba(239,68,68,0.2); color:#ef4444;">❌ ปิดรับงาน</span>';
                    actionBtn = '<button class="btn-action btn-locked" disabled>ส่งงานไม่ทัน</button>';
                }

                container.innerHTML += `
                    <div class="task-card">
                        <div>
                            <h4>${act.title}</h4>
                            <p style="font-size:0.85rem; opacity:0.8;">${act.desc}</p>
                            <small style="color:#60a5fa;">กำหนดส่ง: ${act.date} ${act.time || ''}</small>
                        </div>
                        <div style="text-align:right">
                            ${badge}<br>${actionBtn}
                        </div>
                    </div>
                `;
            });
        }

        window.onload = () => {
            const theme = localStorage.getItem('smart_theme') || 'default';
            document.body.setAttribute('data-theme', theme);
            loadStudentData();
        };
    </script>
</body>
</html>
