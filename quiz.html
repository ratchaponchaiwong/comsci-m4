<head>

    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        /* ==================== 1. CSS ดึงมาจาก template.html ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; overflow-x: hidden; position: relative; }
        
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); color: white; }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff 0%, #e0f0ff 50%, #f0f8ff 100%); color: #1e293b; }
        body[data-theme="forest"] { background: linear-gradient(135deg, #1a3c1a 0%, #2d5a2d 50%, #3e7a3e 100%); color: white; }
        body[data-theme="halloween"] { background: linear-gradient(135deg, #1a0b1a 0%, #2d1a2d 50%, #401040 100%); color: white; }
        body[data-theme="love"] { background: linear-gradient(135deg, #ffb7c5 0%, #ff9eb0 50%, #ff85a0 100%); color: #1e293b; }
        
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .bg-animation .circle { position: absolute; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0) 70%); border-radius: 50%; animation: float 20s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0) translateX(0) scale(1); } 25% { transform: translateY(-30px) translateX(20px) scale(1.05); } 75% { transform: translateY(30px) translateX(-20px) scale(0.95); } }
        
        .content-layer { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(59,130,246,0.3); }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; display: flex; align-items: center; gap: 12px;}

        /* ==================== 2. CSS เฉพาะส่วนของ Quiz & Anti-Cheat ==================== */
        .page-content-wrapper { padding: 40px 20px; max-width: 800px; margin: 0 auto; width: 100%; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(16px); border-radius: 24px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.2); margin-bottom: 20px; }
        body[data-theme="snow"] .glass-card, body[data-theme="love"] .glass-card { background: rgba(255, 255, 255, 0.8); color: #1e293b; border-color: rgba(0,0,0,0.1); }
        
        .qcard { margin-top: 15px; padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); }
        .option { padding: 12px 15px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1); margin-top: 10px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: rgba(59,130,246,0.2); border-color: #3b82f6; }
        .option.selected { background: #3b82f6; color: white; border-color: #60a5fa; font-weight: 600; }
        .option-label { font-weight: 800; margin-right: 10px; color: #ff6600; }

        .watermark-container { position: fixed; inset:0; pointer-events:none; z-index:9999; display:grid; grid-template-columns:repeat(3, 1fr); opacity:0.08; }
        .watermark-item { transform:rotate(-30deg); display:flex; align-items:center; justify-content:center; white-space:nowrap; font-size:1rem; }
        
        #split-warning { position:fixed; inset:0; z-index:10002; background:rgba(0,0,0,0.95); color:white; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        body.lost-focus { filter: blur(30px) grayscale(1); }

        .btn-main { background: linear-gradient(135deg, #3b82f6, #2563eb); border: none; padding: 15px 30px; border-radius: 50px; color: white; font-weight: 700; cursor: pointer; width: 100%; font-family: 'Prompt'; }
        .progress-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.9); padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; z-index: 1000; border-top: 2px solid #3b82f6; }
        .dot { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #666; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; background: #222; color: #ccc;}
        .dot.active { background: #3b82f6; color: white; border-color: #fff; }

</head>

          { "id": 93, "question": "หากยังไม่พร้อมติดตั้ง Node-RED ควรเริ่มจากอะไร", "options": ["เปลี่ยนสายไฟทั้งหมด", "ทดลองตัวอย่างออนไลน์", "อัปเกรดจอภาพ", "ติดตั้งโปรแกรมตัดต่อวิดีโอ"] },
          { "id": 94, "question": "Flow ใน Node-RED หมายถึงอะไร", "options": ["ชนิดของเซนเซอร์", "ชนิดของมอเตอร์", "ลำดับการเชื่อมต่อของโหนดและข้อมูล", "ชนิดแบตเตอรี่"] },
          { "id": 95, "question": "Node-RED ช่วยให้ทำสิ่งใดง่ายขึ้น", "options": ["เชื่อมอุปกรณ์และข้อมูลเข้าด้วยกัน", "เพิ่มแรงบิดมอเตอร์", "ไม่ต้องต่อสายเลย", "ไม่ต้องเขียนโค้ดทุกกรณี"] },
          { "id": 96, "question": "การจับคู่ใดถูกต้อง", "options": ["DHT + ESP = แสดงผล", "Node.js = เซนเซอร์", "ESP-NOW = โปรแกรมกราฟิก", "DHT + ESP = อ่านค่า / Node-RED = แสดงผล"] },
          { "id": 97, "question": "เหตุผลที่ตัวอย่างโปรเจกต์ช่วยเรียนรู้ได้ดีคือข้อใด", "options": ["ไม่ต้องใช้ไฟฟ้า", "เห็นภาพการเชื่อมต่อและผลลัพธ์เร็ว", "ไม่ต้องมีอุปกรณ์เลย", "ไม่ต้องใช้เวลา"] },
          { "id": 98, "question": "แนวคิดขยายระบบได้ของ ESP-NOW คือข้อใด", "options": ["ลดจำนวนบอร์ดเป็นศูนย์", "ใช้บอร์ดเดียวแทนทุกอย่าง", "เพิ่มจำนวนบอร์ดให้สื่อสารได้หลายตัว", "ปิดการสื่อสาร"] },
          { "id": 99, "question": "บทบาทการสื่อสารในระบบหุ่นยนต์และ IoT คือข้อใด", "options": ["ทำให้อุปกรณ์แลกเปลี่ยนข้อมูลและควบคุมกันได้", "ทำให้มอเตอร์หมุนโดยไม่ใช้ไฟ", "ทำให้เซนเซอร์ไม่ต้องต่อ", "ทำให้โปรแกรมไม่มีเงื่อนไข"] },
          { "id": 100, "question": "ตัวย่อใดมักใช้ร่วมกับคำว่า Broker", "options": ["GPS", "PWM", "I2C", "MQTT"] }
        ];

        // 3. ระบบ Anti-Cheat & IP
        async function getIP() { try { const r = await fetch('https://api64.ipify.org?format=json'); const d = await r.json(); userIP = d.ip; } catch(e) { userIP = "unknown"; } }

        async function banUser(reason) {
            if(examFinished || !examStarted) return;
            examFinished = true; clearInterval(timer);
            const studentId = localStorage.getItem(localStorage.getItem('student_email') + '_studentid');
            await fetch(VALIDATOR_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action:"reportViolation", student_id: studentId, ip: userIP, name: localStorage.getItem('student_name'), reason: reason })
            });
            alert("🚨 ตรวจพบการทุจริต: " + reason + "\nระบบระงับสิทธิ์การสอบของคุณทันที!");
            window.location.href = "student.html";
        }

        // 4. ระบบ Theme & Particles (จาก template.html)
        const themes = {
            default: { char: "✨", color: "rgba(59,130,246,0.6)" },
            snow: { char: "❄️", color: "rgba(255,255,255,0.7)" },
            forest: { char: "🍃", color: "rgba(144,238,144,0.6)" },
            halloween: { char: "🎃", color: "rgba(255,69,0,0.5)" },
            love: { char: "🌸", color: "rgba(255,105,180,0.6)" }
        };

        function startThemeParticles(themeKey) {
            const container = document.getElementById("particleContainer");
            container.innerHTML = "";
            const themeData = themes[themeKey];
            function createParticle() {
                const p = document.createElement("div");
                p.style.position = "absolute"; p.style.left = Math.random() * 100 + "%";
                p.style.top = "110%"; p.style.fontSize = (Math.random() * 20 + 15) + "px";
                p.style.opacity = Math.random() * 0.6 + 0.3; p.style.transition = "10s linear";
                p.innerHTML = themeData.char; container.appendChild(p);
                setTimeout(() => { p.style.top = "-10%"; p.style.opacity = "0"; }, 100);
                setTimeout(() => p.remove(), 10000);
            }
            setInterval(createParticle, 1000);
        }

        // 5. ลอจิกการสอบ
        function startExam() {
            if(!confirm("เมื่อเริ่มแล้ว ห้ามออกจากหน้าจอ ห้ามแบ่งหน้าจอ มิฉะนั้นจะถูกระงับสิทธิ์ทันที ตกลงหรือไม่?")) return;
            document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('screenStart').style.display = 'none';
            document.getElementById('screenExam').style.display = 'block';
            document.getElementById('progressBar').style.display = 'flex';
            
            drawnQuestions = questionBank.sort(() => 0.5 - Math.random()).slice(0, 40);
            answers = new Array(40).fill(null);
            
            renderQuestions();
            renderDots();
            
            examStarted = true;
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timerDisplay').innerText = new Date(timeLeft * 1000).toISOString().substr(11, 8);
                if(timeLeft <= 0) submitExam("timeout");
            }, 1000);

            // Proctoring Events
            window.onblur = () => { if(!examFinished) banUser("สลับหน้าต่าง/แคปหน้าจอ"); };
            window.onresize = () => { if(window.innerHeight < screen.height * 0.7) document.getElementById('split-warning').style.display='flex'; };
        }

        function renderQuestions() {
            const container = document.getElementById('questionContainer');
            const letters = ['a','b','c','d'];
            drawnQuestions.forEach((q, idx) => {
                const div = document.createElement('div'); div.className = 'qcard';
                div.innerHTML = `<p><b>ข้อที่ ${idx+1}:</b> ${q.question}</p><div class="options"></div>`;
                q.options.forEach((opt, i) => {
                    const op = document.createElement('div'); op.className = 'option';
                    op.innerHTML = `<span class="option-label">${letters[i]})</span> ${opt}`;
                    op.onclick = () => {
                        [...div.querySelectorAll('.option')].forEach(x => x.classList.remove('selected'));
                        op.classList.add('selected'); answers[idx] = letters[i];
                        document.getElementById('progressBar').children[idx].classList.add('active');
                    };
                    div.querySelector('.options').appendChild(op);
                });
                container.appendChild(div);
            });
        }

        function renderDots() {
            const pb = document.getElementById('progressBar');
            for(let i=0; i<40; i++) { const d = document.createElement('div'); d.className='dot'; d.innerText=i+1; pb.appendChild(d); }
        }

        async function submitExam(type="manual") {
            examFinished = true; clearInterval(timer);
            document.getElementById('btnSubmit').disabled = true;
            document.getElementById('btnSubmit').innerText = "กำลังตรวจคำตอบ...";

            const submissionData = drawnQuestions.map((q, i) => ({ id: String(q.id), ans: answers[i] }));
            
            try {
                // ขั้นตอน 1: ตรวจหลังบ้านเอาคะแนนจริง
                const resp = await fetch(VALIDATOR_URL, { method: 'POST', body: JSON.stringify({ action: "evaluate", answers: submissionData }) });
                const result = await resp.json();

                // ขั้นตอน 2: บันทึกลง Google Sheet หลัก (Submissions)
                const email = localStorage.getItem('student_email');
                const studentId = localStorage.getItem(email + '_studentid');
                const actId = new URLSearchParams(window.location.search).get('actid') || "FINAL_EXAM";
                const logText = `📊 สอบออนไลน์: ถูก ${result.correct}/40 | คะแนนสุทธิ: ${result.finalScore}/20`;

                await fetch(MAIN_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "submitWork", student_id: studentId, activity_id: actId, work_content: logText }) });
                await fetch(MAIN_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "saveScore", student_id: studentId, activity_id: actId, score: result.finalScore }) });

                // แสดงผล
                document.getElementById('screenExam').style.display = 'none';
                document.getElementById('progressBar').style.display = 'none';
                document.getElementById('screenResult').style.display = 'block';
                document.getElementById('rScore').innerText = result.finalScore + " / 20";
                document.getElementById('rDetail').innerText = `ตอบถูก ${result.correct} ข้อ จากทั้งหมด ${result.total} ข้อ`;

            } catch(e) { alert("การเชื่อมต่อล้มเหลว ระบบจะพยายามส่งข้อมูลซ้ำในหน้าถัดไป"); }
        }

        function confirmSubmit() { if(confirm("มั่นใจแล้วใช่ไหมที่จะส่งคำตอบ?")) submitExam(); }

        window.onload = async () => {
            await getIP();
            const savedTheme = localStorage.getItem('smart_theme') || "default";
            document.body.setAttribute("data-theme", savedTheme);
            startThemeParticles(savedTheme);
            
            const email = localStorage.getItem('student_email');
            if(!email) { alert("กรุณาเข้าสู่ระบบก่อน!"); window.location.href="student.html"; return; }
            document.getElementById('uName').innerText = "ผู้สอบ: " + localStorage.getItem('student_name');
            document.getElementById('uId').innerText = "รหัส: " + (localStorage.getItem(email + '_studentid') || "ยังไม่ได้ระบุ");

            // เช็คแบนจาก Blacklist
            const sid = localStorage.getItem(email + '_studentid');
            const check = await fetch(`${VALIDATOR_URL}?action=checkBanStatus&id=${sid}&ip=${userIP}`);
            const res = await check.json();
            if(res.banned) {
                document.body.innerHTML = "<div style='height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#fee2e2; text-align:center; color:red; font-family:Prompt;'><h1>❌ คุณถูกระงับสิทธิ์การสอบ</h1><p>เหตุผล: "+res.reason+"</p><button onclick='window.location.href=\"student.html\"' style='margin-top:20px; padding:10px 20px; border-radius:30px; border:none; background:red; color:white; font-weight:bold;'>กลับหน้าหลัก</button></div>";
            }
        };
    </script>
</body>
