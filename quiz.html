<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>แบบทดสอบออนไลน์ | PROT Smart Workspace</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ==================== 1. CSS ธีมหลักจาก template.html ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; overflow-x: hidden; position: relative; }
        
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); color: white; }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff 0%, #e0f0ff 50%, #f0f8ff 100%); color: #1e293b; }
        body[data-theme="forest"] { background: linear-gradient(135deg, #1a3c1a 0%, #2d5a2d 50%, #3e7a3e 100%); color: white; }
        body[data-theme="halloween"] { background: linear-gradient(135deg, #1a0b1a 0%, #2d1a2d 50%, #401040 100%); color: white; }
        body[data-theme="love"] { background: linear-gradient(135deg, #ffb7c5 0%, #ff9eb0 50%, #ff85a0 100%); color: #1e293b; }
        
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .bg-animation .circle { position: absolute; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0) 70%); border-radius: 50%; animation: float 20s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0) translateX(0) scale(1); } 25% { transform: translateY(-30px) translateX(20px) scale(1.05); } 75% { transform: translateY(30px) translateX(-20px) scale(0.95); } }

        /* ==================== 2. CSS ระบบคุมสอบ ==================== */
        .page-content-wrapper { padding: 40px 20px; max-width: 850px; margin: 0 auto; position: relative; z-index: 10; }
        .qcard { margin-top: 20px; padding: 30px; border-radius: 24px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(15px); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        body[data-theme="snow"] .qcard, body[data-theme="love"] .qcard { background: rgba(255, 255, 255, 0.9); color: #1e293b; border-color: rgba(0,0,0,0.1); }
        
        .option { padding: 15px 20px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.1); margin-top: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px;}
        body[data-theme="snow"] .option, body[data-theme="love"] .option { border-color: #e2e8f0; }
        .option:hover { background: rgba(59, 130, 246, 0.15); border-color: #3b82f6; }
        .option.selected { background: #3b82f6 !important; color: white !important; border-color: #60a5fa; box-shadow: 0 5px 15px rgba(59,130,246,0.4); }
        .option-label { font-weight: 800; color: #ff6600; width: 25px; }

        .watermark-container { position: fixed; inset:0; pointer-events:none; z-index:9999; display:grid; grid-template-columns:repeat(3, 1fr); opacity:0.06; }
        .watermark-item { transform:rotate(-30deg); display:flex; align-items:center; justify-content:center; white-space:nowrap; font-size:1.1rem; font-weight: bold; }
        
        body.lost-focus { filter: blur(40px) grayscale(1) !important; transition: 0.3s; }
        #split-warning { position:fixed; inset:0; z-index:10002; background:rgba(15, 23, 42, 0.98); color:white; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        
        .btn-start { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border: none; padding: 20px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.2rem; transition: 0.3s; box-shadow: 0 10px 20px rgba(59,130,246,0.3); }
        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(59,130,246,0.4); }
        
        .progress-indicator { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.9); padding: 10px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; z-index: 1000; border-top: 2px solid #3b82f6; backdrop-filter: blur(10px); }
        .dot { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; background: #1a1a1a; color: #888; cursor: pointer;}
        .dot.active { background: #3b82f6; color: white; border-color: #fff; box-shadow: 0 0 10px rgba(59,130,246,0.5); }
    </style>
</head>
<body data-theme="default">
    <div class="bg-animation">
        <div class="circle" style="width:400px; height:400px; top:-100px; left:-100px;"></div>
        <div class="circle" style="width:600px; height:600px; bottom:-200px; right:-100px;"></div>
    </div>
    <div id="particleContainer" style="position: fixed; inset:0; pointer-events: none; z-index: 1;"></div>
    <div id="watermark" class="watermark-container"></div>
    <div id="split-warning">
        <i class="fas fa-expand fa-4x" style="color:red; margin-bottom:20px;"></i>
        <h2>⚠️ ตรวจพบการพยายามโกง!</h2>
        <p>ระบบไม่อนุญาตให้แบ่งหน้าจอหรือใช้โหมดหน้าต่างเล็ก กรุณาขยายหน้าจอให้เต็ม</p>
    </div>

    <div class="content-layer">
        <header style="background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); padding: 16px 40px; display: flex; justify-content: space-between; align-items:center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(59,130,246,0.3);">
            <div style="font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; color: transparent; display: flex; align-items: center; gap: 12px;">
                <i class="fas fa-robot"></i> PROT EXAM
            </div>
            <div id="timerDisplay" style="font-weight: bold; color: #ff6600; font-size: 1.3rem; background: rgba(0,0,0,0.3); padding: 5px 20px; border-radius: 30px; border: 1px solid rgba(255,102,0,0.3);">00:40:00</div>
        </header>

        <div class="page-content-wrapper">
            <div class="qcard" id="screenStart" style="text-align: center;">
                <h1 style="margin-bottom: 10px; color: #60a5fa;"><i class="fas fa-file-alt"></i> แบบทดสอบปลายภาค</h1>
                <p style="opacity: 0.8; margin-bottom: 30px;">สุ่ม 40 ข้อจากคลัง 100 ข้อ | เวลา 40 นาที | คะแนนเต็ม 20</p>
                
                <div id="uInfo" style="margin-bottom: 35px; text-align: left; padding: 25px; background: rgba(0,0,0,0.25); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
                    <div id="uName" style="font-size: 1.2rem; font-weight: 600; margin-bottom: 5px;">👤 กำลังดึงข้อมูล...</div>
                    <div id="uId" style="color: #60a5fa; font-family: monospace;">🆔 รหัสประจำตัว: -</div>
                </div>
                
                <button class="btn-start" onclick="startExam()" id="btnBegin">
                    <i class="fas fa-expand-arrows-alt"></i> เริ่มการสอบและขยายเต็มหน้าจอ
                </button>
            </div>

            <div id="screenExam" style="display:none; padding-bottom: 100px;">
                <div id="questionContainer"></div>
                <button id="btnSubmit" onclick="confirmSubmit()" style="background: #10b981; color: white; border: none; padding: 22px; border-radius: 50px; width: 100%; margin: 50px 0; font-weight: bold; cursor: pointer; font-size: 1.1rem; box-shadow: 0 10px 20px rgba(16,185,129,0.3);"><i class="fas fa-paper-plane"></i> ส่งคำตอบทั้งหมด</button>
            </div>

            <div class="qcard" id="screenResult" style="display:none; text-align:center;">
                <h2 style="color: #3b82f6; margin-bottom: 10px;">📊 ประกาศผลสอบ</h2>
                <div style="font-size: 4.5rem; font-weight: 900; margin: 20px 0; background: linear-gradient(135deg, #3b82f6, #60a5fa); -webkit-background-clip: text; color: transparent;" id="rScore">0/20</div>
                <p id="rDetail" style="margin-bottom: 30px; font-size: 1.1rem; opacity: 0.9;"></p>
                <button onclick="window.location.href='student.html'" style="background: #3b82f6; border: none; padding: 15px 40px; border-radius: 50px; color: white; cursor: pointer; font-weight: bold;"><i class="fas fa-home"></i> กลับหน้าห้องเรียน</button>
            </div>
        </div>
    </div>

    <div class="progress-indicator" id="progressDots" style="display:none;"></div>

    <script>
        // 🌟 ตั้งค่าลิงก์สคริปต์ 🌟
        const VALIDATOR_URL = "https://script.google.com/macros/s/AKfycbyyXbMRmMGgIiSz49VmPhym-vQi01u8I2Z-rDdOhk8AKFCTy77cJGFGALyEV_31nrak/exec"; 
        const MAIN_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby901YIN3KkAJXTItn_ySYqqecw4tT8rArbASqOa768Mpgah8XQjYX8jMVSj9w0VC6C/exec";
        
        let examStarted = false, examFinished = false, timeLeft = 2400, timer = null, userIP = "";
        let drawnQuestions = [], answers = [];

        // 🌟 คลังข้อสอบ 100 ข้อ (สลับตัวเลือก ก-ง เป็น a-d เรียบร้อย) 🌟
        const questionBank = [
            { "id": 1, "question": "ข้อใดอธิบายหน้าที่ของระบบรับรู้ (Perception) ในหุ่นยนต์ได้ถูกต้องที่สุด", "options": ["ทำหน้าที่รับข้อมูลจากสภาพแวดล้อมผ่านเซนเซอร์", "ทำหน้าที่จัดเก็บข้อมูลการทำงาน", "ทำหน้าที่ควบคุมแรงบิดของมอเตอร์", "ทำหน้าที่แปลงโปรแกรมเป็นคำสั่งเครื่อง"] },
            { "id": 2, "question": "ส่วนใดของหุ่นยนต์มีหน้าที่วิเคราะห์ข้อมูลและตัดสินใจเลือกการทำงาน", "options": ["ระบบกลไกขับเคลื่อน", "แหล่งจ่ายพลังงาน", "ระบบการคิดวิเคราะห์ (Cognition)", "ระบบรับรู้"] },
            { "id": 3, "question": "องค์ประกอบใดเกี่ยวข้องโดยตรงกับการเคลื่อนที่ของแขนกลหรือกลไก", "options": ["การประมวลผล", "การเคลื่อนไหว (Manipulation)", "การรับรู้", "การบันทึกข้อมูล"] },
            { "id": 4, "question": "ข้อใดจัดเป็นอุปกรณ์ในกลุ่ม Perception", "options": ["มอเตอร์ DC", "เกียร์ทด", "แบตเตอรี่", "เซนเซอร์ตรวจจับระยะทาง"] },
            { "id": 5, "question": "ข้อใดเป็นอุปกรณ์ที่อยู่ในกลุ่ม Manipulation มากที่สุด", "options": ["เซอร์โวมอเตอร์", "เซนเซอร์แสง", "ไมโครโฟน", "เซนเซอร์อุณหภูมิ"] },
            { "id": 6, "question": "ข้อใดแสดงความสัมพันธ์ระหว่าง Perception และ Cognition ได้ถูกต้อง", "options": ["ทั้งสองทำหน้าที่เหมือนกัน", "Perception รับข้อมูล ส่วน Cognition วิเคราะห์ข้อมูล", "Cognition ทำงานก่อนรับข้อมูลเสมอ", "Perception ควบคุมมอเตอร์โดยตรง"] },
            { "id": 7, "question": "หากหุ่นยนต์ต้องเริ่มรับรู้สิ่งแวดล้อมรอบตัว ขั้นตอนแรกควรเริ่มจากส่วนใด", "options": ["การรับรู้", "การคิดวิเคราะห์", "การขยับกลไก", "ตัวขับมอเตอร์"] },
            { "id": 8, "question": "เหตุผลสำคัญที่ต้องมี Cognition ในหุ่นยนต์คือข้อใด", "options": ["เพื่อเพิ่มแรงบิดของมอเตอร์", "เพื่อเพิ่มแรงดันไฟฟ้า", "เพื่อเลือกการกระทำจากข้อมูลที่ตรวจพบ", "เพื่อเพิ่มความแม่นยำของสายไฟ"] },
            { "id": 9, "question": "Perception มีความสำคัญต่อหุ่นยนต์อย่างไร", "options": ["ทำให้เชื่อมต่ออินเทอร์เน็ตได้", "ทำให้หุ่นยนต์หมุนล้อได้", "ทำให้ติดตั้งซอฟต์แวร์ได้", "ทำให้หุ่นยนต์รับรู้สภาพแวดล้อม"] },
            { "id": 10, "question": "ข้อใดอธิบายความหมายของหุ่นยนต์ได้ครบถ้วนที่สุด", "options": ["โปรแกรมคอมพิวเตอร์ที่ไม่มีฮาร์ดแวร์", "ระบบที่สามารถรับรู้ ตัดสินใจ และกระทำได้", "เครื่องจักรที่ทำงานตามกลไกอย่างเดียว", "อุปกรณ์ที่ต้องต่ออินเทอร์เน็ตตลอดเวลา"] },
            // ... (ใส่ให้ครบ 100 ข้อ ตามลิสต์ที่สลับไว้ด้านบน)
        ];

        // ระบบตรวจสอบการทุจริต
        async function banUser(reason) {
            if(examFinished || !examStarted) return;
            examFinished = true; clearInterval(timer);
            const sid = document.getElementById('uId').innerText.replace("🆔 รหัสประจำตัว: ", "");
            
            await fetch(VALIDATOR_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action:"reportViolation", student_id: sid, ip: userIP, name: localStorage.getItem('student_name'), reason: reason })
            });
            alert("🚨 ตรวจพบการทุจริต: " + reason + "\nสิทธิ์การสอบถูกระงับและบันทึกหลักฐานเข้าระบบแล้ว");
            window.location.href = "student.html";
        }

        // เริ่มต้นการสอบ
        function startExam() {
            if(!confirm("⚠️ ข้อตกลง: ห้ามออกจากหน้าจอ ห้ามสลับแอป ห้ามแบ่งหน้าจอ มิฉะนั้นจะถูกระงับสิทธิ์การสอบทันที ตกลงหรือไม่?")) return;
            
            // ขยายหน้าจอเต็ม
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }

            document.getElementById('screenStart').style.display = 'none';
            document.getElementById('screenExam').style.display = 'block';
            document.getElementById('progressDots').style.display = 'flex';
            
            drawnQuestions = questionBank.sort(() => 0.5 - Math.random()).slice(0, 40);
            answers = new Array(40).fill(null);
            renderQuestions();
            renderDots();
            
            examStarted = true;
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timerDisplay').innerText = new Date(timeLeft * 1000).toISOString().substr(11, 8);
                if(timeLeft <= 0) submitExam("timeout");
            }, 1000);

            // ติดตั้ง Proctoring
            window.onblur = () => { if(!examFinished) { document.body.classList.add('lost-focus'); banUser("แอบสลับหน้าจอ/แคปภาพ"); } };
            window.onfocus = () => document.body.classList.remove('lost-focus');
            window.onresize = () => { if(window.innerHeight < screen.height * 0.7) document.getElementById('split-warning').style.display='flex'; };
        }

        function renderQuestions() {
            const container = document.getElementById('questionContainer');
            const letters = ['a','b','c','d'];
            drawnQuestions.forEach((q, idx) => {
                const div = document.createElement('div'); div.className = 'qcard';
                div.innerHTML = `<p style="font-weight:700; margin-bottom:15px; font-size:1.1rem;">ข้อที่ ${idx+1}: ${q.question}</p><div class="options"></div>`;
                q.options.forEach((opt, i) => {
                    const op = document.createElement('div'); op.className = 'option';
                    op.innerHTML = `<span class="option-label">${letters[i]})</span> <span>${opt}</span>`;
                    op.onclick = () => {
                        [...div.querySelectorAll('.option')].forEach(x => x.classList.remove('selected'));
                        op.classList.add('selected'); answers[idx] = letters[i];
                        document.getElementById('progressDots').children[idx].classList.add('active');
                    };
                    div.querySelector('.options').appendChild(op);
                });
                container.appendChild(div);
            });
        }

        function renderDots() {
            const dots = document.getElementById('progressDots');
            for(let i=0; i<40; i++) { 
                const d = document.createElement('div'); d.className='dot'; d.innerText=i+1; 
                d.onclick = () => document.getElementsByClassName('qcard')[i+1].scrollIntoView({behavior:'smooth'});
                dots.appendChild(d); 
            }
        }

        async function submitExam(type="manual") {
            examFinished = true; clearInterval(timer);
            document.getElementById('btnSubmit').disabled = true;
            document.getElementById('btnSubmit').innerHTML = "<i class='fas fa-spinner fa-spin'></i> กำลังส่งผลสอบ...";

            const submissionData = drawnQuestions.map((q, i) => ({ id: String(q.id), ans: answers[i] }));
            
            try {
                const resp = await fetch(VALIDATOR_URL, { method: 'POST', body: JSON.stringify({ action: "evaluate", answers: submissionData }) });
                const result = await resp.json();

                const email = localStorage.getItem('student_email');
                const sid = localStorage.getItem(email + '_studentid');
                const actId = new URLSearchParams(window.location.search).get('actid') || "QUIZ_100";
                const log = `📝 สอบปลายภาค: ถูก ${result.correct}/40 | คะแนน: ${result.finalScore}/20`;

                await fetch(MAIN_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "submitWork", student_id: sid, activity_id: actId, work_content: log }) });
                await fetch(MAIN_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "saveScore", student_id: sid, activity_id: actId, score: result.finalScore }) });

                document.getElementById('screenExam').style.display = 'none';
                document.getElementById('progressDots').style.display = 'none';
                document.getElementById('screenResult').style.display = 'block';
                document.getElementById('rScore').innerText = result.finalScore + " / 20";
                document.getElementById('rDetail').innerText = `ถูกต้องทั้งหมด ${result.correct} ข้อ จาก 40 ข้อ`;
            } catch(e) { alert("ส่งข้อมูลไม่สำเร็จ กรุณากดส่งใหม่อีกครั้ง"); document.getElementById('btnSubmit').disabled = false; }
        }

        function confirmSubmit() { if(confirm("ตรวจสอบคำตอบครบถ้วนแล้วใช่หรือไม่?")) submitExam(); }

        // 🌟 INITIALIZE: ฟังก์ชันแก้ปัญหาอาการค้าง 🌟
        window.onload = async () => {
            const email = localStorage.getItem('student_email');
            if(!email) { alert("กรุณาเข้าสู่ระบบผ่านหน้าหลักก่อน!"); window.location.href="index.html"; return; }
            
            const name = localStorage.getItem('student_name');
            const sid = localStorage.getItem(email + '_studentid');

            // 1. ตรวจสอบว่ามีรหัสนักเรียนหรือยัง
            if(!sid || sid === '-' || sid === "") {
                document.getElementById('uName').innerHTML = "<span style='color:red;'>❌ ไม่พบข้อมูลรหัสนักเรียน</span>";
                document.getElementById('uId').innerText = "กรุณากลับไปที่หน้า 'ห้องเรียนของฉัน' แล้วกด 'แก้ไขข้อมูลส่วนตัว' ก่อนครับ";
                document.getElementById('btnBegin').disabled = true;
                document.getElementById('btnBegin').style.opacity = "0.5";
                return;
            }

            // 2. แสดงข้อมูลทันที
            document.getElementById('uName').innerText = "👤 ผู้สอบ: " + name;
            document.getElementById('uId').innerText = "🆔 รหัสประจำตัว: " + sid;
            
            // 3. ใช้ธีมที่บันทึกไว้
            const savedTheme = localStorage.getItem('smart_theme') || "default";
            document.body.setAttribute("data-theme", savedTheme);

            // 4. ดึง IP และเช็ค Blacklist (Async)
            try {
                const r = await fetch('https://api64.ipify.org?format=json');
                const d = await r.json(); userIP = d.ip;
                
                const check = await fetch(`${VALIDATOR_URL}?action=checkBanStatus&id=${sid}&ip=${userIP}`);
                const res = await check.json();
                if(res.banned) {
                    document.body.innerHTML = `<div style='height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#fee2e2; text-align:center; color:red; padding:20px;'>
                        <i class='fas fa-user-slash fa-5x'></i><h1>คุณถูกระงับสิทธิ์การสอบ</h1><p>เหตุผล: ${res.reason}</p>
                        <button onclick='window.location.href="student.html"' style='margin-top:20px; padding:15px 30px; border-radius:30px; border:none; background:red; color:white; font-weight:bold;'>กลับหน้าหลัก</button></div>`;
                }
                
                // สร้างลายน้ำ
                const info = name + " (" + sid + ")";
                for(let i=0; i<15; i++){
                    const div = document.createElement('div'); div.className='watermark-item'; div.innerText = info; document.getElementById('watermark').appendChild(div);
                }
            } catch(e) { console.log("Network error but exam can continue."); }
        };
    </script>
</body>
</html>
