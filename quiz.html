<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>แบบทดสอบ | PROT Smart Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', sans-serif; transition: 0.5s; overflow-x: hidden; min-height: 100vh; }
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a, #1e293b); color: white; }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff, #f0f8ff); color: #1e293b; }
        body[data-theme="forest"] { background: linear-gradient(135deg, #1a3c1a, #3e7a3e); color: white; }
        body[data-theme="love"] { background: linear-gradient(135deg, #ffb7c5, #ff85a0); color: #1e293b; }
        body[data-theme="halloween"] { background: linear-gradient(135deg, #1a0b1a, #401040); color: white; }

        .watermark-container { position: fixed; inset:0; pointer-events:none; z-index:9999; display:grid; grid-template-columns:repeat(3, 1fr); opacity:0.06; }
        .watermark-item { transform:rotate(-30deg); display:flex; align-items:center; justify-content:center; white-space:nowrap; font-size:1.1rem; font-weight: bold; }
        body.lost-focus { filter: blur(45px) grayscale(1) !important; }
        #split-warning { position:fixed; inset:0; z-index:10002; background:rgba(0,0,0,0.95); color:white; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        .qcard { margin-top: 20px; padding: 25px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        body[data-theme="snow"] .qcard, body[data-theme="love"] .qcard { background: rgba(255, 255, 255, 0.9); color: #1e293b; border-color: rgba(0,0,0,0.1); }
        .option { padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-top: 10px; cursor: pointer; transition: 0.3s; display:flex; align-items:flex-start; gap:10px; }
        body[data-theme="snow"] .option, body[data-theme="love"] .option { border-color: rgba(0,0,0,0.1); }
        .option:hover { background: rgba(59, 130, 246, 0.15); border-color: #3b82f6; }
        .option.selected { background: #3b82f6 !important; color: white !important; border-color: #60a5fa; box-shadow: 0 5px 15px rgba(59,130,246,0.4); }
        .option-label { font-weight: 800; color: #ff6600; width: 25px; }
        body[data-theme="snow"] .option.selected .option-label, body[data-theme="love"] .option.selected .option-label { color: #fff; }
        .btn-main { background: #3b82f6; color: white; border: none; padding: 18px; border-radius: 50px; width: 100%; cursor: pointer; font-weight: bold; font-size:1.1rem; }
        .progress-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; z-index: 1000; }
        .dot { width: 30px; height: 30px; border-radius: 50%; background: #333; color: white; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .dot.active { background: #3b82f6; box-shadow: 0 0 10px rgba(59,130,246,0.5); }
    </style>
</head>

            { "id": 97, "question": "เหตุผลที่ตัวอย่างโปรเจกต์ช่วยเรียนรู้ได้ดีคือข้อใด", "options": ["ไม่ต้องใช้ไฟฟ้า", "เห็นภาพการเชื่อมต่อและผลลัพธ์เร็ว", "ไม่ต้องมีอุปกรณ์เลย", "ไม่ต้องใช้เวลา"] },
            { "id": 98, "question": "แนวคิดขยายระบบได้ของ ESP-NOW คือข้อใด", "options": ["ลดจำนวนบอร์ดเป็นศูนย์", "ใช้บอร์ดเดียวแทนทุกอย่าง", "เพิ่มจำนวนบอร์ดให้สื่อสารได้หลายตัว", "ปิดการสื่อสาร"] },
            { "id": 99, "question": "บทบาทการสื่อสารในระบบหุ่นยนต์และ IoT คือข้อใด", "options": ["ทำให้อุปกรณ์แลกเปลี่ยนข้อมูลและควบคุมกันได้", "ทำให้มอเตอร์หมุนโดยไม่ใช้ไฟ", "ทำให้เซนเซอร์ไม่ต้องต่อ", "ทำให้โปรแกรมไม่มีเงื่อนไข"] },
            { "id": 100, "question": "ตัวย่อใดมักใช้ร่วมกับคำว่า Broker", "options": ["GPS", "PWM", "I2C", "MQTT"] }
        ];

        function startExam() {
            if(!confirm("⚠️ ข้อตกลงก่อนสอบ: \nห้ามกดออกจากแอป ห้ามย่อหน้าต่าง ห้ามกดปุ่มย้อนกลับกลับ(Back) บนมือถือ\nหากฝ่าฝืนสิทธิ์การสอบจะถูกระงับและหมดสิทธิ์สอบทันที!")) return;
            
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(()=>{});
            }
            
            document.getElementById('btnBegin').style.display = 'none';
            const cd = document.getElementById('countdown'); 
            cd.style.display = 'block';
            let c = 10;
            
            const t = setInterval(() => {
                c--; 
                cd.innerText = `กำลังเข้าสู่โหมดคุมสอบใน... ${c}`;
                if(c <= 0) {
                    clearInterval(t); 
                    cd.style.display = 'none';
                    document.getElementById('screenStart').style.display = 'none';
                    document.getElementById('screenExam').style.display = 'block';
                    document.getElementById('dotsArea').style.display = 'flex';
                    examStarted = true; 
                    setTimeout(() => { canBan = true; }, 1000); 
                    
                    timerHandle = setInterval(() => {
                        timeLeft--;
                        document.getElementById('timer').innerText = new Date(timeLeft * 1000).toISOString().substr(11, 8);
                        if(timeLeft <= 0) submitFinal();
                    }, 1000);
                }
            }, 1000);
            
            drawn = bank.sort(()=>0.5-Math.random()).slice(0,40);
            answers = new Array(40).fill(null);
            renderQuestions();
        }

        function renderQuestions() {
            const area = document.getElementById('questionArea');
            const dots = document.getElementById('dotsArea');
            area.innerHTML = ''; dots.innerHTML = '';
            const letters = ['a','b','c','d'];
            
            drawn.forEach((q, i) => {
                const d = document.createElement('div'); 
                d.className = 'dot'; 
                d.innerText = i + 1; 
                d.onclick = () => document.getElementsByClassName('qcard')[i+1].scrollIntoView({behavior:'smooth', block:'start'});
                dots.appendChild(d);
                
                const card = document.createElement('div'); 
                card.className = 'qcard';
                card.innerHTML = `<p style="font-weight:700; margin-bottom:15px; font-size:1.1rem;">ข้อที่ ${i+1}: ${q.question}</p><div class='options'></div>`;
                
                q.options.forEach((opt, oi) => {
                    const btn = document.createElement('div'); 
                    btn.className = 'option'; 
                    btn.innerHTML = `<span class="option-label">${letters[oi]})</span> <span>${opt}</span>`;
                    btn.onclick = () => { 
                        [...card.querySelectorAll('.option')].forEach(x => x.classList.remove('selected'));
                        btn.classList.add('selected'); 
                        ans[i] = letters[oi];
                        dots.children[i].classList.add('active');
                    };
                    card.querySelector('.options').appendChild(btn);
                });
                area.appendChild(card);
            });
        }

        async function ban(reason) {
            if(!canBan || !examStarted) return;
            examStarted = false; 
            clearInterval(timerHandle);
            
            localStorage.setItem('is_banned', 'true');
            
            const sid = localStorage.getItem(localStorage.getItem('student_email') + '_studentid');
            await fetch(VALIDATOR_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({action:"reportViolation", student_id:sid, ip:userIP, name:localStorage.getItem('student_name'), reason:reason})
            });
            
            alert("🚨 ยุติการสอบ: " + reason + "\nคุณถูกระงับสิทธิ์และหมดสิทธิ์สอบแล้ว!");
            window.location.href = "student.html";
        }

        // ระบบจับโกง สลับจอ/แบ่งจอ
        window.onblur = () => { if(canBan) ban("สลับหน้าจอหรือเปิดแอปอื่น"); };
        window.onfocus = () => { document.body.classList.remove('lost-focus'); };
        window.onresize = () => { if(canBan && window.innerHeight < screen.height * 0.75) ban("แบ่งหน้าจอหรือย่อหน้าต่าง"); };

        // 🛡️ ระบบล็อกปุ่ม ย้อนกลับ (Back Button)
        window.history.pushState(null, null, window.location.href);
        window.addEventListener('popstate', function(event) {
            window.history.pushState(null, null, window.location.href);
            if (examStarted) alert("🚨 ระบบไม่อนุญาตให้กดย้อนกลับระหว่างการสอบ!");
        });

        // 🛡️ ป้องกันดูข้อสอบย้อนหลังจากแคช (Cache)
        window.addEventListener('pageshow', function(event) {
            if (event.persisted || localStorage.getItem('is_banned') === 'true') {
                if (localStorage.getItem('is_banned') === 'true') {
                    document.body.innerHTML = `
                    <div style='height:100vh; display:flex; align-items:center; justify-content:center; background:#fee2e2; flex-direction:column; text-align:center;'>
                        <i class='fas fa-ban fa-5x' style='color:red; margin-bottom:20px;'></i>
                        <h1 style='color:red; font-family:Prompt;'>❌ หมดสิทธิ์สอบ</h1>
                        <p style='font-family:Prompt; color:#333; margin-top:10px;'>คุณถูกระงับสิทธิ์ไปแล้ว ไม่สามารถดูข้อสอบย้อนหลังได้</p>
                    </div>`;
                    setTimeout(() => { window.location.href = "student.html"; }, 1500);
                }
            }
        });

        async function submitFinal() {
            if(!confirm("ยืนยันการส่งข้อสอบ?")) return;
            examStarted = false; 
            canBan = false; 
            clearInterval(timerHandle);
            
            document.getElementById('btnSubmit').disabled = true;
            document.getElementById('btnSubmit').innerHTML = "<i class='fas fa-spinner fa-spin'></i> กำลังส่งข้อสอบ...";

            const data = drawn.map((q, i) => ({ id: String(q.id), ans: ans[i] }));
            
            try {
                // 1. ตรวจคำตอบ
                const res = await fetch(VALIDATOR_URL, {
                    method: 'POST', 
                    body: JSON.stringify({action: "evaluate", answers: data})
                }).then(r => r.json());
                
                // 2. เตรียมข้อมูล (รวมชื่อนักเรียนด้วย)
                const email = localStorage.getItem('student_email');
                const sid = localStorage.getItem(email + '_studentid');
                const sname = localStorage.getItem('student_name'); // 🌟 ดึงชื่อนักเรียนมาด้วย
                
                const log = `📊 สอบออนไลน์: ถูก ${res.correct}/40 | คะแนน: ${res.finalScore}/20`;
                const actId = new URLSearchParams(window.location.search).get('actid') || "FINAL_EXAM";
                
                // 3. ส่งข้อมูล + ชื่อนักเรียน ไปบันทึกลง Sheet
                await fetch(MAIN_URL, {
                    method:'POST', 
                    mode:'no-cors', 
                    body:JSON.stringify({
                        action:"submitWork", 
                        student_id: sid, 
                        student_name: sname, 
                        activity_id: actId, 
                        work_content: log
                    })
                });
                
                await fetch(MAIN_URL, {
                    method:'POST', 
                    mode:'no-cors', 
                    body:JSON.stringify({
                        action:"saveScore", 
                        student_id: sid, 
                        student_name: sname, 
                        activity_id: actId, 
                        score: res.finalScore
                    })
                });
                
                // 4. แสดงผล
                document.getElementById('screenExam').style.display = 'none';
                document.getElementById('dotsArea').style.display = 'none';
                document.getElementById('screenResult').style.display = 'block';
                document.getElementById('scoreDisplay').innerText = res.finalScore + "/20";
            } catch(e) {
                alert("❌ การเชื่อมต่อล้มเหลว กรุณากดส่งใหม่อีกครั้ง");
                document.getElementById('btnSubmit').disabled = false;
                document.getElementById('btnSubmit').innerText = "ส่งคำตอบทั้งหมด";
            }
        }

        window.onload = async () => {
            const theme = localStorage.getItem('smart_theme') || "default";
            document.body.setAttribute("data-theme", theme);
            
            try { const ip = await fetch('https://api64.ipify.org?format=json').then(r=>r.json()); userIP = ip.ip; } catch(e) {}
            
            const email = localStorage.getItem('student_email');
            const sid = localStorage.getItem(email + '_studentid');
            
            if(!sid || sid === '-') { 
                alert("ไม่มีรหัสประจำตัว กรุณากลับไปแก้ไขข้อมูลส่วนตัวก่อนครับ!"); 
                window.location.href = "student.html"; 
                return; 
            }
            
            document.getElementById('uName').innerText = "👤 ผู้สอบ: " + localStorage.getItem('student_name');
            document.getElementById('uId').innerText = "🆔 รหัสประจำตัว: " + sid;
            
            const wm = document.getElementById('watermark');
            const txt = localStorage.getItem('student_name') + " (" + sid + ")";
            for(let i=0; i<15; i++) {
                const div = document.createElement('div');
                div.className = 'watermark-item';
                div.innerText = txt;
                wm.appendChild(div);
            }
            
            try {
                const res = await fetch(`${VALIDATOR_URL}?action=checkBanStatus&id=${sid}&ip=${userIP}`).then(r=>r.json());
                if(res.banned) {
                    localStorage.setItem('is_banned', 'true');
                    document.body.innerHTML = `
                    <div style='height:100vh; display:flex; align-items:center; justify-content:center; background:#fee2e2; flex-direction:column; text-align:center;'>
                        <i class='fas fa-user-slash fa-5x' style='color:red; margin-bottom:20px;'></i>
                        <h1 style='color:red; font-family:Prompt;'>คุณถูกระงับสิทธิ์การสอบ!</h1>
                        <p style='font-family:Prompt; color:#333;'>${res.reason}</p>
                        <button onclick="window.location.href='student.html'" style="margin-top:20px; padding:15px 30px; border-radius:30px; border:none; background:red; color:white; font-weight:bold; cursor:pointer;">กลับหน้าหลัก</button>
                    </div>`;
                }
            } catch(e) {}
        };
    </script>
</body>
