<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>แบบทดสอบออนไลน์ | PROT Smart Workspace</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ==================== CSS ธีมหลัก ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; overflow-x: hidden; position: relative; }
        
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); color: white; }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff 0%, #e0f0ff 50%, #f0f8ff 100%); color: #1e293b; }
        body[data-theme="forest"] { background: linear-gradient(135deg, #1a3c1a 0%, #2d5a2d 50%, #3e7a3e 100%); color: white; }
        body[data-theme="halloween"] { background: linear-gradient(135deg, #1a0b1a 0%, #2d1a2d 50%, #401040 100%); color: white; }
        body[data-theme="love"] { background: linear-gradient(135deg, #ffb7c5 0%, #ff9eb0 50%, #ff85a0 100%); color: #1e293b; }
        
        .bg-animation { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .bg-animation .circle { position: absolute; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0) 70%); border-radius: 50%; animation: float 20s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } }

        /* ==================== CSS ระบบคุมสอบ ==================== */
        .page-content-wrapper { padding: 40px 20px; max-width: 850px; margin: 0 auto; position: relative; z-index: 10; }
        .qcard { margin-top: 20px; padding: 30px; border-radius: 24px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(15px); }
        body[data-theme="snow"] .qcard, body[data-theme="love"] .qcard { background: rgba(255, 255, 255, 0.9); color: #1e293b; border-color: rgba(0,0,0,0.1); }
        
        .option { padding: 15px 20px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.1); margin-top: 12px; cursor: pointer; transition: 0.3s; }
        .option:hover { background: rgba(59, 130, 246, 0.15); border-color: #3b82f6; }
        .option.selected { background: #3b82f6 !important; color: white !important; border-color: #60a5fa; }
        .option-label { font-weight: 800; color: #ff6600; margin-right: 10px; }

        .watermark-container { position: fixed; inset:0; pointer-events:none; z-index:9999; display:grid; grid-template-columns:repeat(3, 1fr); opacity:0.06; }
        .watermark-item { transform:rotate(-30deg); display:flex; align-items:center; justify-content:center; white-space:nowrap; font-size:1.1rem; font-weight: bold; }
        
        body.lost-focus { filter: blur(45px) grayscale(1) !important; transition: 0.4s; }
        #split-warning { position:fixed; inset:0; z-index:10002; background:rgba(15, 23, 42, 0.98); color:white; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        
        .btn-start { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border: none; padding: 20px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.2rem; }
        .btn-submit { background: #10b981; color: white; border: none; padding: 22px; border-radius: 50px; width: 100%; margin: 50px 0; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        
        .progress-indicator { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.9); padding: 10px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; z-index: 1000; border-top: 2px solid #3b82f6; }
        .dot { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; background: #1a1a1a; color: #888; }
        .dot.active { background: #3b82f6; color: white; border-color: #fff; }
    </style>
</head>
<body data-theme="default">

            { "id": 93, "question": "หากยังไม่พร้อมติดตั้ง Node-RED ควรเริ่มจากอะไร", "options": ["เปลี่ยนสายไฟทั้งหมด", "ทดลองตัวอย่างออนไลน์", "อัปเกรดจอภาพ", "ติดตั้งโปรแกรมตัดต่อวิดีโอ"] },
            { "id": 94, "question": "Flow ใน Node-RED หมายถึงอะไร", "options": ["ชนิดของเซนเซอร์", "ชนิดของมอเตอร์", "ลำดับการเชื่อมต่อของโหนดและข้อมูล", "ชนิดแบตเตอรี่"] },
            { "id": 95, "question": "Node-RED ช่วยให้ทำสิ่งใดง่ายขึ้น", "options": ["เชื่อมอุปกรณ์และข้อมูลเข้าด้วยกัน", "เพิ่มแรงบิดมอเตอร์", "ไม่ต้องต่อสายเลย", "ไม่ต้องเขียนโค้ดทุกกรณี"] },
            { "id": 96, "question": "การจับคู่ใดถูกต้อง", "options": ["DHT + ESP = แสดงผล", "Node.js = เซนเซอร์", "ESP-NOW = โปรแกรมกราฟิก", "DHT + ESP = อ่านค่า / Node-RED = แสดงผล"] },
            { "id": 97, "question": "เหตุผลที่ตัวอย่างโปรเจกต์ช่วยเรียนรู้ได้ดีคือข้อใด", "options": ["ไม่ต้องใช้ไฟฟ้า", "เห็นภาพการเชื่อมต่อและผลลัพธ์เร็ว", "ไม่ต้องมีอุปกรณ์เลย", "ไม่ต้องใช้เวลา"] },
            { "id": 98, "question": "แนวคิดขยายระบบได้ของ ESP-NOW คือข้อใด", "options": ["ลดจำนวนบอร์ดเป็นศูนย์", "ใช้บอร์ดเดียวแทนทุกอย่าง", "เพิ่มจำนวนบอร์ดให้สื่อสารได้หลายตัว", "ปิดการสื่อสาร"] },
            { "id": 99, "question": "บทบาทการสื่อสารในระบบหุ่นยนต์และ IoT คือข้อใด", "options": ["ทำให้อุปกรณ์แลกเปลี่ยนข้อมูลและควบคุมกันได้", "ทำให้มอเตอร์หมุนโดยไม่ใช้ไฟ", "ทำให้เซนเซอร์ไม่ต้องต่อ", "ทำให้โปรแกรมไม่มีเงื่อนไข"] },
            { "id": 100, "question": "ตัวย่อใดมักใช้ร่วมกับคำว่า Broker", "options": ["GPS", "PWM", "I2C", "MQTT"] }
        ];

        async function banUser(reason) {
            if(!canTriggerBan || examFinished || !examStarted) return;
            examFinished = true; clearInterval(timer);
            const studentId = localStorage.getItem(localStorage.getItem('student_email') + '_studentid');
            await fetch(VALIDATOR_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action:"reportViolation", student_id: studentId, ip: userIP, name: localStorage.getItem('student_name'), reason: reason })
            });
            alert("🚨 ตรวจพบการทุจริต: " + reason + "\nสิทธิ์การสอบถูกระงับทันที!");
            window.location.href = "student.html";
        }

        function startExam() {
            if(!confirm("⚠️ ห้ามออกจากหน้าจอ ห้ามสลับแอป ห้ามแบ่งจอ มิฉะนั้นจะถูกแบนทันที ตกลงหรือไม่?")) return;
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});

            document.getElementById('screenStart').style.display = 'none';
            document.getElementById('screenExam').style.display = 'block';
            document.getElementById('progressDots').style.display = 'flex';
            
            drawnQuestions = questionBank.sort(() => 0.5 - Math.random()).slice(0, 40);
            answers = new Array(40).fill(null);
            renderQuestions();
            renderDots();
            
            examStarted = true;
            
            // 🛡️ หน่วงเวลา 10 วินาทีก่อนเริ่มระบบตรวจจับ (Grace Period)
            setTimeout(() => { 
                canTriggerBan = true; 
                console.log("Proctoring Active!");
            }, 10000); 

            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timerDisplay').innerText = new Date(timeLeft * 1000).toISOString().substr(11, 8);
                if(timeLeft <= 0) submitExam("timeout");
            }, 1000);

            window.onblur = () => { if(canTriggerBan) { document.body.classList.add('lost-focus'); banUser("แอบสลับหน้าจอหรือแคปภาพ"); } };
            window.onfocus = () => document.body.classList.remove('lost-focus');
            window.onresize = () => { if(examStarted && window.innerHeight < screen.height * 0.75) document.getElementById('split-warning').style.display='flex'; };
        }

        function renderQuestions() {
            const container = document.getElementById('questionContainer');
            const letters = ['a','b','c','d'];
            container.innerHTML = "";
            drawnQuestions.forEach((q, idx) => {
                const div = document.createElement('div'); div.className = 'qcard';
                div.innerHTML = `<p style="font-weight:700; margin-bottom:15px;">ข้อที่ ${idx+1}: ${q.question}</p><div class="options"></div>`;
                q.options.forEach((opt, i) => {
                    const op = document.createElement('div'); op.className = 'option';
                    op.innerHTML = `<span class="option-label">${letters[i]})</span> ${opt}`;
                    op.onclick = () => {
                        [...div.querySelectorAll('.option')].forEach(x => x.classList.remove('selected'));
                        op.classList.add('selected'); answers[idx] = letters[i];
                        document.getElementById('progressDots').children[idx].classList.add('active');
                    };
                    div.querySelector('.options').appendChild(op);
                });
                container.appendChild(div);
            });
        }

        function renderDots() {
            const dots = document.getElementById('progressDots');
            dots.innerHTML = "";
            for(let i=0; i<40; i++) { 
                const d = document.createElement('div'); d.className='dot'; d.innerText=i+1; 
                dots.appendChild(d); 
            }
        }

        async function submitExam() {
            examFinished = true; clearInterval(timer);
            const submissionData = drawnQuestions.map((q, i) => ({ id: String(q.id), ans: answers[i] }));
            try {
                const resp = await fetch(VALIDATOR_URL, { method: 'POST', body: JSON.stringify({ action: "evaluate", answers: submissionData }) });
                const result = await resp.json();
                const sid = localStorage.getItem(localStorage.getItem('student_email') + '_studentid');
                const log = `📊 สอบออนไลน์: ถูก ${result.correct}/40 | คะแนนสุทธิ: ${result.finalScore}/20`;
                
                await fetch(MAIN_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "submitWork", student_id: sid, activity_id: "FINAL_EXAM", work_content: log }) });
                await fetch(MAIN_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "saveScore", student_id: sid, activity_id: "FINAL_EXAM", score: result.finalScore }) });

                document.getElementById('screenExam').style.display = 'none';
                document.getElementById('progressDots').style.display = 'none';
                document.getElementById('screenResult').style.display = 'block';
                document.getElementById('rScore').innerText = result.finalScore + " / 20";
                document.getElementById('rDetail').innerText = `ตอบถูก ${result.correct} จาก 40 ข้อ`;
            } catch(e) { alert("เกิดข้อผิดพลาดในการส่งข้อมูล"); }
        }

        function confirmSubmit() { if(confirm("ส่งคำตอบใช่ไหม?")) submitExam(); }

        window.onload = async () => {
            try { const r = await fetch('https://api64.ipify.org?format=json'); const d = await r.json(); userIP = d.ip; } catch(e) { userIP = "unknown"; }
            const theme = localStorage.getItem('smart_theme') || "default";
            document.body.setAttribute("data-theme", theme);
            const email = localStorage.getItem('student_email');
            const sid = localStorage.getItem(email + '_studentid');
            if(!sid) { alert("ไม่พบข้อมูลรหัสประจำตัว!"); window.location.href="student.html"; return; }
            document.getElementById('uName').innerText = "👤 ผู้สอบ: " + localStorage.getItem('student_name');
            document.getElementById('uId').innerText = "🆔 รหัสประจำตัว: " + sid;
            
            const check = await fetch(`${VALIDATOR_URL}?action=checkBanStatus&id=${sid}&ip=${userIP}`);
            const res = await check.json();
            if(res.banned) {
                document.body.innerHTML = `<div style='height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#fee2e2; text-align:center;'><h1>❌ คุณถูกแบนจากการสอบ</h1><p>${res.reason}</p></div>`;
            }
            // ลายน้ำระบุตัวตน
            for(let i=0; i<15; i++){
                const div = document.createElement('div'); div.className='watermark-item'; div.innerText = `${localStorage.getItem('student_name')} (${sid})`; document.getElementById('watermark').appendChild(div);
            }
        };
    </script>
</body>
