<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ห้องเรียนของฉัน | PROT Smart Workspace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; overflow-x: hidden; position: relative; cursor: default; min-height: 100vh; }
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); color: white; }
        
        .content-layer { position: relative; z-index: 10; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(59,130,246,0.3); flex-wrap: wrap; gap: 15px;}
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; color: transparent; text-decoration: none; display: flex; align-items: center; gap: 12px;}
        .nav-links { display: flex; gap: 24px; list-style: none; align-items: center; flex-wrap: wrap;}
        .nav-links a { text-decoration: none; color: #e2e8f0; font-weight: 500; transition: 0.3s; padding: 8px 12px; border-radius: 30px; }
        .nav-links a:hover, .nav-links a.active { color: #60a5fa; background: rgba(96,165,250,0.1); }
        
        .login-area { display: flex; align-items: center; gap: 15px; }
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.15); padding: 5px 15px 5px 10px; border-radius: 50px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #3b82f6; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; padding: 5px 12px; border-radius: 30px; cursor: pointer; color: inherit; font-size: 0.8rem;}

        .page-content-wrapper { padding: 40px 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .dashboard-container { display: grid; grid-template-columns: 320px 1fr; gap: 30px; }
        
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border-radius: 28px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.2); color: inherit; height: fit-content;}
        .profile-pic-large { width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 15px auto; border: 4px solid #3b82f6; object-fit: cover; display: none; }
        .student-details { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px; margin-bottom: 15px; font-size: 0.9rem; text-align: left; }
        .btn-edit-profile { background: rgba(59,130,246,0.2); border: 1px solid #3b82f6; color: inherit; padding: 8px 15px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; font-family: 'Prompt'; width: 100%; font-weight: 600; margin-bottom: 15px;}
        
        .score-box { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 20px; margin-top: 15px; }
        .score-box h2 { color: #60a5fa; font-size: 2.5rem; margin: 5px 0; }
        .progress-bar-bg { background: rgba(0,0,0,0.3); height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-bar-fill { background: #3b82f6; height: 100%; width: 0%; transition: 0.5s; }
        
        .content-area { display: flex; flex-direction: column; gap: 30px; }
        .section-header { font-size: 1.3rem; font-weight: 700; border-bottom: 3px solid #3b82f6; padding-bottom: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; color: inherit;}
        
        .task-card { background: rgba(0,0,0,0.2); backdrop-filter: blur(12px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; transition: 0.3s; }
        .task-info h4 { margin: 0 0 8px 0; font-size: 1.1rem; color: #60a5fa; }
        .task-meta { text-align: right; min-width: 150px; }
        
        .badge { padding: 6px 14px; border-radius: 30px; font-size: 0.75rem; font-weight: 600; display: inline-block; margin-bottom: 8px; }
        .badge.pending { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.5); }
        .badge.submitted { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.5); }
        .badge.done { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.5); }
        .badge.late { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.5); }
        
        .btn-action { background: #3b82f6; color: white; padding: 8px 20px; border-radius: 30px; text-decoration: none; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; border: none; cursor: pointer; font-family: 'Prompt'; }
        .btn-action.btn-edit { background: #f59e0b; }
        .btn-action.btn-locked { background: #64748b; cursor: not-allowed; opacity: 0.7; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.3s; }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content { background: rgba(30, 41, 59, 0.95); border-radius: 25px; padding: 40px; width: 90%; max-width: 450px; border: 1px solid rgba(59,130,246,0.5); position: relative; text-align: center; color: inherit;}
        .form-group-edit { text-align: left; margin-bottom: 15px; }
        .form-group-edit label { display: block; font-size: 0.85rem; margin-bottom: 5px; opacity: 0.9; }
        .form-group-edit input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: inherit; font-family: 'Prompt'; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: inherit; background: none; border: none; opacity: 0.7;}
        
        @media (max-width: 768px) { .dashboard-container { grid-template-columns: 1fr; } .task-card { flex-direction: column; text-align: center; gap: 15px; } .task-meta { text-align: center; } }
    </style>
</head>
<body data-theme="default">
    <div class="content-layer">
        <header>
            <a href="index.html" class="logo"><i class="fas fa-robot"></i><span>PROT Smart Workspace</span></a>
            <div style="display: flex; align-items: center; gap: 30px; flex-wrap: wrap;">
                <ul class="nav-links">
                    <li><a href="index.html">หน้าหลัก</a></li>
                    <li><a href="student.html" class="active">ห้องเรียนของฉัน</a></li>
                    <li><a href="teacher_profile.html">ข้อมูลผู้สอน</a></li>
                </ul>
                <div class="login-area" id="loginArea">
                    <button class="login-btn" id="showLoginBtn"><i class="fas fa-sign-in-alt"></i> ลงชื่อเข้าเรียน</button>
                </div>
            </div>
        </header>

        <div class="page-content-wrapper">
            <div class="dashboard-container">
                
                <div class="glass-card" style="text-align: center;">
                    <img src="" id="profile-pic-img" class="profile-pic-large" alt="Avatar">
                    <h3 id="profile-name">นักเรียน</h3>
                    <p id="profile-email" style="font-size:0.85rem; opacity:0.8; margin-bottom:15px;">กรุณาเข้าสู่ระบบ</p>
                    
                    <div class="student-details" id="student-details-box" style="display: none;">
                        <div><i class="fas fa-door-open"></i> ห้อง: <span id="display-room">-</span></div>
                        <div><i class="fas fa-list-ol"></i> เลขที่: <span id="display-number">-</span></div>
                    </div>
                    
                    <button class="btn-edit-profile" id="editProfileBtn" onclick="openEditProfileModal()" style="display: none;">
                        <i class="fas fa-edit"></i> แก้ไขข้อมูลส่วนตัว
                    </button>
                    
                    <div class="score-box">
                        <p><i class="fas fa-chart-line"></i> คะแนนเก็บรวม</p>
                        <h2 id="total-score">0 <span style="font-size: 1rem;">/ 0</span></h2>
                        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
                        <p style="margin: 10px 0 0 0; font-size: 0.8rem;" id="progress-text">ความคืบหน้า 0%</p>
                    </div>
                </div>

                <div class="content-area">
                    <div>
                        <div class="section-header"><i class="fas fa-book-open"></i> บทเรียนภาคปฏิบัติ (Modules)</div>
                        <div id="dynamic-modules-container">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeEditProfileModal()">×</button>
            <h3 style="color: inherit; margin-bottom: 20px;"><i class="fas fa-user-edit"></i> แก้ไขข้อมูลส่วนตัว</h3>
            <div class="form-group-edit"><label>ชื่อ-นามสกุล</label><input type="text" id="edit-name"></div>
            <div class="form-group-edit"><label>ชั้น/ห้อง (ให้ตรงกับที่ครูมอบหมาย)</label><input type="text" id="edit-room" placeholder="เช่น ม.4/1"></div>
            <div class="form-group-edit" style="margin-bottom: 25px;"><label>เลขที่</label><input type="number" id="edit-number"></div>
            <button onclick="saveProfileData()" class="btn-action" style="width: 100%; justify-content: center;"><i class="fas fa-save"></i> บันทึกข้อมูล</button>
        </div>
    </div>

    <script>
        // Utils
        function getUserKey(keyName) {
            const email = localStorage.getItem('student_email');
            return email ? email + '_' + keyName : null;
        }

        function getUserData(keyName, defaultValue = null) {
            const key = getUserKey(keyName);
            try { return key && localStorage.getItem(key) ? localStorage.getItem(key) : defaultValue; } catch(e) { return defaultValue; }
        }

        function logout() {
            localStorage.removeItem('is_logged_in'); window.location.href = 'index.html';
        }

        function loadStudentData() {
            const email = localStorage.getItem('student_email');
            if (!email) { document.getElementById('showLoginBtn').style.display = 'flex'; return; }

            const name = getUserData('custom_name') || localStorage.getItem('student_name') || "นักเรียน";
            const pic = localStorage.getItem('student_pic') || "https://ui-avatars.com/api/?name=S&background=3b82f6&color=fff";

            document.getElementById('profile-name').innerText = name;
            document.getElementById('profile-email').innerText = email;
            document.getElementById('profile-pic-img').src = pic;
            document.getElementById('profile-pic-img').style.display = 'block';
            
            document.getElementById('display-room').innerText = getUserData('room') || '-';
            document.getElementById('display-number').innerText = getUserData('number') || '-';
            document.getElementById('student-details-box').style.display = 'block';
            document.getElementById('editProfileBtn').style.display = 'inline-block';

            document.getElementById('loginArea').innerHTML = `
                <div class="user-info">
                    <img src="${pic}" class="user-avatar">
                    <span class="user-name">${name.split(' ')[0]}</span>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            `;

            loadDynamicModules(email);
        }

        // ==================== 🌟 ระบบคัดกรองงานให้ตรงกับห้องของนักเรียน ====================
        function loadDynamicModules(email) {
            const container = document.getElementById('dynamic-modules-container');
            let allActivities = [];
            try { allActivities = JSON.parse(localStorage.getItem('global_activities')) || []; } 
            catch(e) { allActivities = []; }
            
            // ดึงห้องของนักเรียน (ถ้าไม่มีตั้งเป็นค่าว่าง)
            const studentRoom = getUserData('room') || "";

            // คัดกรองกิจกรรม: เอาเฉพาะที่เป้าหมายคือ "ทุกห้อง" หรือตรงกับ "ห้องของนักเรียน"
            const activities = allActivities.filter(act => {
                const target = act.targetRoom || 'ทุกห้อง';
                return target === 'ทุกห้อง' || target === studentRoom;
            });
            
            if (activities.length === 0) {
                container.innerHTML = '<div class="task-card" style="justify-content:center; opacity:0.7;"><p>ยังไม่มีบทเรียนหรือแบบฝึกหัดสำหรับห้องของคุณ</p></div>';
                document.getElementById('total-score').innerHTML = `0 <span style="font-size: 1rem;">/ 0</span>`;
                document.getElementById('progress-fill').style.width = '0%';
                document.getElementById('progress-text').innerHTML = `ความคืบหน้าการส่งงาน 0%`;
                return;
            }

            container.innerHTML = '';
            let totalMaxPoints = 0;
            let totalEarned = 0;
            let submittedCount = 0;

            activities.forEach(act => {
                totalMaxPoints += parseInt(act.points || 15);
                const status = localStorage.getItem(email + '_act_' + act.id + '_status');
                const score = parseInt(localStorage.getItem(email + '_act_' + act.id + '_score') || 0);

                if (status === 'submitted' || status === 'graded') submittedCount++;
                if (status === 'graded') totalEarned += score;

                const now = new Date();
                let isPastDeadline = false;
                if (act.date) {
                    const deadline = new Date(act.date + 'T' + (act.time || '23:59:00'));
                    isPastDeadline = now > deadline;
                }

                let badgeHtml = ''; let btnHtml = ''; let scoreHtml = '';
                let linkPath = act.link && act.link !== '#' ? `${act.link}?actid=${act.id}` : '#';

                if (status === 'graded') {
                    badgeHtml = `<span class="badge done">⭐ ตรวจแล้ว</span>`;
                    scoreHtml = `<div style="color:#10b981; font-weight:600; font-size:0.9rem; margin-top:5px;">ได้คะแนน: ${score} / ${act.points}</div>`;
                    btnHtml = `<button class="btn-action btn-locked" disabled><i class="fas fa-lock"></i> ปิดการแก้ไขแล้ว</button>`;
                } else if (status === 'submitted') {
                    if (isPastDeadline) {
                        badgeHtml = `<span class="badge submitted">✅ ส่งแล้ว (รอตรวจ)</span>`;
                        scoreHtml = `<div style="font-size:0.8rem; margin-top:5px; opacity:0.8;">รอคะแนน (เต็ม ${act.points})</div>`;
                        btnHtml = `<button class="btn-action btn-locked" disabled><i class="fas fa-lock"></i> หมดเวลาแก้ไข</button>`;
                    } else {
                        badgeHtml = `<span class="badge submitted">✅ ส่งแล้ว (รอตรวจ)</span>`;
                        scoreHtml = `<div style="font-size:0.8rem; margin-top:5px; opacity:0.8;">รอคะแนน (เต็ม ${act.points})</div>`;
                        btnHtml = linkPath !== '#' ? `<a href="${linkPath}" class="btn-action btn-edit"><i class="fas fa-pencil-alt"></i> แก้ไขงาน</a>` : '';
                    }
                } else {
                    scoreHtml = `<div style="font-size:0.8rem; margin-top:5px; opacity:0.8;">คะแนนเต็ม ${act.points}</div>`;
                    if (isPastDeadline && act.strict) {
                        badgeHtml = `<span class="badge late">❌ ปิดรับงาน</span>`;
                        btnHtml = `<button class="btn-action btn-locked" disabled><i class="fas fa-lock"></i> ส่งไม่ทันกำหนด</button>`;
                    } else if (isPastDeadline && !act.strict) {
                        badgeHtml = `<span class="badge late">⚠️ ส่งช้าได้</span>`;
                        btnHtml = linkPath !== '#' ? `<a href="${linkPath}" class="btn-action"><i class="fas fa-arrow-right"></i> ส่งงาน (ช้า)</a>` : '';
                    } else {
                        badgeHtml = `<span class="badge pending">⏳ ค้างส่งงาน</span>`;
                        btnHtml = linkPath !== '#' ? `<a href="${linkPath}" class="btn-action">ทำกิจกรรม <i class="fas fa-arrow-right"></i></a>` : '';
                    }
                }

                container.innerHTML += `
                    <div class="task-card" style="border-left: 4px solid #3b82f6;">
                        <div class="task-info">
                            <h4>${act.title}</h4>
                            <p style="font-size:0.85rem; opacity:0.8;">${act.desc}</p>
                            <small style="color:#60a5fa; display:block; margin-top:5px;"><i class="far fa-clock"></i> กำหนดส่ง: ${act.date || '-'} | ${act.time || '-'}</small>
                        </div>
                        <div class="task-meta">
                            ${badgeHtml}
                            ${scoreHtml}
                            <div style="margin-top:8px;">${btnHtml}</div>
                        </div>
                    </div>
                `;
            });

            let progressPercent = activities.length > 0 ? Math.round((submittedCount / activities.length) * 100) : 0;
            document.getElementById('total-score').innerHTML = `${totalEarned} <span style="font-size: 1rem;">/ ${totalMaxPoints}</span>`;
            document.getElementById('progress-fill').style.width = progressPercent + '%';
            document.getElementById('progress-text').innerHTML = `ความคืบหน้าการส่งงาน ${progressPercent}%`;
            
            localStorage.setItem(email + '_total_score', totalEarned);
        }

        // ==================== EDIT PROFILE ====================
        function openEditProfileModal() {
            const email = localStorage.getItem('student_email');
            document.getElementById('edit-name').value = getUserData('custom_name') || localStorage.getItem('student_name') || "";
            document.getElementById('edit-room').value = getUserData('room') || '';
            document.getElementById('edit-number').value = getUserData('number') || '';
            document.getElementById('editProfileModal').classList.add('active');
        }
        function closeEditProfileModal() { document.getElementById('editProfileModal').classList.remove('active'); }

        function saveProfileData() {
            const name = document.getElementById('edit-name').value;
            const room = document.getElementById('edit-room').value;
            const number = document.getElementById('edit-number').value;
            const email = localStorage.getItem('student_email');

            if (!name || !room || !number) { alert('⚠️ กรุณากรอกข้อมูลให้ครบถ้วน'); return; }

            localStorage.setItem(email + '_custom_name', name);
            localStorage.setItem(email + '_room', room);
            localStorage.setItem(email + '_number', number);
            
            alert('✅ บันทึกข้อมูลส่วนตัวเรียบร้อย!');
            closeEditProfileModal(); 
            loadStudentData(); // รีโหลดเพื่อดึงงานของห้องนั้นๆ
        }

        window.onload = () => {
            if (localStorage.getItem('is_logged_in') === 'true') {
                loadStudentData();
            } else {
                document.getElementById('showLoginBtn').addEventListener('click', openLoginModal);
            }
        };
    </script>
</body>
</html>
