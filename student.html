<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ห้องเรียนของฉัน | PROT Smart Workspace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; overflow-x: hidden; position: relative; cursor: default; min-height: 100vh; }
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); color: white; }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff 0%, #e0f0ff 50%, #f0f8ff 100%); color: #1e293b; }
        body[data-theme="forest"] { background: linear-gradient(135deg, #1a3c1a 0%, #2d5a2d 50%, #3e7a3e 100%); color: white; }
        body[data-theme="halloween"] { background: linear-gradient(135deg, #1a0b1a 0%, #2d1a2d 50%, #401040 100%); color: white; }
        body[data-theme="love"] { background: linear-gradient(135deg, #ffb7c5 0%, #ff9eb0 50%, #ff85a0 100%); color: #1e293b; }
        
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .bg-animation .circle { position: absolute; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0) 70%); border-radius: 50%; animation: float 20s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0) translateX(0) scale(1); } 25% { transform: translateY(-30px) translateX(20px) scale(1.05); } 75% { transform: translateY(30px) translateX(-20px) scale(0.95); } }
        .bg-animation .circle:nth-child(1) { width: 400px; height: 400px; top: -100px; left: -100px; animation-duration: 25s; }
        .bg-animation .circle:nth-child(2) { width: 600px; height: 600px; bottom: -200px; right: -100px; animation-duration: 30s; animation-delay: -5s; }
        
        #particleContainer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .theme-particle { position: absolute; top: -10vh; pointer-events: none; animation: fallDown linear forwards; z-index: 1; }
        @keyframes fallDown { 0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(110vh) translateX(20px) rotate(360deg); opacity: 0; } }
        
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(59,130,246,0.3); flex-wrap: wrap; gap: 15px;}
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; color: transparent; text-decoration: none; display: flex; align-items: center; gap: 12px;}
        
        .nav-links { display: flex; gap: 24px; list-style: none; align-items: center; flex-wrap: wrap;}
        .nav-links a { text-decoration: none; color: #e2e8f0; font-weight: 500; transition: 0.3s; padding: 8px 12px; border-radius: 30px; }
        .nav-links a:hover, .nav-links a.active { color: #60a5fa; background: rgba(96,165,250,0.1); }
        
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.15); padding: 5px 15px 5px 10px; border-radius: 50px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #3b82f6; background: white; }
        
        .page-content-wrapper { padding: 40px 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .dashboard-container { display: grid; grid-template-columns: 320px 1fr; gap: 30px; }
        
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border-radius: 28px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.2); color: inherit; height: fit-content;}
        .student-details { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 0.95rem; text-align: left; }
        .btn-edit-profile { background: rgba(59,130,246,0.2); border: 1px solid #3b82f6; color: inherit; padding: 8px 15px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; font-family: 'Prompt'; width: 100%; font-weight: 600; margin-bottom: 15px;}
        
        .score-box h2 { color: #60a5fa; font-size: 2.5rem; margin: 5px 0; }
        .progress-bar-bg { background: rgba(0,0,0,0.3); height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-bar-fill { background: #3b82f6; height: 100%; width: 0%; transition: 0.5s; }
        
        .section-header { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 12px; color: inherit;}
        .task-card { background: rgba(0,0,0,0.2); backdrop-filter: blur(12px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; transition: 0.3s; }
        .task-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        .badge { padding: 6px 14px; border-radius: 30px; font-size: 0.75rem; font-weight: 600; display: inline-block; margin-bottom: 8px; }
        .btn-action { background: #3b82f6; color: white; padding: 8px 20px; border-radius: 30px; text-decoration: none; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; border: none; cursor: pointer; font-family: 'Prompt'; }
        
        .btn-refresh { background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid #3b82f6; padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; font-family: 'Prompt'; display: flex; align-items: center; gap: 8px; font-weight: 600;}

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.3s; }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content { background: rgba(30, 41, 59, 0.95); border-radius: 25px; padding: 40px; width: 90%; max-width: 450px; border: 1px solid rgba(59,130,246,0.5); position: relative; text-align: center; color: inherit;}
        
        .form-group-edit { text-align: left; margin-bottom: 15px; }
        .form-group-edit input, .form-group-edit select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: inherit; font-family: 'Prompt'; }
        
        @media (max-width: 768px) { .dashboard-container { grid-template-columns: 1fr; } .task-card { flex-direction: column; text-align: center; } }
    </style>
</head>
<body data-theme="default">
    <div class="bg-animation"><div class="circle"></div><div class="circle"></div><div class="circle"></div></div>
    <div id="particleContainer"></div>

    <div class="content-layer">
        <header>
            <a href="index.html" class="logo"><i class="fas fa-robot"></i><span>PROT Smart Workspace</span></a>
            <div style="display: flex; align-items: center; gap: 30px; flex-wrap: wrap;">
                <ul class="nav-links">
                    <li><a href="index.html">หน้าหลัก</a></li>
                    <li><a href="student.html" class="active">ห้องเรียนของฉัน</a></li>
                    <li><a href="teacher_profile.html">ข้อมูลผู้สอน</a></li>
                    <li><a href="student_portfolio.html">ผลงานนักเรียน</a></li>
                </ul>
                <div class="login-area" id="loginArea">
                    <button class="login-btn" id="showLoginBtn"><i class="fas fa-sign-in-alt"></i> ลงชื่อเข้าเรียน</button>
                </div>
            </div>
        </header>

        <div class="theme-switcher">
            <button class="theme-btn" data-theme="default">🤖 เริ่มต้น</button>
            <button class="theme-btn" data-theme="snow">❄️ หิมะ</button>
            <button class="theme-btn" data-theme="forest">🌿 ป่าเขียว</button>
            <button class="theme-btn" data-theme="halloween">🎃 ฮัลโลวีน</button>
            <button class="theme-btn" data-theme="love">🌸 ซากุระ</button>
        </div>

        <div class="page-content-wrapper">
            <div class="dashboard-container">
                <div class="glass-card" style="text-align: center;">
                    <img src="https://ui-avatars.com/api/?name=S&background=3b82f6&color=fff" id="profile-pic-img" class="profile-pic-large" alt="Avatar">
                    <h3 id="profile-name">นักเรียน</h3>
                    <p id="profile-email" style="font-size:0.85rem; opacity:0.8; margin-bottom:15px;">กรุณาเข้าสู่ระบบ</p>
                    
                    <div class="student-details" id="student-details-box" style="display: none;">
                        <div><i class="fas fa-id-badge"></i> รหัสประจำตัว: <span id="display-studentid" style="color:#60a5fa; font-weight:600;">-</span></div>
                        <div><i class="fas fa-door-open"></i> ห้อง: <span id="display-room">-</span></div>
                        <div><i class="fas fa-list-ol"></i> เลขที่: <span id="display-number">-</span></div>
                    </div>
                    
                    <button class="btn-edit-profile" id="editProfileBtn" onclick="openEditProfileModal()" style="display: none;">
                        <i class="fas fa-edit"></i> แก้ไขข้อมูลส่วนตัว
                    </button>
                    
                    <div class="score-box">
                        <p><i class="fas fa-chart-line"></i> คะแนนเก็บรวม</p>
                        <h2 id="total-score">0 <span style="font-size: 1rem;">/ 0</span></h2>
                        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
                        <p style="margin: 10px 0 0 0; font-size: 0.8rem;" id="progress-text">ความคืบหน้า 0%</p>
                    </div>
                </div>

                <div class="content-area">
                    <div id="status-msg" style="display:none; background: rgba(239, 68, 68, 0.2); color: #ef4444; padding: 15px; border-radius: 10px; font-size: 0.9rem; margin-bottom: 10px; border-left: 4px solid #ef4444;"></div>

                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3b82f6; padding-bottom: 12px; margin-bottom: 20px;">
                        <div class="section-header" style="border:none; margin:0;"><i class="fas fa-book-open"></i> บทเรียนและแบบฝึกหัด</div>
                        <button id="btn-sync" onclick="fetchDataFromServer(false)" class="btn-refresh"><i class="fas fa-sync-alt"></i> อัปเดตข้อมูล</button>
                    </div>

                    <div id="dynamic-modules-container"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeEditProfileModal()">×</button>
            <h3 style="margin-bottom: 20px;"><i class="fas fa-user-edit"></i> แก้ไขข้อมูลส่วนตัว</h3>
            <div class="form-group-edit"><label>รหัสนักเรียน</label><input type="text" id="edit-studentid"></div>
            <div class="form-group-edit"><label>ชื่อ-นามสกุล</label><input type="text" id="edit-name"></div>
            <div class="form-group-edit">
                <label>ห้องเรียน</label>
                <div style="display: flex; gap: 10px;">
                    <select id="edit-grade"><option value="ม.1">ม.1</option><option value="ม.2">ม.2</option><option value="ม.3">ม.3</option><option value="ม.4">ม.4</option><option value="ม.5">ม.5</option><option value="ม.6">ม.6</option></select>
                    <select id="edit-room-num"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select>
                </div>
            </div>
            <div class="form-group-edit"><label>เลขที่</label><input type="number" id="edit-number"></div>
            <button onclick="saveProfileData()" class="btn-action" style="width: 100%; justify-content: center;">บันทึกข้อมูล</button>
            <div id="saving-status" style="margin-top: 15px; display: none; color: #10b981;">กำลังบันทึก...</div>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">ลงชื่อเข้าเรียน</h3>
            <div id="g_id_onload" data-client_id="717590675447-98867qquq15bhc3t5cot57f8c99e5ll3.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby901YIN3KkAJXTItn_ySYqqecw4tT8rArbASqOa768Mpgah8XQjYX8jMVSj9w0VC6C/exec"; 

        function applyTheme(themeKey) {
            document.body.setAttribute("data-theme", themeKey);
            localStorage.setItem('smart_theme', themeKey);
            document.querySelectorAll(".theme-btn").forEach(b => b.classList.remove("active"));
            const btn = document.querySelector(`.theme-btn[data-theme="${themeKey}"]`);
            if(btn) btn.classList.add("active");
            startThemeParticles(themeKey);
        }

        function startThemeParticles(theme) {
            const container = document.getElementById("particleContainer");
            if(!container) return;
            container.innerHTML = "";
            const char = theme === 'love' ? '🌸' : theme === 'snow' ? '❄️' : '✨';
            setInterval(() => {
                const p = document.createElement("div");
                p.className = "theme-particle";
                p.style.left = Math.random() * 100 + "vw";
                p.style.fontSize = (Math.random() * 15 + 15) + "px";
                p.style.animationDuration = (Math.random() * 5 + 5) + "s";
                p.innerHTML = char;
                container.appendChild(p);
                setTimeout(() => p.remove(), 10000);
            }, 800);
        }

        function handleCredentialResponse(response) {
            const userData = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('student_email', userData.email);
            localStorage.setItem('student_name', userData.name); 
            localStorage.setItem('student_pic', userData.picture);
            localStorage.setItem('is_logged_in', 'true');
            location.reload();
        }

        function logout() { localStorage.clear(); location.reload(); }
        function openEditProfileModal() { document.getElementById('editProfileModal').classList.add('active'); }
        function closeEditProfileModal() { document.getElementById('editProfileModal').classList.remove('active'); }

        async function fetchDataFromServer(isSilent = true) {
            const email = localStorage.getItem('student_email');
            if (!email) return;
            const syncBtn = document.getElementById('btn-sync');
            if(syncBtn) syncBtn.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i> กำลังอัปเดต...';

            try {
                const cacheBuster = new Date().getTime();
                const actRes = await fetch(GOOGLE_SCRIPT_URL + "?action=getActivities&t=" + cacheBuster);
                const actData = await actRes.json();
                localStorage.setItem('global_activities', JSON.stringify(actData.data || []));

                const stdRes = await fetch(GOOGLE_SCRIPT_URL + "?t=" + cacheBuster);
                const allStudents = await stdRes.json();
                const myData = allStudents.find(s => s.email === email);
                
                if(myData) {
                    localStorage.setItem(email + '_studentid', myData.studentId || '');
                    localStorage.setItem(email + '_custom_name', myData.name || '');
                    localStorage.setItem(email + '_room', myData.room || '');
                    localStorage.setItem(email + '_number', myData.number || '');
                    
                    // ล้างสถานะเก่าแล้วอัปเดตใหม่ตาม Sheets
                    const allActs = JSON.parse(localStorage.getItem('global_activities') || '[]');
                    allActs.forEach(a => {
                        localStorage.removeItem(email + '_act_' + a.id + '_status');
                        localStorage.removeItem(email + '_act_' + a.id + '_score');
                    });

                    if(myData.works) for(let id in myData.works) localStorage.setItem(email + '_act_' + id + '_status', 'submitted');
                    if(myData.scores) for(let id in myData.scores) {
                        localStorage.setItem(email + '_act_' + id + '_score', myData.scores[id]);
                        localStorage.setItem(email + '_act_' + id + '_status', 'graded');
                    }
                } else {
                    // ถ้าไม่พบใน Sheets ให้ล้างข้อมูลในเครื่องทิ้ง
                    localStorage.removeItem(email + '_studentid');
                    localStorage.removeItem(email + '_custom_name');
                    localStorage.removeItem(email + '_room');
                    localStorage.removeItem(email + '_number');
                }
            } catch(e) { console.error(e); }
            renderUI(email);
            if(syncBtn) syncBtn.innerHTML = '<i class="fas fa-sync-alt"></i> อัปเดตข้อมูล';
        }

        setInterval(() => { if(localStorage.getItem('is_logged_in')) fetchDataFromServer(true); }, 60000);

        function renderUI(email) {
            if(!email) { document.getElementById('loginModal').classList.add('active'); return; }
            document.getElementById('profile-name').innerText = localStorage.getItem(email + '_custom_name') || localStorage.getItem('student_name');
            document.getElementById('profile-email').innerText = email;
            document.getElementById('profile-pic-img').src = localStorage.getItem('student_pic');
            document.getElementById('profile-pic-img').style.display = 'block';
            document.getElementById('display-studentid').innerText = localStorage.getItem(email + '_studentid') || '-';
            document.getElementById('display-room').innerText = localStorage.getItem(email + '_room') || '-';
            document.getElementById('display-number').innerText = localStorage.getItem(email + '_number') || '-';
            document.getElementById('student-details-box').style.display = 'block';
            document.getElementById('editProfileBtn').style.display = 'inline-block';
            document.getElementById('loginArea').innerHTML = `<div class="user-info"><img src="${localStorage.getItem('student_pic')}" class="user-avatar"><button class="logout-btn" onclick="logout()">ออก</button></div>`;

            const container = document.getElementById('dynamic-modules-container');
            const allActs = JSON.parse(localStorage.getItem('global_activities') || '[]');
            const myRoom = localStorage.getItem(email + '_room') || "";
            const filtered = allActs.filter(a => a.targetRoom === "ทุกห้อง" || a.targetRoom === myRoom);

            if(filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center; opacity:0.6;">ยังไม่มีบทเรียน</p>';
                return;
            }

            container.innerHTML = "";
            let earned = 0, total = 0, done = 0;
            filtered.forEach(act => {
                const status = localStorage.getItem(email + '_act_' + act.id + '_status');
                const score = parseInt(localStorage.getItem(email + '_act_' + act.id + '_score') || 0);
                const isClosed = act.status === 'closed';
                if(act.type !== 'content') { total += parseInt(act.points || 0); earned += score; if(status) done++; }
                
                container.innerHTML += `
                    <div class="task-card" style="border-left: 5px solid ${act.type === 'content' ? '#a855f7' : '#3b82f6'}">
                        <div><h4>${act.title}</h4><p style="font-size:0.8rem; opacity:0.7;">${act.desc}</p></div>
                        <div style="text-align:right">
                            <span class="badge" style="background:rgba(0,0,0,0.1)">${status === 'graded' ? 'ตรวจแล้ว' : status ? 'รอตรวจ' : 'ยังไม่ส่ง'}</span>
                            <div style="margin-top:5px">
                                ${isClosed ? '<button class="btn-action" disabled style="background:#64748b">🔒 ปิดรับ</button>' : `<a href="${act.link}?actid=${act.id}" class="btn-action">เข้าทำ</a>`}
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('total-score').innerHTML = `${earned} / ${total}`;
            const percent = total > 0 ? Math.round((done / filtered.filter(a=>a.type!=='content').length) * 100) : 0;
            document.getElementById('progress-fill').style.width = percent + "%";
        }

        async function saveProfileData() {
            const email = localStorage.getItem('student_email');
            const data = {
                email: email,
                studentId: document.getElementById('edit-studentid').value,
                name: document.getElementById('edit-name').value,
                room: document.getElementById('edit-grade').value + "/" + document.getElementById('edit-room-num').value,
                number: document.getElementById('edit-number').value
            };
            document.getElementById('saving-status').style.display = 'block';
            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            location.reload();
        }

        window.onload = () => { applyTheme(localStorage.getItem('smart_theme') || 'default'); if(localStorage.getItem('is_logged_in')) loadStudentData(); };
    </script>
</body>
</html>
