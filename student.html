<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ห้องเรียนของฉัน | PROT Smart Workspace</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* CSS หลัก (ตัดย่อเพื่อให้โฟกัสโครงสร้างได้ง่าย โค้ดเดิมทั้งหมด) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; overflow-x: hidden; cursor: default; }
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); color: white; }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff 0%, #e0f0ff 50%, #f0f8ff 100%); color: #1e293b; }
        
        .content-layer { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(59,130,246,0.3); }
        body[data-theme="snow"] header { background: rgba(200, 220, 250, 0.8); border-bottom-color: rgba(255,255,255,0.5); }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; color: transparent; text-decoration: none; }
        .nav-links { display: flex; gap: 24px; list-style: none; align-items: center; }
        .nav-links a { text-decoration: none; color: #e2e8f0; padding: 8px 12px; border-radius: 30px; transition: 0.3s; }
        body[data-theme="snow"] .nav-links a { color: #2d3748; }
        .nav-links a.active { color: #60a5fa; background: rgba(96,165,250,0.1); }
        
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.15); padding: 5px 15px 5px 10px; border-radius: 50px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; padding: 5px 12px; border-radius: 30px; cursor: pointer; color: inherit; }
        
        .dashboard-container { display: grid; grid-template-columns: 320px 1fr; gap: 30px; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .profile-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); padding: 30px; border-radius: 28px; text-align: center; border: 1px solid rgba(255,255,255,0.1); height: fit-content; }
        body[data-theme="snow"] .profile-card { background: rgba(255, 255, 255, 0.7); border-color: rgba(0,0,0,0.1); }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 15px auto; border: 3px solid #60a5fa; object-fit: cover; display: none; }
        
        .score-box { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 20px; margin-top: 15px; }
        body[data-theme="snow"] .score-box { background: rgba(255,255,255,0.5); }
        .score-box h2 { color: #60a5fa; font-size: 2.5rem; margin: 5px 0; }
        body[data-theme="snow"] .score-box h2 { color: #3b82f6; }
        .progress-bar-bg { background: rgba(0,0,0,0.3); height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-bar-fill { background: #3b82f6; height: 100%; width: 0%; transition: 0.5s; }
        
        .content-area { display: flex; flex-direction: column; gap: 30px; }
        .section-header { font-size: 1.3rem; font-weight: 700; border-bottom: 3px solid #3b82f6; padding-bottom: 12px; margin-bottom: 20px; }
        
        .task-card { background: rgba(0,0,0,0.2); backdrop-filter: blur(12px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        body[data-theme="snow"] .task-card { background: rgba(255,255,255,0.7); border-color: rgba(0,0,0,0.1); }
        .task-info h4 { margin: 0 0 8px 0; font-size: 1.1rem; color: #60a5fa; }
        body[data-theme="snow"] .task-info h4 { color: #3b82f6; }
        .task-meta { text-align: right; min-width: 130px; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: inline-block; margin-bottom: 8px; }
        .badge.done { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.5); }
        .badge.pending { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.5); }
        .btn-action { background: #3b82f6; color: white; padding: 8px 20px; border-radius: 30px; text-decoration: none; font-size: 0.85rem; font-family: 'Prompt'; }
        
        @media (max-width: 768px) { .dashboard-container { grid-template-columns: 1fr; } .task-card { flex-direction: column; text-align: center; gap: 15px; } }
    </style>
</head>
<body data-theme="default">
    <div class="content-layer">
        <header>
            <a href="index.html" class="logo"><i class="fas fa-robot"></i><span>PROT Smart Workspace</span></a>
            <div style="display: flex; align-items: center; gap: 30px;">
                <ul class="nav-links">
                    <li><a href="index.html">หน้าหลัก</a></li>
                    <li><a href="student.html" class="active">ห้องเรียนของฉัน</a></li>
                    <li><a href="extra_subjects.html">วิชาเพิ่มเติม</a></li>
                </ul>
                <div class="login-area" id="loginArea"></div>
            </div>
        </header>

        <div class="page-content-wrapper">
            <div class="dashboard-container">
                <div class="profile-card">
                    <img src="" id="profile-pic-img" class="profile-pic" alt="Avatar">
                    <h3 id="profile-name">นักเรียน</h3>
                    <p id="profile-email" style="opacity:0.8; font-size:0.85rem; margin-bottom:15px;">กรุณาเข้าสู่ระบบ</p>
                    
                    <div class="score-box">
                        <p><i class="fas fa-chart-line"></i> คะแนนเก็บรวมของคุณ</p>
                        <h2 id="total-score">0 <span style="font-size: 1rem;">/ 100</span></h2>
                        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
                    </div>
                </div>

                <div class="content-area">
                    
                    <div>
                        <div class="section-header"><i class="fas fa-book-open"></i> บทเรียนภาคปฏิบัติ (Modules)</div>
                        <div id="dynamic-modules-container">
                            </div>
                    </div>

                    <div style="margin-top: 30px;">
                        <div class="section-header"><i class="fas fa-history"></i> วิชาเพิ่มเติมของคุณ</div>
                        <div id="enrolled-container"></div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. ฟังก์ชันจัดการข้อมูล "ส่วนตัว" แบบแยกตามอีเมล
        // ==========================================
        function getUserKey(keyName) {
            const email = localStorage.getItem('student_email');
            if(!email) return null;
            return email + '_' + keyName; // เช่น student1@gmail.com_total_score
        }

        function saveUserData(keyName, value) {
            const key = getUserKey(keyName);
            if(key) localStorage.setItem(key, value);
        }

        function getUserData(keyName, defaultValue = null) {
            const key = getUserKey(keyName);
            if(!key) return defaultValue;
            return localStorage.getItem(key) || defaultValue;
        }

        // ==========================================
        // 2. ดึงข้อมูลมาแสดงผล
        // ==========================================
        function loadStudentData() {
            const email = localStorage.getItem('student_email');
            if (!email) {
                alert('⚠️ กรุณาเข้าสู่ระบบ');
                window.location.href = 'index.html';
                return;
            }

            // แสดงโปรไฟล์
            document.getElementById('profile-name').innerText = localStorage.getItem('student_name');
            document.getElementById('profile-email').innerText = email;
            document.getElementById('profile-pic-img').src = localStorage.getItem('student_pic');
            document.getElementById('profile-pic-img').style.display = 'block';

            // เมนูบาร์
            document.getElementById('loginArea').innerHTML = `
                <div class="user-info">
                    <img src="${localStorage.getItem('student_pic')}" class="user-avatar">
                    <span style="color:white; font-size:0.9rem;">${localStorage.getItem('student_name').split(' ')[0]}</span>
                    <button class="logout-btn" onclick="logout()">ออก</button>
                </div>
            `;

            // ดึงคะแนนส่วนตัว (อิงจากอีเมล)
            let score = parseInt(getUserData('total_score', '0'));
            document.getElementById('total-score').innerHTML = score + ' <span style="font-size: 1rem;">/ 100</span>';
            document.getElementById('progress-fill').style.width = Math.min((score/100)*100, 100) + '%';

            // ดึงบทเรียนที่ครูโพสต์ไว้ (Global)
            loadDynamicModules();

            // ดึงวิชาที่ตัวเองลงทะเบียน (Personal)
            loadEnrolledSubjects();
        }

        function loadDynamicModules() {
            const container = document.getElementById('dynamic-modules-container');
            const activities = JSON.parse(localStorage.getItem('global_activities') || '[]');
            
            if (activities.length === 0) {
                container.innerHTML = '<div class="task-card" style="justify-content:center; opacity:0.7;"><p>ยังไม่มีบทเรียนที่ครูโพสต์ในขณะนี้</p></div>';
                return;
            }

            container.innerHTML = '';
            activities.forEach(act => {
                // เช็คว่า "เรา" (อีเมลนี้) ส่งงานชิ้นนี้ (id นี้) หรือยัง
                const isDone = getUserData('act_' + act.id + '_done') === 'true';
                
                const badgeHtml = isDone 
                    ? `<span class="badge done">✅ ส่งแล้ว</span>` 
                    : `<span class="badge pending">⏳ ค้างส่งงาน</span>`;
                
                const scoreText = isDone ? `รอตรวจ (${act.points} คะแนน)` : `คะแนนเต็ม ${act.points}`;
                const btnHtml = act.link !== '#' 
                    ? `<a href="${act.link}" class="btn-action">เข้าห้อง Lab <i class="fas fa-arrow-right"></i></a>` 
                    : ``;

                container.innerHTML += `
                    <div class="task-card" style="border-left: 4px solid #3b82f6;">
                        <div class="task-info">
                            <h4>${act.title}</h4>
                            <p>${act.desc}</p>
                        </div>
                        <div class="task-meta">
                            ${badgeHtml}
                            <span style="display:block; font-size:0.8rem; margin:8px 0; color:#60a5fa;">${scoreText}</span>
                            ${btnHtml}
                        </div>
                    </div>
                `;
            });
        }

        function loadEnrolledSubjects() {
            const container = document.getElementById('enrolled-container');
            const enrolledData = JSON.parse(getUserData('enrolled_subjects', '[]'));
            
            if (enrolledData.length > 0) {
                container.innerHTML = '';
                enrolledData.forEach(subject => {
                    container.innerHTML += `
                    <div class="task-card" style="border-left: 4px solid #10b981;">
                        <div class="task-info">
                            <h4 style="color:#10b981;"><i class="fas fa-check-circle"></i> ${subject}</h4>
                            <p>ลงทะเบียนผ่านระบบเรียบร้อย</p>
                        </div>
                    </div>`;
                });
            } else {
                container.innerHTML = '<div class="task-card" style="justify-content:center; opacity:0.7;"><p>คุณยังไม่ได้ลงทะเบียนวิชาเพิ่มเติม</p></div>';
            }
        }

        function logout() {
            localStorage.removeItem('is_logged_in');
            window.location.href = 'index.html';
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('smart_theme') || "default";
            document.body.setAttribute("data-theme", savedTheme);
            loadStudentData();
        };
    </script>
</body>
</html>
