<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ห้องเรียนของฉัน | PROT Smart Workspace</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ==================== 1. CSS โครงสร้างหลัก (จาก template) ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; overflow-x: hidden; position: relative; }
        
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); color: white; }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff 0%, #e0f0ff 50%, #f0f8ff 100%); color: #1e293b; }
        body[data-theme="forest"] { background: linear-gradient(135deg, #1a3c1a 0%, #2d5a2d 50%, #3e7a3e 100%); color: white; }
        body[data-theme="halloween"] { background: linear-gradient(135deg, #1a0b1a 0%, #2d1a2d 50%, #401040 100%); color: white; }
        body[data-theme="love"] { background: linear-gradient(135deg, #ffb7c5 0%, #ff9eb0 50%, #ff85a0 100%); color: #1e293b; }
        
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .bg-animation .circle { position: absolute; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0) 70%); border-radius: 50%; animation: float 20s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } }
        
        .content-layer { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; }
        
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(59,130,246,0.3); flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 12px; text-decoration: none; }
        
        .nav-links { display: flex; gap: 24px; list-style: none; flex-wrap: wrap; align-items: center; }
        .nav-links a { text-decoration: none; color: #e2e8f0; font-weight: 500; transition: 0.3s; padding: 8px 12px; border-radius: 30px; }
        .nav-links a:hover, .nav-links a.active { color: #60a5fa; background: rgba(96,165,250,0.1); }
        body[data-theme="snow"] .nav-links a, body[data-theme="love"] .nav-links a { color: #2d3748; }
        body[data-theme="snow"] .nav-links a.active, body[data-theme="love"] .nav-links a.active { color: #3b82f6; background: rgba(59,130,246,0.1); }
        
        .login-btn { background: linear-gradient(135deg, #3b82f6, #2563eb); border: none; padding: 10px 24px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; font-family: 'Prompt'; }
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.15); padding: 5px 15px 5px 10px; border-radius: 50px; backdrop-filter: blur(4px); }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #3b82f6; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; padding: 5px 12px; border-radius: 30px; color: white; cursor: pointer; }
        
        /* ==================== 2. CSS สำหรับหน้า Dashboard ==================== */
        .page-content-wrapper { padding: 40px 20px; max-width: 900px; margin: 0 auto; width: 100%; z-index: 10; position: relative; }
        
        .profile-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        body[data-theme="snow"] .profile-card, body[data-theme="love"] .profile-card { background: rgba(255,255,255,0.9); border-color: rgba(0,0,0,0.1); color: #1e293b; }
        
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #3b82f6; object-fit: cover; }
        .profile-details h2 { margin-bottom: 5px; font-size: 1.8rem; }
        .profile-details p { color: #94a3b8; margin-bottom: 5px; }
        body[data-theme="snow"] .profile-details p, body[data-theme="love"] .profile-details p { color: #64748b; }
        
        .activity-card { background: rgba(0,0,0,0.4); border-radius: 15px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        body[data-theme="snow"] .activity-card, body[data-theme="love"] .activity-card { background: white; border-color: rgba(0,0,0,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .activity-card:hover { transform: translateY(-3px); border-color: #3b82f6; }
        
        .act-info h3 { margin-bottom: 8px; font-size: 1.2rem; }
        .badge { padding: 4px 12px; border-radius: 30px; font-size: 0.8rem; font-weight: 600; display: inline-block; margin-top: 5px; }
        .badge.pending { background: #f59e0b; color: white; }
        .badge.done { background: #10b981; color: white; }
        .badge.banned { background: #ef4444; color: white; }
        
        .btn-action { background: #3b82f6; color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Prompt'; text-decoration: none; display: inline-block; }
        .btn-action:hover { background: #2563eb; transform: scale(1.05); }
        .btn-banned { background: #ef4444 !important; cursor: not-allowed; opacity: 0.9; }
        .btn-banned:hover { transform: none; background: #dc2626 !important; }

        /* Login Modal */
        .login-modal { position: fixed; inset:0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.3s; }
        .login-modal.active { visibility: visible; opacity: 1; }
        .login-modal-content { background: rgba(30, 41, 59, 0.95); border-radius: 30px; padding: 40px; max-width: 400px; width: 90%; text-align: center; border: 1px solid rgba(59,130,246,0.5); position: relative; }
        .close-modal { position: absolute; top: 15px; right: 25px; font-size: 2rem; cursor: pointer; color: white; background: none; border: none; }
        
        /* Loading Overlay */
        #loadingOverlay { position: fixed; inset:0; background: rgba(0,0,0,0.8); z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; color: white; }
    </style>
</head>
<body data-theme="default">
    <div class="bg-animation"><div class="circle" style="width:400px; height:400px; top:-100px; left:-100px;"></div></div>

    <div id="loadingOverlay">
        <i class="fas fa-spinner fa-spin fa-4x" style="color: #3b82f6; margin-bottom: 20px;"></i>
        <h2>กำลังตรวจสอบสิทธิ์การสอบ...</h2>
        <p>กรุณารอสักครู่ ห้ามปิดหน้าต่างนี้</p>
    </div>

    <div class="content-layer">
        <header>
            <a href="index.html" class="logo"><i class="fas fa-robot"></i><span>PROT Smart Workspace</span></a>
            <div style="display: flex; align-items: center; gap: 30px;">
                <ul class="nav-links">
                    <li><a href="index.html">หน้าหลัก</a></li>
                    <li><a href="student.html" class="active">ห้องเรียนของฉัน</a></li>
                </ul>
                <div id="loginArea">
                    <button class="login-btn" id="showLoginBtn"><i class="fas fa-sign-in-alt"></i> ลงชื่อเข้าเรียน</button>
                </div>
            </div>
        </header>

        <div class="page-content-wrapper">
            
            <div class="profile-card" id="profileSection" style="display: none;">
                <img src="" id="stAvatar" class="profile-avatar" alt="Profile">
                <div class="profile-details">
                    <h2 id="stName">ชื่อนักเรียน</h2>
                    <p id="stEmail"><i class="fas fa-envelope"></i> email@example.com</p>
                    <p id="stId"><i class="fas fa-id-badge"></i> รหัสประจำตัว: <span id="stIdVal">-</span></p>
                    <button onclick="editProfile()" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: inherit; padding: 5px 15px; border-radius: 20px; cursor: pointer; margin-top: 10px; font-family: 'Prompt';"><i class="fas fa-edit"></i> แก้ไขข้อมูลส่วนตัว</button>
                </div>
            </div>

            <div id="dashboardSection" style="display: none;">
                <h2 style="margin-bottom: 20px; color: #60a5fa;"><i class="fas fa-tasks"></i> ภารกิจและแบบทดสอบ</h2>
                <div id="activityList">
                    </div>
            </div>

            <div id="guestSection" style="text-align: center; padding: 50px 20px;">
                <i class="fas fa-lock fa-5x" style="color: #64748b; margin-bottom: 20px;"></i>
                <h2>กรุณาลงชื่อเข้าใช้</h2>
                <p style="color: #94a3b8; margin-top: 10px;">เพื่อดูบทเรียนและภารกิจของคุณ</p>
            </div>
        </div>
    </div>

    <div id="loginModal" class="login-modal">
        <div class="login-modal-content">
            <button class="close-modal" onclick="closeLoginModal()">&times;</button>
            <h3 style="color:white; margin-bottom:10px;"><i class="fas fa-user-graduate"></i> ลงชื่อเข้าเรียน</h3>
            <p style="color:#94a3b8; margin-bottom:20px;">ใช้อีเมล @gmail.com หรือ @prot.ac.th</p>
            <div id="g_id_onload" data-client_id="YOUR_CLIENT_ID" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
            <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="center"></div>
        </div>
    </div>

    <script>
        // 🌟 1. ตั้งค่าลิงก์ Validator สำหรับตรวจการโกง 🌟
        const VALIDATOR_URL = "https://script.google.com/macros/s/AKfycbyyXbMRmMGgIiSz49VmPhym-vQi01u8I2Z-rDdOhk8AKFCTy77cJGFGALyEV_31nrak/exec"; 

        // จำลองข้อมูลกิจกรรม (ครูสามารถเปลี่ยนให้ดึงจาก Google Script (MAIN_URL) ได้ตามปกติ)
        const mockActivities = [
            { id: "ACT01", title: "ใบงานที่ 1: ส่วนประกอบของหุ่นยนต์", type: "worksheet", link: "worksheet1.html", status: "done" },
            { id: "FINAL_EXAM", title: "แบบทดสอบปลายภาควิชาหุ่นยนต์", type: "exam", link: "quiz.html?actid=FINAL_EXAM", status: "pending" }
        ];

        // 🌟 2. ฟังก์ชันตรวจสอบสิทธิ์ก่อนเข้าห้องสอบ 🌟
        async function handleExamClick(examUrl) {
            const sid = document.getElementById('stIdVal').innerText;
            if(!sid || sid === "-") {
                alert("⚠️ กรุณากด 'แก้ไขข้อมูลส่วนตัว' เพื่อกรอกรหัสประจำตัวก่อนเข้าสอบครับ");
                return;
            }

            // แสดงหน้าโหลดดักไว้
            const loader = document.getElementById('loadingOverlay');
            loader.style.display = 'flex';

            let userIP = "unknown";
            try { const r = await fetch('https://api64.ipify.org?format=json'); const d = await r.json(); userIP = d.ip; } catch(e) {}

            try {
                // ยิงไปถามเซิร์ฟเวอร์ว่าเด็กคนนี้ (IP นี้ หรือ ID นี้) เคยโกงไหม
                const res = await fetch(`${VALIDATOR_URL}?action=checkBanStatus&id=${sid}&ip=${userIP}`);
                const data = await res.json();

                loader.style.display = 'none'; // ปิดหน้าโหลด

                if(data.banned) {
                    // ถ้าโดนแบน -> ล็อกเครื่อง, บันทึกประวัติ, เปลี่ยนปุ่มเป็นสีแดง
                    localStorage.setItem('is_banned', 'true');
                    alert(`🚨 ยุติการสอบ: ระบบไม่อนุญาตให้เข้าสอบ\n\nสาเหตุ: ${data.reason}\nกรุณาติดต่อครูผู้สอนเพื่อชี้แจงครับ`);
                    renderDashboard(); // รีเฟรชปุ่มในหน้าเว็บให้เป็นสีแดงทันที
                } else {
                    // ถ้าประวัติสะอาด -> ปล่อยเข้าสอบ
                    window.location.href = examUrl;
                }
            } catch(e) {
                loader.style.display = 'none';
                alert("❌ ระบบขัดข้อง ไม่สามารถตรวจสอบสิทธิ์ได้ กรุณาลองใหม่อีกครั้ง");
            }
        }

        // 🌟 3. ฟังก์ชันวาด Dashboard และจัดการปุ่ม 🌟
        function renderDashboard() {
            const list = document.getElementById('activityList');
            list.innerHTML = "";
            const isBanned = localStorage.getItem('is_banned') === 'true'; // เช็คสถานะแบนในเครื่อง

            mockActivities.forEach(act => {
                let badge, btn;
                const isExam = act.type === "exam";

                // กรณีโดนแบน และเป็นข้อสอบ
                if (isExam && isBanned) {
                    badge = `<span class="badge banned"><i class="fas fa-ban"></i> ทุจริต</span>`;
                    btn = `<button class="btn-action btn-banned" onclick="alert('🚨 คุณหมดสิทธิ์สอบเนื่องจากมีประวัติการทุจริต กรุณาติดต่อครูผู้สอน')">❌ หมดสิทธิ์สอบ</button>`;
                } 
                // กรณีปกติ ส่งแล้ว
                else if (act.status === "done") {
                    badge = `<span class="badge done"><i class="fas fa-check-circle"></i> ตรวจแล้ว</span>`;
                    btn = `<button class="btn-action" style="background:#64748b; cursor:not-allowed;" disabled>ดูคะแนน</button>`;
                } 
                // กรณีปกติ ยังไม่ส่ง
                else {
                    badge = `<span class="badge pending"><i class="fas fa-clock"></i> ค้างส่ง</span>`;
                    if (isExam) {
                        // ถ้าเป็นข้อสอบ ให้เรียกฟังก์ชัน handleExamClick เพื่อเช็คสิทธิ์ก่อน
                        btn = `<button class="btn-action" onclick="handleExamClick('${act.link}')"><i class="fas fa-play"></i> เริ่มทำ</button>`;
                    } else {
                        // ถ้าเป็นใบงานปกติ ให้เข้าลิ้งก์ได้เลย
                        btn = `<a href="${act.link}" class="btn-action" style="text-decoration:none;"><i class="fas fa-pen"></i> ทำใบงาน</a>`;
                    }
                }

                list.innerHTML += `
                    <div class="activity-card">
                        <div class="act-info">
                            <h3>${act.title}</h3>
                            ${badge}
                        </div>
                        <div class="act-action">
                            ${btn}
                        </div>
                    </div>
                `;
            });
        }

        // ==================== ระบบ Login & พื้นฐาน ====================
        function handleCredentialResponse(response) {
            // โค้ดถอดรหัส JWT
            let base64Url = response.credential.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            let userData = JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
            
            localStorage.setItem('is_logged_in', 'true');
            localStorage.setItem('student_name', userData.name);
            localStorage.setItem('student_email', userData.email);
            localStorage.setItem('student_pic', userData.picture);
            
            closeLoginModal();
            loadUserData();
        }

        function loadUserData() {
            if(localStorage.getItem('is_logged_in') === 'true') {
                const email = localStorage.getItem('student_email');
                document.getElementById('guestSection').style.display = 'none';
                document.getElementById('profileSection').style.display = 'flex';
                document.getElementById('dashboardSection').style.display = 'block';
                
                document.getElementById('stName').innerText = localStorage.getItem('student_name');
                document.getElementById('stEmail').innerHTML = `<i class="fas fa-envelope"></i> ${email}`;
                document.getElementById('stAvatar').src = localStorage.getItem('student_pic');
                
                const sid = localStorage.getItem(email + '_studentid');
                document.getElementById('stIdVal').innerText = sid ? sid : "- (กรุณาแก้ไขข้อมูล)";

                // เปลี่ยนปุ่ม Login ด้านบนเป็นโปรไฟล์
                document.getElementById('loginArea').innerHTML = `
                    <div class="user-info">
                        <img src="${localStorage.getItem('student_pic')}" class="user-avatar">
                        <span style="color:white; font-weight:600;">${localStorage.getItem('student_name').split(' ')[0]}</span>
                        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                `;

                // โหลด Dashboard
                renderDashboard();
            }
        }

        function editProfile() {
            const currentId = document.getElementById('stIdVal').innerText.replace("- (กรุณาแก้ไขข้อมูล)", "");
            const newId = prompt("กรุณากรอกรหัสประจำตัวนักเรียนของคุณ:", currentId);
            if(newId) {
                const email = localStorage.getItem('student_email');
                localStorage.setItem(email + '_studentid', newId);
                document.getElementById('stIdVal').innerText = newId;
                alert("บันทึกรหัสประจำตัวเรียบร้อยแล้ว");
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function openLoginModal() { document.getElementById('loginModal').classList.add('active'); }
        function closeLoginModal() { document.getElementById('loginModal').classList.remove('active'); }

        window.onload = function() {
            const theme = localStorage.getItem('smart_theme') || "default";
            document.body.setAttribute("data-theme", theme);
            
            document.getElementById('showLoginBtn')?.addEventListener('click', openLoginModal);
            loadUserData();
        };
    </script>
</body>
</html>
