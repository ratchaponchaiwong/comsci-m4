<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ห้องปฏิบัติการอัจฉริยะ | PROT Smart Workspace</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ==================== CSS โครงสร้างหลักและธีม ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; overflow-x: hidden; cursor: default; }
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); color: white; }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff 0%, #e0f0ff 50%, #f0f8ff 100%); color: #1e293b; }
        body[data-theme="forest"] { background: linear-gradient(135deg, #1a3c1a 0%, #2d5a2d 50%, #3e7a3e 100%); color: white; }
        body[data-theme="halloween"] { background: linear-gradient(135deg, #1a0b1a 0%, #2d1a2d 50%, #401040 100%); color: white; }
        body[data-theme="love"] { background: linear-gradient(135deg, #ffb7c5 0%, #ff9eb0 50%, #ff85a0 100%); color: #1e293b; }
        
        .content-layer { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Navigation Menu */
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(59,130,246,0.3); flex-wrap: wrap; gap: 15px;}
        body[data-theme="snow"] header { background: rgba(200, 220, 250, 0.8); border-bottom-color: rgba(255,255,255,0.5); }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; color: transparent; text-decoration: none; display: flex; align-items: center; gap: 12px;}
        .nav-links { display: flex; gap: 24px; list-style: none; align-items: center; flex-wrap: wrap;}
        .nav-links a { text-decoration: none; color: #e2e8f0; font-weight: 500; transition: 0.3s; padding: 8px 12px; border-radius: 30px; }
        body[data-theme="snow"] .nav-links a, body[data-theme="love"] .nav-links a { color: #2d3748; }
        .nav-links a:hover, .nav-links a.active { color: #60a5fa; background: rgba(96,165,250,0.1); }
        
        .login-area { display: flex; align-items: center; gap: 15px; }
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.15); padding: 5px 15px 5px 10px; border-radius: 50px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #3b82f6; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; padding: 5px 12px; border-radius: 30px; cursor: pointer; color: inherit; font-size: 0.8rem;}

        /* Theme Switcher */
        .theme-switcher { background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); padding: 12px 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 10px auto; border-radius: 50px; width: fit-content; border: 1px solid rgba(255,255,255,0.2); }
        .theme-btn { background: rgba(255,255,255,0.2); border: none; padding: 8px 20px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: 'Prompt'; }
        .theme-btn.active { background: #3b82f6; box-shadow: 0 0 15px rgba(59,130,246,0.5); }

        /* ==================== CSS Layout ห้อง Lab ==================== */
        .page-content-wrapper { padding: 20px; max-width: 1600px; margin: 0 auto; width: 100%; transition: 0.3s; flex-grow: 1;}
        
        /* สลับมุมมอง 1 หน้า / 2 หน้า */
        .lab-container { display: grid; gap: 20px; transition: 0.3s; height: calc(100vh - 180px); min-height: 600px;}
        .lab-container.split-view { grid-template-columns: 450px 1fr; }
        .lab-container.single-view { grid-template-columns: 1fr; }

        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.2); color: inherit; display: flex; flex-direction: column; overflow: hidden; }
        body[data-theme="snow"] .glass-panel, body[data-theme="love"] .glass-panel { background: rgba(255, 255, 255, 0.8); border-color: rgba(0,0,0,0.1); color: #1e293b; }

        .layout-toggle { text-align: right; margin-bottom: 10px; }
        .toggle-btn { background: rgba(255,255,255,0.1); color: inherit; border: 1px solid rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-family: 'Prompt'; font-size: 0.85rem; transition: 0.2s; margin-left: 10px;}
        .toggle-btn.active, .toggle-btn:hover { background: #3b82f6; border-color: #3b82f6; color: white; }
        body[data-theme="snow"] .toggle-btn { border-color: rgba(0,0,0,0.1); background: rgba(0,0,0,0.05); }
        body[data-theme="snow"] .toggle-btn.active { background: #3b82f6; color: white; }

        /* พื้นที่แสดงสื่อ YouTube / PDF / Canva */
        .media-tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .media-tab { padding: 8px 15px; border-radius: 10px; font-size: 0.85rem; cursor: pointer; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; white-space: nowrap; color: inherit; font-family: 'Prompt';}
        .media-tab.active { background: #ef4444; color: white; border-color: #ef4444; }
        .media-tab.doc-tab.active { background: #3b82f6; border-color: #3b82f6;}
        .media-tab.canva-tab.active { background: #8b5cf6; border-color: #8b5cf6;}
        
        .media-container { width: 100%; border-radius: 12px; overflow: hidden; background: #000; position: relative; aspect-ratio: 16 / 9; display: none; margin-bottom: 20px;}
        .media-container iframe { width: 100%; height: 100%; border: none; position: absolute; top:0; left:0;}

        /* ข้อมูลคำสั่งและส่งงาน */
        .instruction-box { flex-grow: 1; overflow-y: auto; padding-right: 10px; font-size: 0.95rem; line-height: 1.6; }
        .submit-box { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; margin-top: 15px; }
        body[data-theme="snow"] .submit-box { border-top-color: rgba(0,0,0,0.1); }
        
        .work-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: inherit; font-family: 'Prompt'; margin-bottom: 10px; }
        body[data-theme="snow"] .work-input { background: rgba(255,255,255,0.8); border-color: rgba(0,0,0,0.2); }
        
        .btn-submit { background: #10b981; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-family: 'Prompt'; font-weight: 600; font-size: 1rem; transition: 0.2s; }
        .btn-submit:hover { background: #059669; transform: translateY(-2px); }

        /* Wokwi Iframe */
        .lab-frame { width: 100%; height: 100%; border-radius: 15px; border: none; background: #1e1e1e; }

        @media (max-width: 950px) { .lab-container.split-view { grid-template-columns: 1fr; height: auto; } .lab-frame { height: 500px; } }
    </style>
</head>
<body data-theme="default">
    <div class="content-layer">
        <header>
            <a href="student.html" class="logo"><i class="fas fa-chevron-left"></i> กลับห้องเรียน</a>
            <div class="nav-links" style="font-weight: 600; color: #60a5fa;" id="act-title-header">
                กำลังโหลดกิจกรรม...
            </div>
            <div class="login-area" id="loginArea"></div>
        </header>

        <div class="theme-switcher">
            <button class="theme-btn" data-theme="default">🤖 เริ่มต้น</button>
            <button class="theme-btn" data-theme="snow">❄️ หิมะ</button>
            <button class="theme-btn" data-theme="forest">🌿 ป่าเขียว</button>
            <button class="theme-btn" data-theme="halloween">🎃 ฮัลโลวีน</button>
            <button class="theme-btn" data-theme="love">🌸 ซากุระ</button>
        </div>

        <div class="page-content-wrapper">
            <div class="layout-toggle">
                <button class="toggle-btn" id="btn-single" onclick="setLayout('single')"><i class="fas fa-square"></i> 1 หน้าจอ (ใหญ่)</button>
                <button class="toggle-btn active" id="btn-split" onclick="setLayout('split')"><i class="fas fa-columns"></i> 2 หน้าจอ (แบ่งซ้ายขวา)</button>
            </div>

            <div class="lab-container split-view" id="mainWrapper">
                
                <div class="glass-panel" id="leftPanel">
                    
                    <div class="media-tabs" id="mediaTabs"></div>
                    <div class="media-container" id="mediaBox"></div>

                    <div class="instruction-box">
                        <h3 style="color: #60a5fa; margin-bottom: 10px;"><i class="fas fa-info-circle"></i> คำชี้แจงกิจกรรม</h3>
                        <p id="act-desc-body">กรุณารอสักครู่ ระบบกำลังดึงข้อมูล...</p>
                    </div>

                    <div class="submit-box">
                        <h4 style="margin-bottom: 10px;"><i class="fas fa-upload"></i> ส่งผลงาน (จำลอง)</h4>
                        <input type="text" id="work-link" class="work-input" placeholder="วางลิงก์ผลงานของคุณที่นี่ (เช่น ลิงก์ Wokwi)">
                        <button class="btn-submit" onclick="submitWork()">
                            <i class="fas fa-paper-plane"></i> ยืนยันส่งงาน / บันทึกการแก้ไข
                        </button>
                    </div>
                </div>

                <div class="glass-panel" style="padding: 10px;">
                    <iframe id="labFrame" class="lab-frame" src="about:blank" title="Wokwi Simulator"></iframe>
                </div>

            </div>
        </div>
    </div>

    <script>
        // ==================== Theme & Auth ====================
        document.querySelectorAll(".theme-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.body.setAttribute("data-theme", btn.getAttribute("data-theme"));
                localStorage.setItem('smart_theme', btn.getAttribute("data-theme"));
                document.querySelectorAll(".theme-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            });
        });

        function loadLoginInfo() {
            const email = localStorage.getItem('student_email');
            if(!email) { alert("กรุณาเข้าสู่ระบบก่อนใช้งาน"); window.location.href = "index.html"; return; }
            
            const name = localStorage.getItem(email + '_custom_name') || localStorage.getItem('student_name');
            const pic = localStorage.getItem('student_pic');
            
            document.getElementById('loginArea').innerHTML = `
                <div class="user-info">
                    <img src="${pic}" class="user-avatar" alt="avatar">
                    <span style="color:inherit; font-size:0.9rem;">${name.split(' ')[0]}</span>
                </div>
            `;
        }

        // ==================== ระบบสลับ Layout ====================
        function setLayout(type) {
            const wrapper = document.getElementById('mainWrapper');
            const btnSingle = document.getElementById('btn-single');
            const btnSplit = document.getElementById('btn-split');

            if(type === 'single') {
                wrapper.classList.replace('split-view', 'single-view');
                btnSingle.classList.add('active'); btnSplit.classList.remove('active');
            } else {
                wrapper.classList.replace('single-view', 'split-view');
                btnSplit.classList.add('active'); btnSingle.classList.remove('active');
            }
        }

        // ==================== โหลดข้อมูลกิจกรรมและสื่อ ====================
        const urlParams = new URLSearchParams(window.location.search);
        const actId = urlParams.get('actid');

        function loadActivityData() {
            const activities = JSON.parse(localStorage.getItem('global_activities') || '[]');
            const act = activities.find(a => a.id == actId);

            if (!act) {
                document.getElementById('act-title-header').innerText = "ไม่พบกิจกรรม หรือ ไม่ได้ระบุ ID";
                document.getElementById('act-desc-body').innerText = "กรุณากลับไปที่หน้าห้องเรียน แล้วกดเข้าทำกิจกรรมใหม่อีกครั้งครับ";
                document.getElementById('labFrame').src = "https://wokwi.com/projects/new/arduino-uno"; // โหลด Wokwi เปล่าๆ ไว้เผื่อ
                return;
            }

            // 1. ใส่ชื่อและรายละเอียด
            document.getElementById('act-title-header').innerHTML = `<i class="fas fa-laptop-code"></i> ${act.title}`;
            document.getElementById('act-desc-body').innerText = act.desc;
            
            // 2. โหลด Wokwi ฝั่งขวา (ถ้าครูไม่ใส่ลิงก์มา จะใช้ลิงก์ Arduino เปล่าๆ)
            const labFrame = document.getElementById('labFrame');
            labFrame.src = (act.link && act.link !== "#" && act.link.includes('http')) ? act.link : "https://wokwi.com/projects/new/arduino-uno";

            // 3. จัดการแท็บสื่อ (YouTube, PDF, Canva)
            const tabs = document.getElementById('mediaTabs');
            let hasMedia = false;

            if (act.yt) {
                addTab("yt-tab", "<i class='fab fa-youtube'></i> YouTube", () => showMedia(formatYT(act.yt)));
                hasMedia = true;
            }
            if (act.doc) {
                addTab("doc-tab", "<i class='fas fa-file-pdf'></i> ไฟล์เอกสาร", () => showMedia(act.doc));
                hasMedia = true;
            }
            if (act.canva) {
                addTab("canva-tab", "<i class='fas fa-paint-brush'></i> Canva", () => showMedia(formatCanva(act.canva)));
                hasMedia = true;
            }

            // ถ้ามีสื่อ ให้แสดงสื่อแรกอัตโนมัติ
            if (hasMedia) tabs.children[0].click();

            // 4. ดึงลิงก์งานเก่ามาใส่ช่องถ้าเคยส่งแล้ว
            const email = localStorage.getItem('student_email');
            const savedLink = localStorage.getItem(email + '_act_' + actId + '_work_link');
            if (savedLink) {
                document.getElementById('work-link').value = savedLink;
            }
        }

        // ฟังก์ชันสร้างปุ่มเลือกสื่อ
        function addTab(className, label, callback) {
            const btn = document.createElement('button');
            btn.className = `media-tab ${className}`;
            btn.innerHTML = label;
            btn.onclick = (e) => {
                document.querySelectorAll('.media-tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                callback();
            };
            document.getElementById('mediaTabs').appendChild(btn);
        }

        // ฟังก์ชันแสดง Iframe ของสื่อ
        function showMedia(url) {
            const box = document.getElementById('mediaBox');
            box.style.display = 'block';
            box.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
        }

        // แปลงลิงก์ YouTube ให้เป็น Embed Format
        function formatYT(url) {
            if (!url) return "";
            let id = "";
            if(url.includes('v=')) id = url.split('v=')[1].split('&')[0];
            else if(url.includes('youtu.be/')) id = url.split('youtu.be/')[1].split('?')[0];
            return id ? `https://www.youtube.com/embed/${id}` : url;
        }

        // แปลงลิงก์ Canva ให้เป็น Embed Format
        function formatCanva(url) {
            if (!url) return "";
            return url.includes('/view') && !url.includes('embed') ? url.replace('/view', '/view?embed') : url;
        }

        // ==================== ระบบส่งงานเข้า LocalStorage ====================
        function submitWork() {
            const email = localStorage.getItem('student_email');
            const link = document.getElementById('work-link').value;
            
            if(!email) return alert("⚠️ กรุณาล็อกอินก่อนส่งงาน");
            if(!link) return alert("⚠️ กรุณาวางลิงก์ผลงานของคุณก่อนกดส่งครับ (เช่น ลิงก์จาก Wokwi)");

            // บันทึกสถานะว่า "ส่งแล้ว (submitted)" พร้อมเก็บลิงก์งานไว้
            localStorage.setItem(email + '_act_' + actId + '_status', 'submitted');
            localStorage.setItem(email + '_act_' + actId + '_work_link', link);
            
            alert("🎉 ระบบได้รับผลงานของคุณเรียบร้อยแล้ว! (สถานะในหน้าห้องเรียนจะเปลี่ยนเป็น ส่งแล้ว)");
            window.location.href = "student.html"; // เด้งกลับไปดูสถานะ
        }

        // Initialize
        window.onload = () => {
            const savedTheme = localStorage.getItem('smart_theme') || "default";
            document.body.setAttribute("data-theme", savedTheme);
            document.querySelector(`.theme-btn[data-theme="${savedTheme}"]`)?.classList.add("active");
            
            loadLoginInfo();
            loadActivityData();
        };
    </script>
</body>
</html>
