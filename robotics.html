<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>ห้อง Lab หุ่นยนต์ | PROT Smart Workspace</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* CSS หลัก (คงโครงสร้างเดิมทั้งหมด) */
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s ease, border-color 0.3s, color 0.3s;}
        body { font-family: 'Prompt', 'Inter', sans-serif; overflow-x: hidden; cursor: default; }
        
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); color: white; }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff 0%, #e0f0ff 50%, #f0f8ff 100%); color: #1e293b; }
        body[data-theme="forest"] { background: linear-gradient(135deg, #1a3c1a 0%, #2d5a2d 50%, #3e7a3e 100%); color: white; }
        body[data-theme="halloween"] { background: linear-gradient(135deg, #1a0b1a 0%, #2d1a2d 50%, #401040 100%); color: white; }
        body[data-theme="love"] { background: linear-gradient(135deg, #ffb7c5 0%, #ff9eb0 50%, #ff85a0 100%); color: #1e293b; }
        
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .bg-animation .circle { position: absolute; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0) 70%); border-radius: 50%; animation: float 20s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0) translateX(0) scale(1); } 25% { transform: translateY(-30px) translateX(20px) scale(1.05); } 75% { transform: translateY(30px) translateX(-20px) scale(0.95); } }
        .bg-animation .circle:nth-child(1) { width: 400px; height: 400px; top: -100px; left: -100px; animation-duration: 25s; }
        .bg-animation .circle:nth-child(2) { width: 600px; height: 600px; bottom: -200px; right: -100px; animation-duration: 30s; animation-delay: -5s; }
        
        .content-layer { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }
        
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 10px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(59,130,246,0.3); }
        .logo { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; color: transparent; text-decoration: none; }
        
        .user-info { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.15); padding: 4px 12px 4px 8px; border-radius: 50px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #3b82f6; }
        .user-name { font-size: 0.85rem; font-weight: 500; color: inherit; }
        
        /* Workspace CSS */
        :root { --panel-bg: rgba(30, 41, 59, 0.6); --border-ws: rgba(255,255,255,0.1); --editor-bg: rgba(15, 23, 42, 0.8); --accent: #3b82f6; }
        body[data-theme="snow"] { --panel-bg: rgba(255, 255, 255, 0.85); --border-ws: rgba(0,0,0,0.1); --editor-bg: #ffffff; --accent: #ff6b6b; }
        body[data-theme="forest"] { --panel-bg: rgba(30, 60, 30, 0.6); --accent: #10b981; --editor-bg: rgba(10, 30, 10, 0.8); }
        body[data-theme="love"] { --panel-bg: rgba(255, 255, 255, 0.85); --border-ws: rgba(255,105,180,0.3); --editor-bg: #fff0f5; --accent: #ec4899; }

        .workspace-wrapper { display: flex; flex: 1; padding: 20px; gap: 20px; overflow: hidden; transition: 0.3s; }
        
        .sidebar { width: 350px; background: var(--panel-bg); backdrop-filter: blur(12px); border-radius: 20px; padding: 20px; border: 1px solid var(--border-ws); display: flex; flex-direction: column; transition: 0.3s; overflow-y: auto;}
        .task-title { color: var(--accent); font-weight: 700; font-size: 1.2rem; margin-bottom: 10px; }
        .task-desc { font-size: 0.95rem; opacity: 0.8; margin-bottom: 15px; }
        
        /* 🌟 CSS สำหรับกล่องโจทย์ที่เพิ่มใหม่ 🌟 */
        .problem-box {
            background: rgba(59, 130, 246, 0.15);
            border-left: 4px solid var(--accent);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 12px 12px 0;
            display: none; /* ซ่อนไว้ก่อน จะแสดงเมื่อมีข้อมูล */
            flex-shrink: 0;
        }
        body[data-theme="forest"] .problem-box { background: rgba(16, 185, 129, 0.15); border-left-color: #10b981; }
        body[data-theme="love"] .problem-box { background: rgba(236, 72, 153, 0.15); border-left-color: #ec4899; }
        body[data-theme="snow"] .problem-box { background: rgba(255, 107, 107, 0.15); border-left-color: #ff6b6b; }
        
        .problem-title { font-weight: 700; color: var(--accent); margin-bottom: 8px; font-size: 1rem; display: flex; align-items: center; gap: 8px;}
        .problem-text { font-size: 0.9rem; line-height: 1.6; white-space: pre-wrap; color: inherit; }

        .upload-section { background: rgba(16, 185, 129, 0.1); border-radius: 16px; padding: 15px; border: 1px solid #10b981; margin-top: auto; flex-shrink: 0;}
        .wokwi-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-ws); background: var(--editor-bg); color: inherit; font-family: 'Prompt'; margin-bottom: 10px; outline: none; transition: 0.3s;}
        .wokwi-input:focus { border-color: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        body[data-theme="snow"] .wokwi-input, body[data-theme="love"] .wokwi-input { border-color: #cbd5e1; }
        
        .btn-submit { background: #10b981; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-family: 'Prompt'; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .btn-submit:hover:not(:disabled) { background: #059669; transform: translateY(-2px); }
        .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; transform: none; border-color: #94a3b8; }
        
        .main-panel { flex: 1; background: var(--panel-bg); border-radius: 20px; border: 1px solid var(--border-ws); overflow: hidden; display: flex; position: relative;}
        .iframe-container { width: 100%; height: 100%; border: none; background: #ffffff; }

        /* ==================== 🎯 โหมดโฟกัส 🎯 ==================== */
        body.focus-mode header { display: none !important; }
        body.focus-mode .workspace-wrapper { padding: 10px; height: 100vh; }
        body.focus-mode .sidebar { width: 280px; }
        
        #exit-focus-btn {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 10000;
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Prompt';
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            transition: 0.3s;
            align-items: center;
            gap: 8px;
        }
        #exit-focus-btn:hover { background: #dc2626; transform: scale(1.05); }
        body.focus-mode #exit-focus-btn { display: flex; }

        @media (max-width: 768px) {
            .workspace-wrapper { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; flex-shrink: 0; }
            .main-panel { min-height: 60vh; }
        }
    </style>
</head>
<body data-theme="default">
    <div class="bg-animation"><div class="circle"></div><div class="circle"></div></div>
    
    <button id="exit-focus-btn" onclick="toggleFocusMode()">
        <i class="fas fa-compress-arrows-alt"></i> แสดงเมนูด้านบน
    </button>

    <div class="content-layer">
        <header>
            <a href="index.html" class="logo"><i class="fas fa-robot"></i> PROT Smart Workspace</a>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button onclick="toggleFocusMode()" style="background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid #3b82f6; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-family: 'Prompt'; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s;">
                    <i class="fas fa-expand-arrows-alt"></i> เต็มจอ
                </button>
                <a href="student.html" style="color: inherit; text-decoration: none; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; font-weight: bold;"><i class="fas fa-arrow-left"></i> กลับห้องเรียน</a>
                <div class="user-info" id="loginArea">
                    <i class="fas fa-spinner fa-spin"></i> กำลังโหลด...
                </div>
            </div>
        </header>

        <div class="workspace-wrapper">
            <div class="sidebar">
                <div class="task-title" id="task-title"><i class="fas fa-microchip"></i> กำลังโหลดข้อมูลงาน...</div>
                <div class="task-desc" id="task-desc">กรุณารอสักครู่ ระบบกำลังเชื่อมต่อฐานข้อมูล</div>
                <div id="task-deadline" style="font-size: 0.85rem; color: #ef4444; margin-bottom: 15px; font-weight: 600;"></div>
                
                <div id="problem-box" class="problem-box">
                    <div class="problem-title"><i class="fas fa-clipboard-list"></i> โจทย์ / สิ่งที่ต้องทำ</div>
                    <div class="problem-text" id="task-problem">กำลังโหลดโจทย์...</div>
                </div>

                <div class="upload-section">
                    <p style="font-size: 0.85rem; font-weight: 600; margin-bottom: 8px;"><i class="fas fa-link"></i> วางลิงก์ผลงาน Wokwi ที่นี่</p>
                    <input type="text" id="wokwi-link" class="wokwi-input" placeholder="https://wokwi.com/projects/...">
                    <button class="btn-submit" id="submitBtnLab" onclick="submitWork()">
                        <i class="fas fa-paper-plane"></i> ยืนยันการส่งงาน
                    </button>
                </div>
            </div>

            <div class="main-panel">
                 <iframe id="wokwi-iframe" class="iframe-container" src="https://wokwi.com/projects/new/esp32"></iframe>
            </div>
        </div>
    </div>

    <script>
        // 🌟 1. ใส่ลิงก์ Google Script ของครู 🌟
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby901YIN3KkAJXTItn_ySYqqecw4tT8rArbASqOa768Mpgah8XQjYX8jMVSj9w0VC6C/exec";

        function getVal(obj, ...keys) {
            if (!obj) return undefined;
            for (let key of keys) {
                const realKey = Object.keys(obj).find(k => String(k).trim().toLowerCase() === String(key).trim().toLowerCase());
                if (realKey !== undefined && obj[realKey] !== "" && obj[realKey] !== null) return obj[realKey];
            }
            return undefined;
        }

        let isPastDeadlineGlobal = false;

        // โหลดข้อมูลนักเรียนและเนื้อหางาน
        async function loadUserData() {
            const email = localStorage.getItem('student_email');
            if (!email) {
                alert("กรุณาเข้าสู่ระบบก่อนใช้งาน");
                window.location.href = "student.html"; return;
            }
            const name = localStorage.getItem('student_name') || "นักเรียน";
            const pic = localStorage.getItem('student_pic') || "https://ui-avatars.com/api/?name=S";
            document.getElementById('loginArea').innerHTML = `<img src="${pic}" class="user-avatar"><span class="user-name">${name.split(' ')[0]}</span>`;
            
            const theme = localStorage.getItem('smart_theme') || "default";
            document.body.setAttribute('data-theme', theme);

            const urlParams = new URLSearchParams(window.location.search);
            const actId = urlParams.get('actid');
            
            if(actId) {
                try {
                    let currentRealTime = new Date().getTime();
                    try {
                        const timeRes = await fetch('https://worldtimeapi.org/api/timezone/Asia/Bangkok');
                        const timeData = await timeRes.json();
                        currentRealTime = new Date(timeData.datetime).getTime();
                    } catch(e) {}

                    const cacheBuster = new Date().getTime();
                    const res = await fetch(GOOGLE_SCRIPT_URL + "?action=readAll&t=" + cacheBuster);
                    const db = await res.json();
                    const currentAct = db.activities.find(a => getVal(a, 'id', 'รหัสงาน', 'ID') == actId);
                    
                    if(currentAct) {
                        document.getElementById('task-title').innerHTML = `<i class="fas fa-microchip"></i> ${getVal(currentAct, 'title', 'ชื่อหัวข้อ')}`;
                        document.getElementById('task-desc').innerText = getVal(currentAct, 'desc', 'description', 'รายละเอียด') || "ไม่มีคำอธิบายเพิ่มเติม";

                        // 🌟 ดึงข้อมูลมาแสดงในกล่องโจทย์ 🌟
                        let problemData = getVal(currentAct, 'expected_output', 'ผลลัพธ์ที่ถูกต้อง', 'เฉลย', 'โจทย์');
                        if (problemData && problemData.trim() !== "") {
                            document.getElementById('problem-box').style.display = 'block'; // เปิดกล่องโจทย์
                            document.getElementById('task-problem').innerText = problemData;
                        }

                        // หากครูใส่ลิงก์ Wokwi แบบเริ่มต้นมาให้ในชีต (คอลัมน์ link) ให้เปิดลิงก์นั้นเลย
                        let customLink = getVal(currentAct, 'link', 'ลิงก์');
                        if(customLink && customLink.includes("wokwi.com")) {
                            document.getElementById('wokwi-iframe').src = customLink;
                        }

                        let rawDate = getVal(currentAct, 'date', 'วันที่');
                        let rawTime = getVal(currentAct, 'time', 'เวลา');
                        if (rawDate) {
                            if (String(rawDate).includes('T')) rawDate = String(rawDate).split('T')[0];
                            if (String(rawTime).includes('T')) rawTime = String(rawTime).split('T')[1].substring(0,5);
                            else if (String(rawTime).length >= 5) rawTime = String(rawTime).substring(0,5);

                            let timeObj = (rawTime !== '-' && rawTime) ? rawTime : '23:59';
                            if (timeObj.split(':').length === 2) timeObj += ':00';
                            
                            let deadlineTime = new Date(`${rawDate}T${timeObj}`).getTime();
                            if (currentRealTime > deadlineTime) {
                                isPastDeadlineGlobal = true;
                                document.getElementById('task-deadline').innerHTML = `<i class="fas fa-ban"></i> หมดเวลาส่งงานแล้ว (${rawDate} | ${rawTime})`;
                                const btn = document.getElementById('submitBtnLab');
                                btn.disabled = true;
                                btn.innerHTML = '<i class="fas fa-lock"></i> หมดเวลาส่งงาน';
                                btn.style.background = '#ef4444';
                                btn.style.borderColor = '#ef4444';
                                document.getElementById('wokwi-link').disabled = true;
                            } else {
                                document.getElementById('task-deadline').innerHTML = `<i class="far fa-clock"></i> กำหนดส่ง: ${rawDate} | ${rawTime}`;
                                document.getElementById('task-deadline').style.color = '#10b981';
                            }
                        }
                    } else {
                        document.getElementById('task-title').innerHTML = `<i class="fas fa-microchip"></i> ห้องปฏิบัติการหุ่นยนต์`;
                        document.getElementById('task-desc').innerText = `ไม่พบข้อมูลงานในระบบ กรุณากลับไปหน้าหลัก`;
                    }
                } catch(e) {
                    document.getElementById('task-title').innerHTML = `<i class="fas fa-microchip"></i> ห้องปฏิบัติการหุ่นยนต์`;
                    document.getElementById('task-desc').innerText = `เกิดข้อผิดพลาดในการดึงข้อมูล`;
                }
            } else {
                document.getElementById('task-title').innerHTML = `<i class="fas fa-microchip"></i> ห้องปฏิบัติการหุ่นยนต์ (โหมดอิสระ)`;
                document.getElementById('task-desc').innerText = `จำลองการต่อวงจรและเขียนโปรแกรมได้อย่างอิสระ (ไม่มีการส่งงาน)`;
                document.getElementById('submitBtnLab').style.display = 'none';
                document.querySelector('.upload-section').style.display = 'none';
            }
        }

        // 🌟 ฟังก์ชันสลับโหมดโฟกัส (รองรับทั้งคอมและ iPad) 🌟
        function toggleFocusMode() {
            document.body.classList.toggle('focus-mode');
            
            if (document.body.classList.contains('focus-mode')) {
                try {
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(()=>{});
                    } else if (document.documentElement.webkitRequestFullscreen) {
                        document.documentElement.webkitRequestFullscreen();
                    }
                } catch(e) {}
            } else {
                try {
                    if (document.exitFullscreen) {
                        document.exitFullscreen().catch(()=>{});
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    }
                } catch(e) {}
            }
        }

        // 🌟 ระบบส่งงาน (อัปเดตแก้บั๊กเรียบร้อย) 🌟
        async function submitWork() {
            if(isPastDeadlineGlobal) return alert("หมดเวลาส่งงานแล้วครับ ไม่สามารถส่งได้");

            const link = document.getElementById('wokwi-link').value.trim();
            if (link === "" || !link.includes("wokwi.com")) return alert("กรุณาวางลิงก์ของ Wokwi ให้ถูกต้องก่อนส่งครับ!");
            if(!confirm("ยืนยันการส่งลิงก์ผลงานนี้ใช่หรือไม่?")) return;

            const urlParams = new URLSearchParams(window.location.search);
            const actId = urlParams.get('actid'); 
            const email = localStorage.getItem('student_email');
            const studentId = localStorage.getItem(email + '_studentid');
            // 🌟 เพิ่มการดึงชื่อนักเรียน
            const studentName = localStorage.getItem('student_name') || "ไม่ระบุชื่อ";

            if (!actId) {
                alert("❌ ไม่พบรหัสกิจกรรม! กรุณากลับไปเข้าผ่านหน้า 'ห้องเรียนของฉัน'");
                window.location.href = "student.html"; return;
            }
            if (!studentId || studentId === '-' || studentId === '') {
                alert("❌ ไม่พบรหัสประจำตัวนักเรียน!\nกรุณากลับไปหน้า 'ห้องเรียนของฉัน' แล้วกด 'แก้ไขข้อมูลส่วนตัว' ก่อนส่งงานครับ");
                window.location.href = "student.html"; return;
            }

            const btn = document.getElementById('submitBtnLab');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังตรวจสอบและส่งงาน...'; 
            btn.disabled = true;

            try {
                const timeRes = await fetch('https://worldtimeapi.org/api/timezone/Asia/Bangkok');
                const timeData = await timeRes.json();
                const nowCheck = new Date(timeData.datetime).getTime();
                
                const cacheBuster = new Date().getTime();
                const res = await fetch(GOOGLE_SCRIPT_URL + "?action=readAll&t=" + cacheBuster);
                const db = await res.json();
                const currentAct = db.activities.find(a => getVal(a, 'id', 'รหัสงาน', 'ID') == actId);
                
                if (currentAct && getVal(currentAct, 'date', 'วันที่')) {
                    let rawDate = getVal(currentAct, 'date', 'วันที่');
                    let rawTime = getVal(currentAct, 'time', 'เวลา') || '23:59';
                    if (String(rawDate).includes('T')) rawDate = String(rawDate).split('T')[0];
                    if (String(rawTime).includes('T')) rawTime = String(rawTime).split('T')[1].substring(0,5);
                    if (rawTime.split(':').length === 2) rawTime += ':00';
                    
                    if (nowCheck > new Date(`${rawDate}T${rawTime}`).getTime()) {
                        alert("หมดเวลาส่งงานพอดีครับ ไม่สามารถบันทึกข้อมูลได้");
                        window.location.href = "student.html";
                        return;
                    }
                }
            } catch(e) {} 

            // รูปแบบข้อมูลส่งให้ Google Sheets
            const finalWorkContent = "📌 ลิงก์ Wokwi:\n" + link;

            try {
                await fetch(GOOGLE_SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    // 🌟 ส่งเป็น Text plain ป้องกัน CORS
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ 
                        action: "submitWork",
                        student_id: studentId,
                        student_name: studentName, // ส่งชื่อไปด้วย
                        activity_id: actId,
                        work_content: finalWorkContent
                    }) 
                });
                
                alert('✅ ส่งงานสำเร็จ! ระบบจะพากลับไปหน้าห้องเรียน'); 
                window.location.href = 'student.html'; 
            } catch(e) {
                alert('❌ ขัดข้องในการเชื่อมต่อ กรุณาลองใหม่'); 
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> ยืนยันการส่งงาน'; 
                btn.disabled = false;
            }
        }
        
        window.onload = loadUserData;
    </script>
    <script>
    (function() {
        const CRU_EMAILS = ['ratchapon@prot.ac.th', 'teacher@prot.ac.th', 'ratchaponchaiwong@gmail.com'];
        const activeEmail = localStorage.getItem('student_email');
        if (activeEmail && CRU_EMAILS.includes(activeEmail)) {
            // 1. แปลงลิงก์และปุ่มทั้งหมดที่มุ่งหน้าไปหา student.html ให้เบี่ยงเส้นทางมาหาครูทันที
            document.querySelectorAll('a[href="student.html"], button[onclick*="student.html"]').forEach(element => {
                if(element.tagName === 'A') {
                    element.href = 'teacher_dashboard.html';
                } else if(element.getAttribute('onclick')) {
                    element.setAttribute('onclick', "window.location.href='teacher_dashboard.html'");
                }
            });
            // 2. ดักปุ่มที่มีข้อความแนว "กลับห้องเรียน" หรือ "ห้องเรียนของฉัน"
            document.querySelectorAll('a, button').forEach(el => {
                if(el.textContent.includes('ห้องเรียน') || el.textContent.includes('กลับห้องเรียน')) {
                    el.addEventListener('click', function(e) {
                        e.preventDefault();
                        window.location.href = 'teacher_dashboard.html';
                    });
                }
            });
        }
    })();
</script>
</body>
</html>
