<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ห้อง Lab หุ่นยนต์ | PROT Smart Workspace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s ease, border-color 0.3s, color 0.3s;}
        body { font-family: 'Prompt', 'Inter', sans-serif; overflow-x: hidden; }
        
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); color: white; }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff 0%, #e0f0ff 50%, #f0f8ff 100%); color: #1e293b; }
        body[data-theme="forest"] { background: linear-gradient(135deg, #1a3c1a 0%, #2d5a2d 50%, #3e7a3e 100%); color: white; }
        body[data-theme="halloween"] { background: linear-gradient(135deg, #1a0b1a 0%, #2d1a2d 50%, #401040 100%); color: white; }
        body[data-theme="love"] { background: linear-gradient(135deg, #ffb7c5 0%, #ff9eb0 50%, #ff85a0 100%); color: #1e293b; }
        
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .bg-animation .circle { position: absolute; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0) 70%); border-radius: 50%; animation: float 20s infinite ease-in-out; }
        body[data-theme="snow"] .bg-animation .circle { background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 70%); }
        body[data-theme="forest"] .bg-animation .circle { background: radial-gradient(circle, rgba(144,238,144,0.2) 0%, rgba(144,238,144,0) 70%); }
        body[data-theme="love"] .bg-animation .circle { background: radial-gradient(circle, rgba(255,105,180,0.25) 0%, rgba(255,105,180,0) 70%); }
        @keyframes float { 0%, 100% { transform: translateY(0) translateX(0) scale(1); } 25% { transform: translateY(-30px) translateX(20px) scale(1.05); } 75% { transform: translateY(30px) translateX(-20px) scale(0.95); } }
        .bg-animation .circle:nth-child(1) { width: 400px; height: 400px; top: -100px; left: -100px; animation-duration: 25s; }
        .bg-animation .circle:nth-child(2) { width: 600px; height: 600px; bottom: -200px; right: -100px; animation-duration: 30s; animation-delay: -5s; }
        
        .content-layer { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }
        
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 10px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(59,130,246,0.3); }
        body[data-theme="snow"] header, body[data-theme="love"] header { background: rgba(255, 255, 255, 0.8); border-bottom-color: rgba(0,0,0,0.1); }
        .logo { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; color: transparent; text-decoration: none; }
        body[data-theme="snow"] .logo, body[data-theme="love"] .logo { background: linear-gradient(135deg, #ff6b6b, #ff8e8e); -webkit-background-clip: text; }
        
        .user-info { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.15); padding: 4px 12px 4px 8px; border-radius: 50px; }
        body[data-theme="snow"] .user-info, body[data-theme="love"] .user-info { background: rgba(0,0,0,0.05); }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #3b82f6; }
        .user-name { font-size: 0.85rem; font-weight: 500; color: inherit; }

        :root { --panel-bg: rgba(30, 41, 59, 0.6); --border-ws: rgba(255,255,255,0.1); --editor-bg: rgba(15, 23, 42, 0.8); --accent: #3b82f6; }
        body[data-theme="snow"] { --panel-bg: rgba(255, 255, 255, 0.85); --border-ws: rgba(0,0,0,0.1); --editor-bg: #ffffff; --accent: #ff6b6b; }
        body[data-theme="forest"] { --panel-bg: rgba(30, 60, 30, 0.6); --accent: #10b981; --editor-bg: rgba(10, 30, 10, 0.8); }
        body[data-theme="love"] { --panel-bg: rgba(255, 255, 255, 0.85); --border-ws: rgba(255,105,180,0.3); --editor-bg: #fff0f5; --accent: #ec4899; }

        .workspace-wrapper { display: flex; flex: 1; padding: 20px; gap: 20px; overflow: hidden; }
        
        .sidebar { width: 300px; background: var(--panel-bg); backdrop-filter: blur(12px); border-radius: 20px; padding: 20px; border: 1px solid var(--border-ws); display: flex; flex-direction: column; }
        .task-title { color: var(--accent); font-weight: 700; font-size: 1.1rem; margin-bottom: 10px; }
        .task-desc { font-size: 0.9rem; opacity: 0.8; margin-bottom: 20px; }
        
        .upload-section { background: rgba(16, 185, 129, 0.1); border-radius: 16px; padding: 15px; border: 1px solid #10b981; margin-top: auto; }
        .upload-section input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border-ws); background: var(--editor-bg); color: inherit; font-family: 'Prompt'; font-size: 0.85rem; margin-top: 8px;}
        body[data-theme="snow"] .upload-section input, body[data-theme="love"] .upload-section input { border-color: #cbd5e1; }
        .btn-submit { background: #10b981; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-family: 'Prompt'; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-submit:hover:not(:disabled) { background: #059669; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);}
        
        .main-panel { flex: 1; background: var(--panel-bg); border-radius: 20px; border: 1px solid var(--border-ws); overflow: hidden;}
        .main-panel iframe { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body data-theme="default">
    <div class="bg-animation"><div class="circle"></div><div class="circle"></div></div>
    
    <div class="content-layer">
        <header>
            <a href="index.html" class="logo"><i class="fas fa-robot"></i> PROT Smart Workspace</a>
            <div class="user-info" id="loginArea">
                <i class="fas fa-spinner fa-spin"></i> กำลังโหลด...
            </div>
        </header>

        <div class="workspace-wrapper">
            <div class="sidebar">
                <div class="task-title" id="task-title"><i class="fas fa-microchip"></i> ปฏิบัติการหุ่นยนต์</div>
                <div class="task-desc" id="task-desc">ต่อวงจรและเขียนโค้ด Arduino จำลอง เมื่อเสร็จแล้วให้นำลิงก์โปรเจคมาส่งที่นี่</div>
                
                <div class="upload-section">
                    <p style="font-size: 0.85rem; font-weight: 600;"><i class="fas fa-link"></i> วางลิงก์ Wokwi ของคุณ</p>
                    <input type="text" id="wokwi-link" placeholder="https://wokwi.com/projects/...">
                    <button class="btn-submit" id="submitBtnLab" onclick="submitWork()">
                        <i class="fas fa-paper-plane"></i> ยืนยันการส่งงาน
                    </button>
                </div>
            </div>

            <div class="main-panel">
                <iframe src="https://wokwi.com/projects/new/arduino-uno" title="Arduino Simulator"></iframe>
            </div>
        </div>
    </div>

    <script>
        // 🌟 1. ใส่ลิงก์ Google Script ที่นี่ 🌟
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby901YIN3KkAJXTItn_ySYqqecw4tT8rArbASqOa768Mpgah8XQjYX8jMVSj9w0VC6C/exec";

        // ตัวช่วยเรื่องการพิมพ์เล็ก-ใหญ่ ของ Header Sheet
        function getVal(obj, ...keys) {
            if (!obj) return undefined;
            for (let key of keys) {
                const realKey = Object.keys(obj).find(k => String(k).trim().toLowerCase() === String(key).trim().toLowerCase());
                if (realKey !== undefined && obj[realKey] !== "" && obj[realKey] !== null) return obj[realKey];
            }
            return undefined;
        }

        async function loadUserData() {
            const email = localStorage.getItem('student_email');
            if (!email) { 
                alert("กรุณาเข้าสู่ระบบก่อนใช้งาน");
                window.location.href = "student.html"; 
                return; 
            }
            
            const name = localStorage.getItem('student_name') || "นักเรียน";
            const pic = localStorage.getItem('student_pic') || "https://ui-avatars.com/api/?name=S";
            document.getElementById('loginArea').innerHTML = `<img src="${pic}" class="user-avatar"><span class="user-name">${name.split(' ')[0]}</span>`;
            document.body.setAttribute('data-theme', localStorage.getItem('smart_theme') || "default");

            // ดึงข้อมูลชื่อกิจกรรมสดๆ จากฐานข้อมูล (กัน Cache)
            const urlParams = new URLSearchParams(window.location.search);
            const actId = urlParams.get('actid');
            
            if(actId) {
                try {
                    const cacheBuster = new Date().getTime();
                    const res = await fetch(GOOGLE_SCRIPT_URL + "?action=readAll&t=" + cacheBuster);
                    const db = await res.json();
                    const currentAct = db.activities.find(a => getVal(a, 'id', 'รหัสงาน') == actId);
                    
                    if(currentAct) {
                        document.getElementById('task-title').innerHTML = `<i class="fas fa-microchip"></i> ${getVal(currentAct, 'title', 'ชื่อหัวข้อ')}`;
                        document.getElementById('task-desc').innerText = getVal(currentAct, 'desc', 'description', 'รายละเอียด');
                    }
                } catch(e) {
                    console.log("Error loading task info", e);
                }
            } else {
                document.getElementById('task-title').innerHTML = `<i class="fas fa-microchip"></i> ปฏิบัติการหุ่นยนต์ (โหมดอิสระ)`;
                document.getElementById('task-desc').innerText = `ต่อวงจรและเขียนโค้ดได้อย่างอิสระ (ไม่มีการส่งงาน)`;
                document.getElementById('submitBtnLab').style.display = 'none';
                document.getElementById('wokwi-link').style.display = 'none';
            }
        }

        // 🌟 ระบบส่งงานแบบใหม่ (เชื่อมโยงฐานข้อมูลตรง 100%) 🌟
        async function submitWork() {
            const link = document.getElementById('wokwi-link').value.trim();
            if (link === "") return alert("กรุณาวางลิงก์ Wokwi ก่อนส่งครับ!");
            if (!confirm("ยืนยันการส่งลิงก์ผลงานนี้ใช่หรือไม่?")) return;

            const urlParams = new URLSearchParams(window.location.search);
            const actId = urlParams.get('actid'); 
            const email = localStorage.getItem('student_email');
            const studentId = localStorage.getItem(email + '_studentid');

            if (!actId) {
                alert("❌ ไม่พบรหัสกิจกรรม! กรุณากลับไปเข้าผ่านหน้า 'ห้องเรียนของฉัน'");
                window.location.href = "student.html";
                return;
            }
            if (!studentId || studentId === '-' || studentId === '') {
                alert("❌ ไม่พบรหัสประจำตัวนักเรียน!\\nกรุณากลับไปหน้า 'ห้องเรียนของฉัน' แล้วกด 'แก้ไขข้อมูลส่วนตัว' ก่อนส่งงานครับ");
                window.location.href = "student.html";
                return;
            }

            const btn = document.getElementById('submitBtnLab');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังส่งงาน...'; 
            btn.disabled = true;

            const finalWorkContent = "📌 ลิงก์ Wokwi:\n" + link;

            try {
                await fetch(GOOGLE_SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ 
                        action: "submitWork",
                        student_id: studentId,
                        activity_id: actId,
                        work_content: finalWorkContent
                    }) 
                });
                
                alert('✅ ส่งงานสำเร็จ! ระบบจะพากลับไปหน้าห้องเรียน'); 
                window.location.href = 'student.html'; 
            } catch(e) {
                alert('❌ ขัดข้องในการเชื่อมต่อ กรุณาลองใหม่'); 
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> ยืนยันการส่งงาน'; 
                btn.disabled = false;
            }
        }
        
        window.onload = loadUserData;
    </script>
</body>
</html>
