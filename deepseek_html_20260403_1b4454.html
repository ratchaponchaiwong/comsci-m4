<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Admin | PROT Smart Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
        }
        .header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(59,130,246,0.3);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: #60a5fa;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            padding: 5px 15px 5px 10px;
            border-radius: 50px;
        }
        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #3b82f6;
        }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-family: 'Prompt';
        }
        .logout-btn:hover {
            background: #ef4444;
        }
        .theme-buttons {
            display: flex;
            gap: 8px;
        }
        .theme-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .theme-btn.active {
            background: #3b82f6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }
        .card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h3 {
            color: #60a5fa;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Prompt';
            font-size: 0.9rem;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Prompt';
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-danger {
            background: #ef4444;
        }
        .btn-success {
            background: #10b981;
        }
        .activity-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .activity-item {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th {
            color: #60a5fa;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .badge-green {
            background: rgba(16,185,129,0.2);
            color: #10b981;
        }
        .badge-red {
            background: rgba(239,68,68,0.2);
            color: #ef4444;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #94a3b8;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-family: 'Prompt';
        }
        .tab.active {
            background: #3b82f6;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .activity-item { flex-direction: column; text-align: center; }
            table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body id="appBody" data-theme="dark">

<div class="header">
    <div class="logo"><i class="fas fa-user-shield"></i> Admin Hub</div>
    <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
        <div class="theme-buttons">
            <button class="theme-btn" onclick="setTheme('dark')">🌙 ดำ</button>
            <button class="theme-btn" onclick="setTheme('light')">☀️ สว่าง</button>
            <button class="theme-btn" onclick="setTheme('blue')">💙 ฟ้า</button>
        </div>
        <div class="user-info" id="userInfo">
            <img id="userAvatar" class="user-avatar" src="">
            <span id="userName"></span>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> ออก</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="tabs">
        <button class="tab active" onclick="showTab('activities')">📋 จัดการกิจกรรม</button>
        <button class="tab" onclick="showTab('grading')">✅ ตรวจงาน</button>
        <button class="tab" onclick="showTab('settings')">⚙️ ตั้งค่า</button>
    </div>

    <!-- Tab 1: จัดการกิจกรรม -->
    <div id="activitiesTab" class="tab-content active">
        <div class="card">
            <h3><i class="fas fa-plus-circle"></i> เพิ่ม/แก้ไขกิจกรรม</h3>
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>ชื่อกิจกรรม</label>
                <input type="text" id="title" placeholder="เช่น ใบงานที่ 1">
            </div>
            <div class="form-group">
                <label>รายละเอียด</label>
                <textarea id="desc" rows="3" placeholder="อธิบายงาน"></textarea>
            </div>
            <div class="form-group">
                <label>วันที่ส่ง</label>
                <input type="date" id="dueDate">
            </div>
            <div class="form-group">
                <label>คะแนนเต็ม</label>
                <input type="number" id="points" value="10">
            </div>
            <div class="form-group">
                <label>สถานะ</label>
                <select id="status">
                    <option value="open">เปิดรับงาน</option>
                    <option value="closed">ปิดรับงาน</option>
                </select>
            </div>
            <button class="btn" onclick="saveActivity()"><i class="fas fa-save"></i> บันทึก</button>
            <button class="btn btn-danger" id="cancelBtn" style="display:none" onclick="cancelEdit()">ยกเลิก</button>
        </div>

        <div class="card">
            <h3><i class="fas fa-list"></i> รายการกิจกรรม</h3>
            <div id="activityList" class="activity-list">กำลังโหลด...</div>
        </div>
    </div>

    <!-- Tab 2: ตรวจงาน -->
    <div id="gradingTab" class="tab-content">
        <div class="card">
            <h3><i class="fas fa-clipboard-list"></i> ตรวจงานนักเรียน</h3>
            <div class="form-group">
                <label>เลือกกิจกรรม</label>
                <select id="selectActivity" onchange="loadSubmissions()"></select>
            </div>
            <div id="submissionsList">กรุณาเลือกกิจกรรม</div>
        </div>
    </div>

    <!-- Tab 3: ตั้งค่า -->
    <div id="settingsTab" class="tab-content">
        <div class="card">
            <h3><i class="fas fa-cog"></i> ตั้งค่าระบบ</h3>
            <p>เลือกธีมที่ด้านบน</p>
            <hr style="margin: 20px 0; border-color: rgba(255,255,255,0.1);">
            <button class="btn btn-danger" onclick="clearAllData()">🗑️ ล้างข้อมูลทั้งหมด</button>
        </div>
    </div>
</div>

<script>
    // URL ของ Google Apps Script (แก้ไขให้ถูกต้อง)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby901YIN3KkAJXTItn_ySYqqecw4tT8rArbASqOa768Mpgah8XQjYX8jMVSj9w0VC6C/exec";
    
    let activities = [];
    let students = [];
    let submissions = [];

    // ตรวจสอบการล็อกอิน
    function checkLogin() {
        const isLoggedIn = localStorage.getItem('is_logged_in');
        const userName = localStorage.getItem('student_name');
        const userPic = localStorage.getItem('student_pic');
        const userEmail = localStorage.getItem('student_email');
        
        if (isLoggedIn !== 'true') {
            window.location.href = 'index.html';
            return false;
        }
        
        if (userEmail !== 'ratchapon@prot.ac.th' && userEmail !== 'teacher@prot.ac.th') {
            alert('คุณไม่มีสิทธิ์เข้าถึงหน้านี้');
            window.location.href = 'index.html';
            return false;
        }
        
        if (userName) {
            document.getElementById('userName').innerText = userName.split(' ')[0];
            if (userPic) {
                document.getElementById('userAvatar').src = userPic;
            } else {
                document.getElementById('userAvatar').src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(userName) + '&background=3b82f6&color=fff';
            }
        }
        return true;
    }
    
    function logout() {
        if(confirm('ออกจากระบบ?')) {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    }
    
    function setTheme(theme) {
        const body = document.getElementById('appBody');
        if (theme === 'dark') {
            body.style.background = 'linear-gradient(135deg, #0f172a, #1e293b)';
            body.style.color = 'white';
        } else if (theme === 'light') {
            body.style.background = 'linear-gradient(135deg, #e0f2fe, #f0f9ff)';
            body.style.color = '#1e293b';
        } else if (theme === 'blue') {
            body.style.background = 'linear-gradient(135deg, #1e3a5f, #2c4e6e)';
            body.style.color = 'white';
        }
        localStorage.setItem('admin_theme', theme);
    }
    
    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        
        if (tab === 'activities') {
            document.getElementById('activitiesTab').classList.add('active');
            document.querySelector('.tabs button:first-child').classList.add('active');
        } else if (tab === 'grading') {
            document.getElementById('gradingTab').classList.add('active');
            document.querySelector('.tabs button:nth-child(2)').classList.add('active');
            loadActivitySelect();
        } else {
            document.getElementById('settingsTab').classList.add('active');
            document.querySelector('.tabs button:nth-child(3)').classList.add('active');
        }
    }
    
    async function loadData() {
        try {
            const response = await fetch(SCRIPT_URL + '?action=readAll');
            const data = await response.json();
            activities = data.activities || [];
            students = data.students || [];
            submissions = data.submissions || [];
            renderActivityList();
        } catch (error) {
            console.error('โหลดข้อมูลผิดพลาด:', error);
            document.getElementById('activityList').innerHTML = '<div class="loading">⚠️ โหลดข้อมูลไม่สำเร็จ</div>';
        }
    }
    
    function renderActivityList() {
        const container = document.getElementById('activityList');
        if (!activities.length) {
            container.innerHTML = '<div class="loading">ยังไม่มีกิจกรรม</div>';
            return;
        }
        container.innerHTML = activities.map(act => `
            <div class="activity-item">
                <div>
                    <strong>${act.Title}</strong><br>
                    <small>📅 ${act.Date || 'ไม่ระบุ'} | ⭐ ${act.Points} คะแนน</small>
                    <span class="badge ${act.Status === 'open' ? 'badge-green' : 'badge-red'}">${act.Status === 'open' ? 'เปิด' : 'ปิด'}</span>
                </div>
                <div>
                    <button class="btn" onclick="editActivity('${act.ID}')" style="padding: 5px 12px;"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-danger" onclick="deleteActivity('${act.ID}')" style="padding: 5px 12px;"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `).join('');
    }
    
    function editActivity(id) {
        const act = activities.find(a => a.ID == id);
        if (!act) return;
        document.getElementById('editId').value = act.ID;
        document.getElementById('title').value = act.Title;
        document.getElementById('desc').value = act.Description || '';
        document.getElementById('dueDate').value = act.Date || '';
        document.getElementById('points').value = act.Points || 10;
        document.getElementById('status').value = act.Status || 'open';
        document.getElementById('cancelBtn').style.display = 'inline-block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function cancelEdit() {
        document.getElementById('editId').value = '';
        document.getElementById('title').value = '';
        document.getElementById('desc').value = '';
        document.getElementById('dueDate').value = '';
        document.getElementById('points').value = '10';
        document.getElementById('status').value = 'open';
        document.getElementById('cancelBtn').style.display = 'none';
    }
    
    async function saveActivity() {
        const data = {
            action: 'saveActivity',
            id: document.getElementById('editId').value,
            title: document.getElementById('title').value,
            desc: document.getElementById('desc').value,
            date: document.getElementById('dueDate').value,
            points: document.getElementById('points').value,
            status: document.getElementById('status').value
        };
        if (!data.title) {
            alert('กรุณาใส่ชื่อกิจกรรม');
            return;
        }
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            alert('บันทึกสำเร็จ');
            cancelEdit();
            loadData();
        } catch (error) {
            alert('บันทึกไม่สำเร็จ');
        }
    }
    
    async function deleteActivity(id) {
        if (!confirm('ลบกิจกรรมนี้?')) return;
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteActivity', id: id }) });
            alert('ลบสำเร็จ');
            loadData();
        } catch (error) {
            alert('ลบไม่สำเร็จ');
        }
    }
    
    function loadActivitySelect() {
        const select = document.getElementById('selectActivity');
        select.innerHTML = '<option value="">-- เลือกกิจกรรม --</option>' + 
            activities.map(a => `<option value="${a.ID}">${a.Title}</option>`).join('');
    }
    
    async function loadSubmissions() {
        const actId = document.getElementById('selectActivity').value;
        if (!actId) {
            document.getElementById('submissionsList').innerHTML = 'กรุณาเลือกกิจกรรม';
            return;
        }
        const container = document.getElementById('submissionsList');
        container.innerHTML = '<div class="loading">กำลังโหลด...</div>';
        
        try {
            const response = await fetch(SCRIPT_URL + '?action=getSubmissions&activityId=' + actId);
            const subs = await response.json();
            
            if (!subs.length) {
                container.innerHTML = '<div class="loading">ยังไม่มีนักเรียนส่งงาน</div>';
                return;
            }
            
            container.innerHTML = `
                <table>
                    <thead><tr><th>ชื่อ</th><th>ห้อง</th><th>สถานะ</th><th>คะแนน</th><th>จัดการ</th></tr></thead>
                    <tbody>
                        ${subs.map(s => `
                            <tr>
                                <td>${s.name}</td>
                                <td>${s.room}</td>
                                <td><span class="badge ${s.submitted ? 'badge-green' : 'badge-red'}">${s.submitted ? 'ส่งแล้ว' : 'ยังไม่ส่ง'}</span></td>
                                <td><input type="number" id="score_${s.student_id}" value="${s.score || 0}" style="width:70px"></td>
                                <td><button class="btn" onclick="saveScore('${actId}', '${s.student_id}')">บันทึก</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } catch (error) {
            container.innerHTML = '<div class="loading">โหลดข้อมูลไม่สำเร็จ</div>';
        }
    }
    
    async function saveScore(actId, studentId) {
        const score = document.getElementById(`score_${studentId}`).value;
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'saveScore', activity_id: actId, student_id: studentId, score: score })
            });
            alert('บันทึกคะแนนสำเร็จ');
        } catch (error) {
            alert('บันทึกคะแนนไม่สำเร็จ');
        }
    }
    
    function clearAllData() {
        if (confirm('⚠️ ล้างข้อมูลทั้งหมด? การกระทำนี้ไม่สามารถกู้คืนได้')) {
            alert('ฟังก์ชันนี้ต้องการเชื่อมต่อกับฐานข้อมูล');
        }
    }
    
    // โหลดธีมที่บันทึกไว้
    const savedTheme = localStorage.getItem('admin_theme') || 'dark';
    setTheme(savedTheme);
    
    // เริ่มต้น
    if (checkLogin()) {
        loadData();
    }
</script>
</body>
</html>
