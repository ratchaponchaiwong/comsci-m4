<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ระบบจัดการครูผู้สอน | PROT Admin Hub</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ==================== 1. CSS โครงสร้างหลัก (คงเดิม 100%) ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; overflow-x: hidden; cursor: default; }
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); color: white; }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff 0%, #e0f0ff 50%, #f0f8ff 100%); color: #1e293b; }
        body[data-theme="forest"] { background: linear-gradient(135deg, #1a3c1a 0%, #2d5a2d 50%, #3e7a3e 100%); color: white; }
        body[data-theme="halloween"] { background: linear-gradient(135deg, #1a0b1a 0%, #2d1a2d 50%, #401040 100%); color: white; }
        body[data-theme="love"] { background: linear-gradient(135deg, #ffb7c5 0%, #ff9eb0 50%, #ff85a0 100%); color: #1e293b; }
        
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(59,130,246,0.3); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; color: transparent; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.15); padding: 5px 15px 5px 10px; border-radius: 50px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .logout-btn { background: rgba(239, 68, 68, 0.8); border: none; padding: 6px 15px; border-radius: 30px; color: white; cursor: pointer; font-size: 0.8rem; font-family: 'Prompt'; }
        
        .page-content-wrapper { padding: 30px 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
        
        /* ==================== 2. Admin Tabs & Panels ==================== */
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; }
        .tab-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: inherit; padding: 12px 24px; border-radius: 15px; cursor: pointer; font-family: 'Prompt'; transition: 0.3s; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
        .tab-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; box-shadow: 0 0 15px rgba(59,130,246,0.3); }

        .glass-panel { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border-radius: 24px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        body[data-theme="snow"] .glass-panel, body[data-theme="love"] .glass-panel { background: rgba(255, 255, 255, 0.8); border-color: rgba(0,0,0,0.1); color: #1e293b; }
        
        .panel-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 25px; border-bottom: 2px solid rgba(59,130,246,0.3); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; color: #60a5fa; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 500; opacity: 0.9; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: inherit; font-family: 'Prompt'; }
        body[data-theme="snow"] .form-group input, body[data-theme="snow"] .form-group select { background: white; border-color: #cbd5e1; color: black; }

        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        
        /* Table Styles */
        .table-container { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #60a5fa; font-weight: 600; background: rgba(59,130,246,0.1); }
        tr:hover { background: rgba(255,255,255,0.05); }

        .btn-action { background: #3b82f6; color: white; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-family: 'Prompt'; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59,130,246,0.4); }
        .btn-delete { background: #ef4444; padding: 6px 12px; border-radius: 8px; color: white; border:none; cursor: pointer; }
        .btn-edit { background: #f59e0b; padding: 6px 12px; border-radius: 8px; color: white; border:none; cursor: pointer; }

        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-none { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .status-done { background: rgba(16, 185, 129, 0.2); color: #10b981; }

        /* Import Area */
        .import-box { border: 2px dashed #3b82f6; border-radius: 20px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; }
        .import-box:hover { background: rgba(59,130,246,0.1); }

        @media (max-width: 1000px) { .admin-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body data-theme="default" style="display: none;" id="bodyContent">
    <header>
        <a href="index.html" class="logo"><i class="fas fa-robot"></i> PROT Admin Hub</a>
        <div id="teacherInfoUI">
            <div class="user-info">
                <img id="teacherAvatar" src="" class="user-avatar" alt="avatar">
                <span id="teacherName" class="user-name">TECHNOLOGY COMPUTER</span>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </header>

    <div class="page-content-wrapper">
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="switchTab('tab-posts')"><i class="fas fa-edit"></i> 1. จัดการบทเรียน</button>
            <button class="tab-btn" onclick="switchTab('tab-check')"><i class="fas fa-tasks"></i> 2. ตรวจงานแยกห้อง</button>
            <button class="tab-btn" onclick="switchTab('tab-import')"><i class="fas fa-file-import"></i> 3. นำเข้านักเรียน</button>
        </div>

        <div id="tab-posts" class="tab-content">
            <div class="admin-grid">
                <div class="glass-panel">
                    <div class="panel-title"><i class="fas fa-plus-circle"></i> โพสต์กิจกรรม/บทเรียนใหม่</div>
                    <input type="hidden" id="edit-id">
                    
                    <div class="form-group"><label>ชื่อบทเรียน</label><input type="text" id="act-title" placeholder="เช่น บทที่ 1: พื้นฐาน Python"></div>
                    <div class="form-group"><label>คำอธิบายสั้นๆ</label><input type="text" id="act-desc" placeholder="ให้นักเรียนทำอะไร..."></div>
                    
                    <div class="form-group" style="background: rgba(59,130,246,0.1); padding: 15px; border-radius: 12px; border: 1px solid rgba(59,130,246,0.3);">
                        <label style="color: #60a5fa;"><i class="fas fa-users"></i> มอบหมายให้ห้องเรียน</label>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;">
                            <select id="act-grade" onchange="toggleRoomSelect('act-grade', 'act-room-num')">
                                <option value="all">✅ มอบหมายทุกห้อง</option>
                                <option value="ม.1">ม.1</option><option value="ม.2">ม.2</option><option value="ม.3">ม.3</option>
                                <option value="ม.4">ม.4</option><option value="ม.5">ม.5</option><option value="ม.6">ม.6</option>
                            </select>
                            <select id="act-room-num" style="display: none; color: black;">
                                <option value="1">ห้อง 1</option><option value="2">ห้อง 2</option><option value="3">ห้อง 3</option>
                                <option value="4">ห้อง 4</option><option value="5">ห้อง 5</option><option value="6">ห้อง 6</option>
                                <option value="7">ห้อง 7</option><option value="8">ห้อง 8</option><option value="9">ห้อง 9</option>
                                <option value="10">ห้อง 10</option><option value="11">ห้อง 11</option><option value="12">ห้อง 12</option>
                                <option value="13">ห้อง 13</option><option value="14">ห้อง 14</option><option value="15">ห้อง 15</option>
                            </select>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group"><label>กำหนดส่ง</label><input type="date" id="act-date"></div>
                        <div class="form-group"><label>เวลา</label><input type="time" id="act-time" value="23:59"></div>
                    </div>
                    
                    <div class="form-group"><label>ลิงก์ห้อง Lab</label>
                        <select id="act-link">
                            <option value="#">ไม่มีห้อง Lab</option>
                            <option value="python.html">ห้อง Lab: Python</option>
                            <option value="robotics.html">ห้อง Lab: Arduino & Robotics</option>
                        </select>
                    </div>
                    <div class="form-group"><label>ลิงก์ Drive/Docs/PDF</label><input type="text" id="act-doc" placeholder="วางลิงก์เอกสารที่นี่"></div>
                    <div class="form-group"><label>คะแนนเต็ม</label><input type="number" id="act-points" value="15"></div>
                    
                    <button class="btn-action" onclick="saveActivity()" id="btn-save-main"><i class="fas fa-paper-plane"></i> โพสต์กิจกรรม</button>
                    <button class="btn-action" onclick="resetForm()" id="btn-cancel-edit" style="display:none; background:rgba(255,255,255,0.1);">ยกเลิก</button>
                </div>

                <div class="glass-panel">
                    <div class="panel-title"><i class="fas fa-list"></i> บทเรียนที่มอบหมายแล้ว</div>
                    <div id="activities-list-container" style="max-height: 600px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>

        <div id="tab-check" class="tab-content" style="display:none;">
            <div class="glass-panel">
                <div class="panel-title"><i class="fas fa-tasks"></i> ตรวจสอบการส่งงานแยกตามห้อง</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px;">
                    <div class="form-group"><label>เลือกบทเรียน</label><select id="matrix-act" onchange="renderMatrixTable()"></select></div>
                    <div class="form-group"><label>ระดับชั้น</label>
                        <select id="matrix-grade" onchange="renderMatrixTable()">
                            <option value="all">ทั้งหมด</option>
                            <option value="ม.4">ม.4</option><option value="ม.5">ม.5</option><option value="ม.6">ม.6</option>
                        </select>
                    </div>
                    <div class="form-group"><label>ห้อง</label>
                        <select id="matrix-room" onchange="renderMatrixTable()">
                            <option value="all">ทั้งหมด</option>
                            <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option>
                        </select>
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>เลขที่</th><th>ชื่อ-นามสกุล</th><th>ห้อง</th><th>สถานะ</th><th>คะแนน</th><th>จัดการ</th></tr>
                        </thead>
                        <tbody id="matrix-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-import" class="tab-content" style="display:none;">
            <div class="glass-panel">
                <div class="panel-title"><i class="fas fa-file-excel"></i> นำเข้ารายชื่อนักเรียนจาก Excel</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div class="form-group"><label>ระดับชั้น</label><select id="imp-grade"><option value="ม.4">ม.4</option><option value="ม.5">ม.5</option><option value="ม.6">ม.6</option></select></div>
                    <div class="form-group"><label>ห้อง</label><select id="imp-room"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="59">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option></select></div>
                </div>
                <div class="import-box" onclick="document.getElementById('excelInput').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; color: #3b82f6; margin-bottom: 10px;"></i>
                    <p>คลิกเพื่อเลือกไฟล์ Excel (.xlsx)</p>
                    <small>หัวตารางต้องมี: email, name, number</small>
                    <input type="file" id="excelInput" hidden accept=".xlsx" onchange="processExcel(event)">
                </div>
                <div id="import-preview-area" style="display:none; margin-top: 30px;">
                    <h4>รายการที่จะนำเข้า (<span id="import-count">0</span> คน)</h4>
                    <button class="btn-action" style="width: 100%; background: #10b981; margin: 15px 0;" onclick="uploadToSheets()">
                        <i class="fas fa-save"></i> ยืนยันนำข้อมูลลง Google Sheets
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby0F6UMkCluhQvYjheG_zmXECMKsSe0zEXP4f_9t68b8NXEPLMHueEGIBt_kbDfvvcj/exec";
        let studentsList = []; 
        let tempImportList = [];

        // --- ระบบสลับ Tab ---
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            event.currentTarget.classList.add('active');
            if(id === 'tab-check') loadMatrixData();
        }

        // --- ระบบจัดการกิจกรรม (ของเดิมที่ปรับปรุง) ---
        function toggleRoomSelect(gid, rid) {
            const grade = document.getElementById(gid).value;
            document.getElementById(rid).style.display = (grade === 'all') ? 'none' : 'block';
        }

        function loadActivities() {
            const container = document.getElementById('activities-list-container');
            const acts = JSON.parse(localStorage.getItem('global_activities') || '[]');
            container.innerHTML = acts.map(a => `
                <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-weight:600; color:#60a5fa;">${a.title}</div>
                        <div style="font-size:0.8rem; opacity:0.7;">ห้อง: ${a.targetRoom} | คะแนน: ${a.points}</div>
                    </div>
                    <div>
                        <button class="btn-edit" onclick="editAct(${a.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn-delete" onclick="deleteAct(${a.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
            if(acts.length === 0) container.innerHTML = '<p style="opacity:0.5; text-align:center;">ยังไม่มีบทเรียน</p>';
        }

        function saveActivity() {
            const title = document.getElementById('act-title').value;
            const date = document.getElementById('act-date').value;
            if(!title || !date) return alert("กรุณากรอกข้อมูลสำคัญให้ครบ");

            const grade = document.getElementById('act-grade').value;
            const roomNum = document.getElementById('act-room-num').value;
            const target = (grade === 'all') ? 'ทุกห้อง' : `${grade}/${roomNum}`;

            const actData = {
                id: document.getElementById('edit-id').value || Date.now(),
                title: title, desc: document.getElementById('act-desc').value,
                date: date, time: document.getElementById('act-time').value,
                targetRoom: target, points: document.getElementById('act-points').value,
                link: document.getElementById('act-link').value, doc: document.getElementById('act-doc').value
            };

            let acts = JSON.parse(localStorage.getItem('global_activities') || '[]');
            const idx = acts.findIndex(a => a.id == actData.id);
            if(idx > -1) acts[idx] = actData; else acts.push(actData);

            localStorage.setItem('global_activities', JSON.stringify(acts));
            syncActivities();
            alert("บันทึกสำเร็จ!");
            resetForm(); loadActivities();
        }

        async function syncActivities() {
            const acts = localStorage.getItem('global_activities');
            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "saveActivities", activities: JSON.parse(acts) }) });
        }

        // --- ระบบ Matrix Check ---
        async function loadMatrixData() {
            const acts = JSON.parse(localStorage.getItem('global_activities') || '[]');
            document.getElementById('matrix-act').innerHTML = acts.map(a => `<option value="${a.id}">${a.title}</option>`).join('');
            
            const res = await fetch(GOOGLE_SCRIPT_URL);
            studentsList = await res.json();
            renderMatrixTable();
        }

        function renderMatrixTable() {
            const tbody = document.getElementById('matrix-tbody');
            const actId = document.getElementById('matrix-act').value;
            const fGrade = document.getElementById('matrix-grade').value;
            const fRoom = document.getElementById('matrix-room').value;

            tbody.innerHTML = studentsList.filter(s => {
                if(fGrade !== 'all' && !s.room.includes(fGrade)) return false;
                if(fRoom !== 'all' && !s.room.endsWith("/" + fRoom)) return false;
                return true;
            }).sort((a,b) => a.number - b.number).map(s => {
                const status = localStorage.getItem(`${s.email}_act_${actId}_status`);
                const score = localStorage.getItem(`${s.email}_act_${actId}_score`) || '0';
                return `<tr>
                    <td>${s.number}</td>
                    <td>${s.name}</td>
                    <td>${s.room}</td>
                    <td><span class="status-badge ${status ? 'status-done' : 'status-none'}">${status ? 'ส่งแล้ว' : 'ยังไม่ส่ง'}</span></td>
                    <td>${score}</td>
                    <td><button onclick="alert('ระบบตรวจคะแนนกำลังเชื่อมต่อ...')" class="btn-action" style="padding:5px 10px; font-size:0.7rem;">ตรวจงาน</button></td>
                </tr>`;
            }).join('');
        }

        // --- ระบบ Excel Import ---
        function processExcel(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const workbook = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
                tempImportList = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                document.getElementById('import-preview-area').style.display = 'block';
                document.getElementById('import-count').innerText = tempImportList.length;
            };
            reader.readAsArrayBuffer(file);
        }

        async function uploadToSheets() {
            const grade = document.getElementById('imp-grade').value;
            const room = document.getElementById('imp-room').value;
            const fullRoom = `${grade}/${room}`;
            
            if(!confirm(`นำเข้านักเรียน ${tempImportList.length} คน เข้าห้อง ${fullRoom}?`)) return;

            for(let s of tempImportList) {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors',
                    body: JSON.stringify({ email: s.email, name: s.name, room: fullRoom, number: s.number })
                });
            }
            alert("✅ นำเข้าข้อมูลลง Google Sheets เรียบร้อย!");
            location.reload();
        }

        function checkTeacherAccess() {
            const email = localStorage.getItem('student_email');
            if (email !== 'teacher@prot.ac.th' && email !== 'ratchapon@prot.ac.th' && email !== 'ratchapon.p@prot.ac.th') {
                window.location.href = 'index.html'; return false;
            }
            document.getElementById('bodyContent').style.display = 'block';
            document.getElementById('teacherAvatar').src = localStorage.getItem('student_pic');
            document.getElementById('teacherName').innerText = localStorage.getItem('student_name');
            return true;
        }

        function logout() { localStorage.removeItem('is_logged_in'); window.location.href = 'index.html'; }

        window.onload = () => {
            if(checkTeacherAccess()) {
                const savedTheme = localStorage.getItem('smart_theme') || "default";
                document.body.setAttribute("data-theme", savedTheme);
                loadActivities();
            }
        };
    </script>
</body>
</html>
