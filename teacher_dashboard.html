<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ระบบจัดการครูผู้สอน | PROT Smart Workspace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* CSS โครงสร้างหลักและธีม (ใช้ชุดเดิมเพื่อความต่อเนื่อง) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; overflow-x: hidden; position: relative; cursor: default; }
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); color: white; }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff 0%, #e0f0ff 50%, #f0f8ff 100%); color: #1e293b; }
        
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .bg-animation .circle { position: absolute; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0) 70%); border-radius: 50%; animation: float 20s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0) translateX(0) scale(1); } 25% { transform: translateY(-30px) translateX(20px) scale(1.05); } 75% { transform: translateY(30px) translateX(-20px) scale(0.95); } }
        .bg-animation .circle:nth-child(1) { width: 400px; height: 400px; top: -100px; left: -100px; animation-duration: 25s; }
        .bg-animation .circle:nth-child(2) { width: 600px; height: 600px; bottom: -200px; right: -100px; animation-duration: 30s; animation-delay: -5s; }
        
        .content-layer { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; }
        
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(59,130,246,0.3); flex-wrap: wrap; gap: 15px; }
        body[data-theme="snow"] header { background: rgba(200, 220, 250, 0.8); border-bottom-color: rgba(255,255,255,0.5); }
        
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 12px; text-decoration: none; }
        body[data-theme="snow"] .logo { background: linear-gradient(135deg, #ff6b6b, #ff8e8e); -webkit-background-clip: text; background-clip: text; }
        
        .login-area { display: flex; align-items: center; gap: 15px; margin-left: auto; }
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.15); padding: 5px 15px 5px 10px; border-radius: 50px; backdrop-filter: blur(4px); }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #3b82f6; }
        .logout-btn { background: rgba(239, 68, 68, 0.8); border: none; padding: 6px 15px; border-radius: 30px; color: white; cursor: pointer; font-size: 0.8rem; font-family: 'Prompt'; }
        
        .page-content-wrapper { padding: 40px 20px; max-width: 1200px; margin: 0 auto; width: 100%; z-index: 10; position: relative; }
        .dashboard-header h1 { font-size: 2.2rem; color: #60a5fa; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        
        /* Dashboard Layout */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        
        .glass-panel { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.2); color: inherit; }
        body[data-theme="snow"] .glass-panel { background: rgba(255, 255, 255, 0.7); border-color: rgba(0,0,0,0.1); }
        
        .panel-title { font-size: 1.3rem; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; justify-content: space-between; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; opacity: 0.9; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: inherit; font-family: 'Prompt'; }
        body[data-theme="snow"] .form-group input, body[data-theme="snow"] .form-group select { background: white; border-color: #cbd5e1; color: #1e293b; }
        
        .btn-action { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-family: 'Prompt'; font-size: 1rem; width: 100%; transition: 0.2s; }
        .btn-action:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        
        .activity-list { list-style: none; margin-top: 20px; }
        .activity-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        body[data-theme="snow"] .activity-item { background: rgba(255,255,255,0.5); border-color: rgba(0,0,0,0.1); }
        
        @media (max-width: 768px) { .admin-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body data-theme="default" style="display: none;" id="bodyContent">
    <div class="bg-animation"><div class="circle"></div><div class="circle"></div></div>

    <div class="content-layer">
        <header>
            <a href="index.html" class="logo"><i class="fas fa-user-shield"></i><span>PROT Admin Hub</span></a>
            <div class="login-area">
                <div class="user-info">
                    <img id="teacherAvatar" src="" class="user-avatar" alt="avatar">
                    <span id="teacherName" class="user-name">ครูผู้สอน</span>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
                </div>
            </div>
        </header>

        <div class="page-content-wrapper">
            <div class="dashboard-header">
                <h1><i class="fas fa-chalkboard-teacher"></i> แดชบอร์ดจัดการระบบ</h1>
            </div>

            <div class="admin-grid">
                <div class="glass-panel">
                    <div class="panel-title"><i class="fas fa-plus-circle"></i> โพสต์กิจกรรม/บทเรียนใหม่</div>
                    <div class="form-group">
                        <label>ชื่อบทเรียน (เช่น บทที่ 1: พื้นฐาน Python)</label>
                        <input type="text" id="act-title" placeholder="ชื่อบทเรียน">
                    </div>
                    <div class="form-group">
                        <label>คำอธิบายสั้นๆ</label>
                        <input type="text" id="act-desc" placeholder="ให้นักเรียนทำอะไร...">
                    </div>
                    <div class="form-group">
                        <label>ลิงก์ห้อง Lab ที่ต้องการให้ไป</label>
                        <select id="act-link">
                            <option value="python.html">ห้อง Lab: Python</option>
                            <option value="robotics.html">ห้อง Lab: Arduino & Robotics</option>
                            <option value="#">ไม่มีลิงก์ (กิจกรรมทั่วไป)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>คะแนนเต็ม</label>
                        <input type="number" id="act-points" value="15">
                    </div>
                    <button class="btn-action" onclick="postActivity()"><i class="fas fa-paper-plane"></i> โพสต์ให้นักเรียนเห็น</button>
                </div>

                <div class="glass-panel">
                    <div class="panel-title"><i class="fas fa-list"></i> บทเรียนที่เผยแพร่แล้ว</div>
                    <ul class="activity-list" id="published-list">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkTeacherAccess() {
            const email = localStorage.getItem('student_email');
            const isLoggedIn = localStorage.getItem('is_logged_in');
            if (isLoggedIn !== 'true' || (email !== 'teacher@prot.ac.th' && email !== 'ratchapon@prot.ac.th')) {
                alert('⚠️ เฉพาะครูผู้สอนเท่านั้น');
                window.location.href = 'index.html';
                return false;
            }
            document.getElementById('bodyContent').style.display = 'block';
            document.getElementById('teacherName').innerText = localStorage.getItem('student_name') || 'ครูรัชพล';
            document.getElementById('teacherAvatar').src = localStorage.getItem('student_pic') || 'https://ui-avatars.com/api/?name=Teacher';
            return true;
        }

        function loadActivities() {
            const list = document.getElementById('published-list');
            const activities = JSON.parse(localStorage.getItem('global_activities') || '[]');
            list.innerHTML = '';
            
            if (activities.length === 0) {
                list.innerHTML = '<li style="text-align:center; opacity:0.7;">ยังไม่มีบทเรียนที่เผยแพร่</li>';
                return;
            }

            activities.forEach(act => {
                list.innerHTML += `
                    <li class="activity-item">
                        <div>
                            <div style="font-weight:600; color:#60a5fa;">${act.title}</div>
                            <div style="font-size:0.85rem; opacity:0.8;">${act.desc} (คะแนน: ${act.points})</div>
                        </div>
                        <button class="btn-delete" onclick="deleteActivity(${act.id})"><i class="fas fa-trash"></i> ลบ</button>
                    </li>
                `;
            });
        }

        function postActivity() {
            const title = document.getElementById('act-title').value;
            const desc = document.getElementById('act-desc').value;
            const link = document.getElementById('act-link').value;
            const points = document.getElementById('act-points').value;

            if (!title) { alert("⚠️ กรุณาใส่ชื่อบทเรียน"); return; }

            const newAct = { id: Date.now(), title, desc, link, points };
            let activities = JSON.parse(localStorage.getItem('global_activities') || '[]');
            activities.push(newAct);
            localStorage.setItem('global_activities', JSON.stringify(activities));

            alert('✅ โพสต์บทเรียนสำเร็จ! นักเรียนจะเห็นในหน้า Dashboard ทันที');
            document.getElementById('act-title').value = '';
            document.getElementById('act-desc').value = '';
            loadActivities();
        }

        function deleteActivity(id) {
            if(confirm("แน่ใจหรือไม่ที่จะลบบทเรียนนี้?")) {
                let activities = JSON.parse(localStorage.getItem('global_activities') || '[]');
                activities = activities.filter(act => act.id !== id);
                localStorage.setItem('global_activities', JSON.stringify(activities));
                loadActivities();
            }
        }

        function logout() {
            localStorage.removeItem('is_logged_in');
            window.location.href = 'index.html';
        }

        window.onload = () => {
            if (checkTeacherAccess()) {
                const savedTheme = localStorage.getItem('smart_theme') || "default";
                document.body.setAttribute("data-theme", savedTheme);
                loadActivities();
            }
        };
    </script>
</body>
</html>
