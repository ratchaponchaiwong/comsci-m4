<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ระบบจัดการครูผู้สอน | PROT Smart Workspace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; overflow-x: hidden; cursor: default; }
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); color: white; }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff 0%, #e0f0ff 50%, #f0f8ff 100%); color: #1e293b; }
        body[data-theme="forest"] { background: linear-gradient(135deg, #1a3c1a 0%, #2d5a2d 50%, #3e7a3e 100%); color: white; }
        body[data-theme="halloween"] { background: linear-gradient(135deg, #1a0b1a 0%, #2d1a2d 50%, #401040 100%); color: white; }
        body[data-theme="love"] { background: linear-gradient(135deg, #ffb7c5 0%, #ff9eb0 50%, #ff85a0 100%); color: #1e293b; }
        
        .content-layer { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(59,130,246,0.3); }
        body[data-theme="snow"] header { background: rgba(200, 220, 250, 0.8); border-bottom-color: rgba(255,255,255,0.5); }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; color: transparent; text-decoration: none; }
        
        .login-area { display: flex; align-items: center; gap: 15px; margin-left: auto; }
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.15); padding: 5px 15px 5px 10px; border-radius: 50px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .logout-btn { background: rgba(239, 68, 68, 0.8); border: none; padding: 6px 15px; border-radius: 30px; color: white; cursor: pointer; font-size: 0.8rem; font-family: 'Prompt'; }
        
        .theme-switcher { background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); padding: 12px 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; position: sticky; top: 70px; z-index: 99; border-radius: 50px; width: fit-content; margin: 10px auto; border: 1px solid rgba(255,255,255,0.2); }
        .theme-btn { background: rgba(255,255,255,0.2); border: none; padding: 8px 20px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: 'Prompt'; }
        .theme-btn.active { background: #3b82f6; box-shadow: 0 0 15px rgba(59,130,246,0.5); }

        .page-content-wrapper { padding: 20px; max-width: 1300px; margin: 0 auto; width: 100%; z-index: 10; }
        .dashboard-header h1 { font-size: 2.2rem; color: #60a5fa; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        body[data-theme="snow"] .dashboard-header h1 { color: #3b82f6; }

        /* Admin Tabs Navigation */
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 30px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px; overflow-x: auto; white-space: nowrap; }
        body[data-theme="snow"] .admin-tabs { background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.1); }
        .admin-tab-btn { background: transparent; border: none; color: inherit; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-family: 'Prompt'; font-weight: 500; font-size: 1rem; transition: 0.3s; display: flex; align-items: center; gap: 8px; opacity: 0.7; }
        .admin-tab-btn.active { background: #3b82f6; color: white; opacity: 1; box-shadow: 0 4px 10px rgba(59,130,246,0.4); }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        
        .glass-panel { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.2); color: inherit; }
        body[data-theme="snow"] .glass-panel { background: rgba(255, 255, 255, 0.8); border-color: rgba(0,0,0,0.1); color: #1e293b; }
        
        .panel-title { font-size: 1.3rem; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; opacity: 0.9; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: inherit; font-family: 'Prompt'; resize: vertical; }
        body[data-theme="snow"] .form-group input, body[data-theme="snow"] .form-group select, body[data-theme="snow"] .form-group textarea { background: white; border-color: #cbd5e1; color: #1e293b; }
        
        .deadline-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; margin-top: 5px; cursor: pointer; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }

        .btn-action { background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-family: 'Prompt'; font-size: 1rem; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 10px; font-weight: 600; width: 100%; }
        .btn-action:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-cancel { background: rgba(255,255,255,0.1); color: inherit; margin-top: 10px; }
        body[data-theme="snow"] .btn-cancel { background: rgba(0,0,0,0.05); }

        .btn-delete { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-family: 'Prompt'; }
        .btn-edit { background: #f59e0b; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-family: 'Prompt'; }
        
        .activity-list { list-style: none; margin-top: 20px; max-height: 500px; overflow-y: auto; padding-right: 10px;}
        .activity-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; border: 1px solid rgba(255,255,255,0.05); }
        body[data-theme="snow"] .activity-item { background: rgba(255,255,255,0.5); border-color: rgba(0,0,0,0.1); }
        .deadline-tag { font-size: 0.75rem; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 5px; display: inline-block; margin-top: 5px; }
        body[data-theme="snow"] .deadline-tag { background: rgba(0,0,0,0.05); }

        /* Classroom Grid (ของจริง) */
        .room-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .room-card { background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(37,99,235,0.4)); border: 1px solid rgba(59,130,246,0.5); padding: 25px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .room-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(59,130,246,0.3); background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(37,99,235,0.5)); }
        .room-card h2 { font-size: 2rem; color: #60a5fa; margin-bottom: 5px; }
        body[data-theme="snow"] .room-card h2 { color: #2563eb; }
        .room-card p { opacity: 0.8; font-size: 0.95rem; }

        /* Student Table */
        .table-container { overflow-x: auto; display: none; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; margin-top: 15px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { font-weight: 600; color: #60a5fa; }
        body[data-theme="snow"] th { color: #2563eb; border-bottom-color: rgba(0,0,0,0.1); }
        body[data-theme="snow"] td { border-bottom-color: rgba(0,0,0,0.05); }
        tr:hover { background: rgba(255,255,255,0.05); cursor: pointer; }
        body[data-theme="snow"] tr:hover { background: rgba(0,0,0,0.05); }
        
        .student-name-col { display: flex; align-items: center; gap: 10px; }
        .avatar-small { width: 35px; height: 35px; border-radius: 50%; background: #3b82f6; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 0.9rem;}

        @media (max-width: 768px) { .admin-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body data-theme="default" style="display: none;" id="bodyContent">
    <div class="content-layer">
        <header>
            <a href="index.html" class="logo"><i class="fas fa-user-shield"></i><span>PROT Admin Hub</span></a>
            <div class="login-area">
                <div class="user-info">
                    <img id="teacherAvatar" src="" class="user-avatar" alt="avatar">
                    <span id="teacherName" class="user-name">TECHNOLOGY COMPUTER</span>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
                </div>
            </div>
        </header>

        <div class="theme-switcher">
            <button class="theme-btn" data-theme="default">🤖 เริ่มต้น</button>
            <button class="theme-btn" data-theme="snow">❄️ หิมะ</button>
            <button class="theme-btn" data-theme="forest">🌿 ป่าเขียว</button>
            <button class="theme-btn" data-theme="halloween">🎃 ฮัลโลวีน</button>
            <button class="theme-btn" data-theme="love">🌸 ซากุระ</button>
        </div>

        <div class="page-content-wrapper">
            <div class="dashboard-header">
                <h1><i class="fas fa-cogs"></i> แดชบอร์ดจัดการเนื้อหาระบบ (CMS)</h1>
            </div>

            <div class="admin-tabs">
                <button class="admin-tab-btn active" onclick="switchTab('tab-classroom')"><i class="fas fa-chalkboard-teacher"></i> 1. จัดการชั้นเรียนและบทเรียน</button>
                <button class="admin-tab-btn" onclick="switchTab('tab-portfolio')"><i class="fas fa-images"></i> 2. จัดการผลงานนักเรียน</button>
                <button class="admin-tab-btn" onclick="switchTab('tab-subjects')"><i class="fas fa-book"></i> 3. จัดการวิชาเพิ่มเติม</button>
                <button class="admin-tab-btn" onclick="switchTab('tab-profile')"><i class="fas fa-user-tie"></i> 4. จัดการข้อมูลผู้สอน</button>
            </div>

            <div id="tab-classroom" class="tab-content active">
                <div class="admin-grid">
                    <div class="glass-panel">

                            <span id="form-mode-title"><i class="fas fa-plus-circle"></i> โพสต์กิจกรรม/บทเรียนใหม่</span>
                        </div>
                        <input type="hidden" id="edit-id">
                        
                        <div class="form-group"><label>ชื่อบทเรียน</label><input type="text" id="act-title" placeholder="เช่น บทที่ 1: พื้นฐาน Python"></div>
                        <div class="form-group"><label>คำอธิบายสั้นๆ</label><input type="text" id="act-desc" placeholder="ให้นักเรียนทำอะไร..."></div>
                        
                        <div class="deadline-row">
                            <div class="form-group"><label>กำหนดส่ง (วันที่)</label><input type="date" id="act-date"></div>
                            <div class="form-group"><label>เวลา</label><input type="time" id="act-time" value="23:59"></div>
                        </div>
                        <div class="form-group" style="margin-bottom: 20px;">

                        <div class="form-group"><label><i class="fab fa-youtube" style="color: #ef4444;"></i> ลิงก์ YouTube (ถ้ามี)</label><input type="text" id="act-yt" placeholder="https://youtu.be/..."></div>
                        <div class="form-group"><label><i class="fas fa-file-pdf" style="color: #3b82f6;"></i> ลิงก์ Drive/Docs/PDF</label><input type="text" id="act-doc" placeholder="https://docs.google.com/..."></div>
                        <div class="form-group"><label><i class="fas fa-paint-brush" style="color: #8b5cf6;"></i> ลิงก์ Canva (ถ้ามี)</label><input type="text" id="act-canva" placeholder="https://www.canva.com/..."></div>

                        <button class="btn-action btn-cancel" onclick="resetForm()" id="btn-cancel-edit" style="display:none;"><i class="fas fa-times"></i> ยกเลิกการแก้ไข</button>
                    </div>

                    <div class="glass-panel">
                        <div class="panel-title"><i class="fas fa-list"></i> บทเรียนและกำหนดการ</div>
                        <ul class="activity-list" id="published-list"></ul>
                    </div>
                </div>

                <div class="glass-panel" style="margin-bottom: 40px;">

                        </button>
                    </div>
                    
                    <div id="rooms-view" class="room-grid"></div>

                    <div id="students-view" class="table-container">

                                <tr>

                                    <th width="45%">ชื่อ-นามสกุล</th>
                                    <th width="20%">ความคืบหน้า</th>
                                    <th width="20%">คะแนนรวม</th>

            <div id="tab-portfolio" class="tab-content"><div class="admin-grid"><div class="glass-panel"><div class="panel-title"><i class="fas fa-images"></i> เพิ่มผลงาน</div><input type="text" id="port-title" placeholder="ชื่อผลงาน" class="form-group input" style="width:100%; padding:10px; margin-bottom:10px;"><button class="btn-action" onclick="savePortfolio()">บันทึก</button></div><div class="glass-panel"><ul id="portfolio-list" class="activity-list"></ul></div></div></div>
            <div id="tab-subjects" class="tab-content"><div class="admin-grid"><div class="glass-panel"><div class="panel-title"><i class="fas fa-book"></i> เพิ่มวิชา</div><input type="text" id="subj-title" placeholder="ชื่อวิชา" class="form-group input" style="width:100%; padding:10px; margin-bottom:10px;"><button class="btn-action" onclick="saveSubject()">บันทึก</button></div><div class="glass-panel"><ul id="subject-list" class="activity-list"></ul></div></div></div>
            <div id="tab-profile" class="tab-content"><div class="glass-panel" style="max-width:800px; margin:0 auto;"><div class="panel-title"><i class="fas fa-user-edit"></i> แก้ไขข้อมูลผู้สอน</div><input type="text" id="prof-name" placeholder="ชื่อ-นามสกุล" class="form-group input" style="width:100%; padding:10px; margin-bottom:10px;"><button class="btn-action" onclick="saveProfileData()">อัปเดต</button></div></div>
        </div>
    </div>

    <script>
        // ⚠️ ต้องนำ URL จาก Apps Script มาใส่ตรงนี้นะครับ
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby0F6UMkCluhQvYjheG_zmXECMKsSe0zEXP4f_9t68b8NXEPLMHueEGIBt_kbDfvvcj/exec";

        // ------------------ Tab & Theme ------------------
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.admin-tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        document.querySelectorAll(".theme-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.body.setAttribute("data-theme", btn.getAttribute("data-theme"));
                localStorage.setItem('smart_theme', btn.getAttribute("data-theme"));
                document.querySelectorAll(".theme-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            });
        });

        function checkTeacherAccess() {
            const email = localStorage.getItem('student_email');
            const isLoggedIn = localStorage.getItem('is_logged_in');
            if (isLoggedIn !== 'true' || (email !== 'teacher@prot.ac.th' && email !== 'ratchapon@prot.ac.th')) {
                alert('⚠️ เฉพาะครูผู้สอนเท่านั้น');
                window.location.href = 'index.html';
                return false;
            }
            document.getElementById('bodyContent').style.display = 'block';
            document.getElementById('teacherAvatar').src = localStorage.getItem('student_pic');
            return true;
        }

        // ==================== ระบบสแกนนักเรียนจาก Google Sheets ====================
        let globalStudents = []; // เก็บข้อมูลนักเรียนที่ดึงมา

        async function fetchStudents() {
            const roomsView = document.getElementById('rooms-view');
            roomsView.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 30px;"><i class="fas fa-spinner fa-spin"></i> กำลังดึงข้อมูลรายชื่อจาก Google Sheets...</div>';

            if (GOOGLE_SCRIPT_URL === "YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE") {
                roomsView.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 30px; color:#f87171;">⚠️ ยังไม่ได้เชื่อมต่อ Google Sheets URL ในโค้ดครับ</div>';
                return;
            }

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const sheetData = await response.json();
                
                globalStudents = [];
                // แปลงข้อมูลจาก Sheet มาเป็น Object
                sheetData.forEach(s => {
                    if(s.email && s.name) {
                        // เช็คสถานะการส่งงาน (ตอนนี้ยังเช็คจากเครื่องครูเป็นหลัก ถ้าอนาคตส่งคะแนนเข้า Sheet ด้วยก็จะดึงจาก Sheet ได้)
                        let totalScore = parseInt(localStorage.getItem(s.email + '_total_score') || 0);
                        let activities = JSON.parse(localStorage.getItem('global_activities') || '[]');
                        let submittedCount = 0;
                        
                        activities.forEach(act => {
                            let status = localStorage.getItem(s.email + '_act_' + act.id + '_status');
                            if(status === 'submitted' || status === 'graded') submittedCount++;
                        });
                        
                        let progress = activities.length > 0 ? Math.round((submittedCount / activities.length) * 100) : 0;

                        globalStudents.push({
                            email: s.email,
                            name: s.name,
                            room: s.room || "รอระบุห้อง",
                            number: parseInt(s.number) || 999,
                            totalScore: totalScore,
                            progress: progress
                        });
                    }
                });
                
                renderRoomsGrid();
            } catch (error) {
                roomsView.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 30px; color:#f87171;">❌ เกิดข้อผิดพลาดในการดึงข้อมูลจาก Google Sheets</div>';
                console.error("Error fetching sheets:", error);
            }
        }

        function renderRoomsGrid() {
            const roomsView = document.getElementById('rooms-view');
            roomsView.innerHTML = '';
            
            if (globalStudents.length === 0) {
                roomsView.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 30px; opacity: 0.7;">ยังไม่มีนักเรียนกรอกข้อมูลในระบบครับ</div>';
                return;
            }
            
            let rooms = {};
            globalStudents.forEach(s => {
                if (!rooms[s.room]) rooms[s.room] = [];
                rooms[s.room].push(s);
            });
            
            let sortedRooms = Object.keys(rooms).sort();
            sortedRooms.forEach(roomName => {
                let count = rooms[roomName].length;
                roomsView.innerHTML += `
                    <div class="room-card" onclick="openRoom('${roomName}')">
                        <h2>${roomName}</h2>
                        <p><i class="fas fa-user-graduate"></i> นักเรียน ${count} คน</p>
                    </div>
                `;
            });
        }

        function showRoomsGrid() {
            document.getElementById('rooms-view').style.display = 'grid';
            document.getElementById('students-view').style.display = 'none';
            document.getElementById('btn-back-rooms').style.display = 'none';
            document.getElementById('class-panel-title').querySelector('span').innerHTML = '<i class="fas fa-users"></i> ตรวจสอบการส่งงาน (นักเรียนของจริง)';
        }

        function openRoom(roomName) {
            document.getElementById('rooms-view').style.display = 'none';
            document.getElementById('students-view').style.display = 'block';
            document.getElementById('btn-back-rooms').style.display = 'inline-flex';
            document.getElementById('class-panel-title').querySelector('span').innerHTML = `<i class="fas fa-door-open"></i> รายชื่อนักเรียนห้อง ${roomName}`;

            const studentsInRoom = globalStudents.filter(s => s.room === roomName);
            const tbody = document.getElementById('student-tbody');
            tbody.innerHTML = '';

            studentsInRoom.sort((a,b) => a.number - b.number).forEach(student => {
                let progressColor = student.progress >= 80 ? '#10b981' : (student.progress >= 50 ? '#f59e0b' : '#ef4444');
                let initialChar = student.name.replace('ด.ช. ', '').replace('น.ส. ', '').charAt(0) || 'ด';

                let row = `
                    <tr>
                        <td>${student.number === 999 ? '-' : student.number}</td>
                        <td>
                            <div class="student-name-col">
                                <div class="avatar-small">${initialChar}</div>
                                <div>
                                    <span>${student.name}</span><br>
                                    <span style="font-size:0.75rem; opacity:0.6;">${student.email}</span>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div style="font-size: 0.8rem; margin-bottom: 3px;">${student.progress}%</div>
                            <div class="progress-bar-bg" style="margin:0; height:6px;">
                                <div class="progress-bar-fill" style="width: ${student.progress}%; background: ${progressColor};"></div>
                            </div>
                        </td>
                        <td style="font-weight: 600; color: #60a5fa;">${student.totalScore}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        // ==================== TAB 1: ACTIVITIES (มีระบบเวลาและแก้ไข) ====================
        function loadActivities() {
            const list = document.getElementById('published-list');
            const activities = JSON.parse(localStorage.getItem('global_activities') || '[]');
            list.innerHTML = activities.length === 0 ? '<li style="text-align:center; opacity:0.7;">ยังไม่มีบทเรียน</li>' : '';
            
            activities.forEach(act => {
                const strictLabel = act.strict ? '<span style="color:#ef4444;">[ห้ามส่งเลท]</span>' : '<span style="color:#f59e0b;">[ส่งเลทได้]</span>';
                list.innerHTML += `
                    <li class="activity-item">
                        <div style="width:100%; display:flex; justify-content:space-between;">
                            <div>
                                <div style="font-weight:600; color:#60a5fa;">${act.title}</div>
                                <div style="font-size:0.85rem; opacity:0.8;">${act.desc}</div>
                                <div class="deadline-tag"><i class="far fa-clock"></i> กำหนดส่ง: ${act.date || '-'} | ${act.time || '-'} ${strictLabel}</div>
                            </div>
                            <div style="display:flex; gap:10px; align-items:flex-start;">
                                <button class="btn-edit" onclick="editActivity(${act.id})"><i class="fas fa-edit"></i> แก้ไข</button>
                                <button class="btn-delete" onclick="deleteActivity(${act.id})"><i class="fas fa-trash"></i> ลบ</button>
                            </div>
                        </div>
                    </li>`;
            });
        }

        function saveActivity() {
            const title = document.getElementById('act-title').value;
            const date = document.getElementById('act-date').value;
            const editId = document.getElementById('edit-id').value;

            if (!title || !date) { alert("⚠️ กรุณาใส่ชื่อบทเรียนและกำหนดส่ง"); return; }

            const actData = {
                id: editId ? parseInt(editId) : Date.now(),
                title: title,
                desc: document.getElementById('act-desc').value,
                date: date,
                time: document.getElementById('act-time').value,
                strict: document.getElementById('act-strict').checked,
                yt: document.getElementById('act-yt').value,
                doc: document.getElementById('act-doc').value,
                canva: document.getElementById('act-canva').value,
                link: document.getElementById('act-link').value,
                points: document.getElementById('act-points').value
            };

            let activities = JSON.parse(localStorage.getItem('global_activities') || '[]');
            if (editId) {
                const index = activities.findIndex(a => a.id == editId);
                activities[index] = actData;
            } else {
                activities.push(actData);
            }

            localStorage.setItem('global_activities', JSON.stringify(activities));
            alert(editId ? '✅ แก้ไขข้อมูลเรียบร้อย' : '✅ โพสต์กิจกรรมเรียบร้อย');
            resetForm();
            loadActivities();
        }

        function editActivity(id) {
            const activities = JSON.parse(localStorage.getItem('global_activities') || '[]');
            const act = activities.find(a => a.id == id);
            
            document.getElementById('edit-id').value = act.id;
            document.getElementById('act-title').value = act.title;
            document.getElementById('act-desc').value = act.desc;
            document.getElementById('act-date').value = act.date || '';
            document.getElementById('act-time').value = act.time || '23:59';
            document.getElementById('act-strict').checked = act.strict || false;
            document.getElementById('act-yt').value = act.yt || '';
            document.getElementById('act-doc').value = act.doc || '';
            document.getElementById('act-canva').value = act.canva || '';
            document.getElementById('act-link').value = act.link || '#';
            document.getElementById('act-points').value = act.points || 15;

            document.getElementById('form-mode-title').innerHTML = '<i class="fas fa-edit"></i> กำลังแก้ไขกิจกรรม';
            document.getElementById('btn-save-main').innerHTML = '<i class="fas fa-save"></i> บันทึกการแก้ไข';
            document.getElementById('btn-cancel-edit').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.querySelectorAll('#tab-classroom input[type="text"], #tab-classroom input[type="date"], #tab-classroom input[type="hidden"]').forEach(el => el.value = '');
            document.getElementById('act-time').value = '23:59';
            document.getElementById('act-strict').checked = false;
            document.getElementById('form-mode-title').innerHTML = '<i class="fas fa-plus-circle"></i> โพสต์กิจกรรม/บทเรียนใหม่';
            document.getElementById('btn-save-main').innerHTML = '<i class="fas fa-paper-plane"></i> โพสต์กิจกรรม';
            document.getElementById('btn-cancel-edit').style.display = 'none';
        }

        function deleteActivity(id) {
            if(confirm("ลบกิจกรรมนี้?")) {
                let activities = JSON.parse(localStorage.getItem('global_activities') || '[]');
                activities = activities.filter(a => a.id !== id);
                localStorage.setItem('global_activities', JSON.stringify(activities));
                loadActivities();
            }
        }

        function logout() {
            localStorage.removeItem('is_logged_in');
            window.location.href = 'index.html';
        }

        window.onload = () => {
            if (checkTeacherAccess()) {
                const savedTheme = localStorage.getItem('smart_theme') || "default";
                document.body.setAttribute("data-theme", savedTheme);
                document.querySelector(`.theme-btn[data-theme="${savedTheme}"]`)?.classList.add("active");
                
                loadActivities();
                fetchStudents(); // เรียกใช้งานการดึงข้อมูลจาก Google Sheets ทันทีที่เปิดหน้า
            }
        };

        // --- Dummy functions for portfolio/subject/profile saving to prevent errors if clicked ---
        function savePortfolio(){ alert('ฟังก์ชันตัวอย่างสำหรับพอร์ต'); }
        function saveSubject(){ alert('ฟังก์ชันตัวอย่างสำหรับวิชา'); }
        function saveProfileData(){ alert('ฟังก์ชันตัวอย่างสำหรับโปรไฟล์'); }
    </script>
</body>
</html>
