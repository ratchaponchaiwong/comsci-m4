<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Admin Hub | PROT Smart Workspace</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ==================== สไตล์โครงสร้างหลักและการจัดวางหน้าจอ ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; height: 100vh; display: flex; overflow: hidden; color: white;}
        
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff 0%, #e0f0ff 50%, #f0f8ff 100%); color: #1e293b; }
        body[data-theme="forest"] { background: linear-gradient(135deg, #1a3c1a 0%, #2d5a2d 50%, #3e7a3e 100%); }
        body[data-theme="halloween"] { background: linear-gradient(135deg, #1a0b1a 0%, #2d1a2d 50%, #401040 100%); }
        body[data-theme="love"] { background: linear-gradient(135deg, #ffb7c5 0%, #ff9eb0 50%, #ff85a0 100%); color: #1e293b; }

        /* Sidebar ซ้าย */
        .sidebar { width: 260px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        body[data-theme="snow"] .sidebar, body[data-theme="love"] .sidebar { background: rgba(255,255,255,0.6); border-right-color: rgba(0,0,0,0.1); }
        .sidebar-brand { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; color: transparent; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        
        .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .nav-item a { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: #cbd5e1; text-decoration: none; border-radius: 12px; font-weight: 500; transition: 0.3s; }
        body[data-theme="snow"] .nav-item a, body[data-theme="love"] .nav-item a { color: #475569; }
        .nav-item.active a, .nav-item a:hover { background: #3b82f6; color: white !important; box-shadow: 0 4px 12px rgba(59,130,246,0.3); }

        /* พื้นที่เนื้อหาหลักขวา */
        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { background: rgba(0,0,0,0.15); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
        body[data-theme="snow"] header, body[data-theme="love"] header { border-bottom-color: rgba(0,0,0,0.05); }

        .main-content { flex: 1; overflow-y: auto; padding: 30px 40px; }
        .glass-card { background: rgba(255,255,255,0.04); border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        body[data-theme="snow"] .glass-card, body[data-theme="love"] .glass-card { background: rgba(255,255,255,0.8); border-color: rgba(0,0,0,0.08); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        /* แผงควบคุมตัวกรองอัจฉริยะ (Smart Filter Controls) */
        .filter-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .search-input { flex: 1; min-width: 200px; position: relative; }
        .search-input input { width: 100%; padding: 12px 20px 12px 45px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.2); color: inherit; font-family: 'Prompt'; font-size: 0.9rem; }
        .search-input i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); opacity: 0.6; }
        
        .filter-select { padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.2); color: inherit; font-family: 'Prompt'; font-size: 0.9rem; min-width: 140px; cursor: pointer; }
        body[data-theme="snow"] input, body[data-theme="love"] input,
        body[data-theme="snow"] select, body[data-theme="love"] select { background: white; border-color: #cbd5e1; }

        .btn-tool { background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; font-family: 'Prompt'; transition: 0.2s; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .btn-tool:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-print { background: #10b981; } .btn-print:hover { background: #059669; }

        /* สไตล์ตารางคะแนนระดับโปร */
        .table-responsive { width: 100%; overflow-x: auto; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); }
        body[data-theme="snow"] .table-responsive, body[data-theme="love"] .table-responsive { border-color: #e2e8f0; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        th { background: rgba(59,130,246,0.15); padding: 15px 20px; font-weight: 600; color: #60a5fa; border-bottom: 2px solid rgba(59,130,246,0.3); }
        body[data-theme="snow"] th, body[data-theme="love"] th { color: #2563eb; background: rgba(59,130,246,0.08); border-bottom-color: #cbd5e1; }
        td { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); color: inherit; }
        body[data-theme="snow"] td, body[data-theme="love"] td { border-bottom-color: #f1f5f9; }
        tr:hover { background: rgba(255,255,255,0.02); }
        body[data-theme="snow"] tr:hover, body[data-theme="love"] tr:hover { background: rgba(0,0,0,0.02); }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-align: center; }
        .badge-green { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .badge-red { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .badge-blue { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }

        /* แผง Theme Switcher เล็กๆ ท้าย Sidebar */
        .sidebar-footer { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
        .theme-mini-btn { background: rgba(255,255,255,0.1); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; }
        .theme-mini-btn.active { border: 2px solid #3b82f6; box-shadow: 0 0 8px #3b82f6; }

        /* สไตล์หน้าพิมพ์ */
        @media print {
            body { background: white !important; color: black !important; }
            .sidebar, header, .filter-bar, .btn-tool { display: none !important; }
            .main-container, .main-content, .glass-card { overflow: visible !important; padding: 0 !important; margin: 0 !important; background: none !important; border: none !important; }
            table { border: 1px solid #333; width: 100%; }
            th, td { border: 1px solid #333 !important; color: black !important; padding: 8px !important; }
            th { background: #eee !important; }
        }
    </style>
</head>
<body data-theme="default">

    <div class="sidebar">
        <div class="sidebar-brand"><i class="fas fa-user-shield"></i> PROT Hub Admin</div>
        <ul class="nav-menu">
            <li class="nav-item active"><a href="#"><i class="fas fa-chart-line"></i> แดชบอร์ดคะแนน</a></li>
            <li class="nav-item"><a href="allquiz.html"><i class="fas fa-database"></i> จัดการคลังข้อสอบ</a></li>
            <li class="nav-item"><a href="index.html"><i class="fas fa-home"></i> กลับหน้าหลักระบบ</a></li>
        </ul>
        
        <div class="sidebar-footer">
            <button class="theme-mini-btn active" onclick="applyTheme('default')" title="เริ่มต้น">🤖</button>
            <button class="theme-mini-btn" onclick="applyTheme('snow')" title="หิมะ">❄️</button>
            <button class="theme-mini-btn" onclick="applyTheme('forest')" title="ป่าเขียว">🌿</button>
            <button class="theme-mini-btn" onclick="applyTheme('halloween')" title="ฮัลโลวีน">🎃</button>
            <button class="theme-mini-btn" onclick="applyTheme('love')" title="ซากุระ">🌸</button>
        </div>
    </div>

    <div class="main-container">
        <header>
            <h2 style="font-weight: 700;"><i class="fas fa-chalkboard-teacher"></i> ระบบติดตามคะแนนและสถานะนักเรียน</h2>
            <div id="loginArea">กำลังโหลดผู้ใช้...</div>
        </header>

        <div class="main-content">
            <div class="glass-card">
                
                <div class="filter-bar">
                    <div class="search-input">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchBox" oninput="filterScoresTable()" placeholder="พิมพ์ค้นหา ชื่อนักเรียน หรือ รหัสประจำตัว...">
                    </div>
                    
                    <select id="roomFilter" class="filter-select" onchange="filterScoresTable()">
                        <option value="all">🏫 แสดงทุกห้องเรียน</option>
                        </select>

                    <select id="sortFilter" class="filter-select" onchange="filterScoresTable()">
                        <option value="no">🔢 เรียงตามเลขที่</option>
                        <option value="scoreDesc">🏆 คะแนน: มาก ➔ น้อย</option>
                        <option value="scoreAsc">📉 คะแนน: น้อย ➔ มาก</option>
                        <option value="id">🆔 เรียงตามรหัสนักเรียน</option>
                    </select>

                    <button class="btn-tool" onclick="fetchDashboardData()"><i class="fas fa-sync-alt"></i> รีเฟรช</button>
                    <button class="btn-tool btn-print" onclick="window.print()"><i class="fas fa-print"></i> พิมพ์ใบคะแนน</button>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 120px;">รหัสประจำตัว</th>
                                <th style="width: 80px;">ห้อง</th>
                                <th style="width: 80px;">เลขที่</th>
                                <th>ชื่อ-นามสกุล</th>
                                <th style="width: 150px; text-align: center;">ส่งงานแล้ว</th>
                                <th style="width: 150px; text-align: center;">ค้างส่ง</th>
                                <th style="width: 140px; text-align: center; font-size: 1.05rem;">คะแนนสอบรวม</th>
                            </tr>
                        </thead>
                        <tbody id="scores-table-body">
                            <tr>
                                <td colspan="7" style="text-align: center; padding: 40px; opacity: 0.7;">
                                    <i class="fas fa-spinner fa-spin fa-2x" style="color:#3b82f6; margin-bottom:10px;"></i><br>
                                    กำลังดึงข้อมูลคะแนนนักเรียนเรียลไทม์...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script>
        // ใช้ลิงก์สคริปต์หลักตัวเดียวกับหน้าห้องเรียนนักเรียน
        const MAIN_URL = "https://script.google.com/macros/s/AKfycby901YIN3KkAJXTItn_ySYqqecw4tT8rArbASqOa768Mpgah8XQjYX8jMVSj9w0VC6C/exec";
        let localStudentsData = []; // เก็บข้อมูลนักเรียนทั้งหมดไว้คัดกรองในหน้าบ้านเพื่อความรวดเร็ว

        window.onload = () => {
            // 🌟 ระบบ รปภ. ตรวจสอบสิทธิ์ครูขั้นเด็ดขาด (เหลือแค่อีเมลครูอันเดียว) 🌟
            const currentEmail = localStorage.getItem('student_email');
            const adminEmails = ['ratchapon@prot.ac.th'];
            
            if (!currentEmail || !adminEmails.includes(currentEmail)) {
                alert("⛔ ไม่อนุญาตให้เข้าถึง! พื้นที่นี้สงวนไว้สำหรับผู้สอนเท่านั้นครับ");
                window.location.href = "index.html";
                return;
            }

            // ตั้งค่า UI ผู้สอน
            const pic = localStorage.getItem('student_pic') || "https://ui-avatars.com/api/?name=Teacher";
            document.getElementById('loginArea').innerHTML = `<div style="display:flex; align-items:center; gap:10px;"><img src="${pic}" style="width:35px; border-radius:50%; border:2px solid #3b82f6;"> <span>ครูรัชพล (แอดมิน)</span></div>`;

            applyTheme(localStorage.getItem('admin_theme') || 'default');
            fetchDashboardData(); 
        };

        // ฟังก์ชันดึงข้อมูลสรุปผลคะแนนจาก Google Sheets
        async function fetchDashboardData() {
            const tbody = document.getElementById('scores-table-body');
            tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 40px;"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>กำลังดึงข้อมูลอัปเดตล่าสุด...</td></tr>`;
            
            try {
                const res = await fetch(`${MAIN_URL}?action=getDashboardData&t=${Date.now()}`);
                const data = await res.json();
                
                // เก็บข้อมูลลงตัวแปรภายในเพื่อใช้ค้นหา/กรอง
                localStudentsData = data.students || [];
                
                // สร้างรายชื่อห้องใน Dropdown อัตโนมัติ (Dynamic Room Filter)
                buildRoomDropdown(localStudentsData);
                
                // แสดงผลตารางข้อมูล
                renderScoresTable(localStudentsData);
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 40px; color:#ef4444;"><i class="fas fa-exclamation-triangle fa-2x"></i><br><br>เชื่อมต่อข้อมูลล้มเหลว กรุณากดปุ่มรีเฟรชลองใหม่อีกครั้ง</td></tr>`;
            }
        }

        // ฟังก์ชันสร้างรายชื่อห้องเรียนที่มีอยู่จริงลงใน Dropdown แบบอัจฉริยะ
        function buildRoomDropdown(students) {
            const filter = document.getElementById('roomFilter');
            const rooms = [...new Set(students.map(s => s.room).filter(Boolean))].sort();
            
            filter.innerHTML = `<option value="all">🏫 แสดงทุกห้องเรียน (${students.length} คน)</option>`;
            rooms.forEach(room => {
                const count = students.filter(s => s.room === room).length;
                filter.innerHTML += `<option value="${room}">ชั้น ม.4 ห้อง ${room} (${count} คน)</option>`;
            });
        }

        // ฟังก์ชันวาดตารางแสดงผลข้อมูลคะแนน
        function renderScoresTable(studentsList) {
            const tbody = document.getElementById('scores-table-body');
            tbody.innerHTML = '';

            if (studentsList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 40px; opacity:0.6;">🔍 ไม่พบข้อมูลคะแนนตามเงื่อนไขที่เลือก</td></tr>`;
                return;
            }

            studentsList.forEach(s => {
                tbody.innerHTML += `
                    <tr>
                        <td style="font-family: monospace; font-weight: 500;">${s.student_id || '-'}</td>
                        <td>${s.room ? '4/' + s.room : '-'}</td>
                        <td>${s.number || '-'}</td>
                        <td><strong>${s.name || 'นักเรียน'}</strong></td>
                        <td style="text-align: center;"><span class="badge badge-green">${s.sent_count || 0} กิจกรรม</span></td>
                        <td style="text-align: center;"><span class="badge badge-red">${s.pending_count || 0} กิจกรรม</span></td>
                        <td style="text-align: center; font-weight: 700; color: #60a5fa; font-size: 1.1rem; background: rgba(59,130,246,0.03);">
                            ${s.total_score || 0}
                        </td>
                    </tr>
                `;
            });
        }

        // ฟังก์ชันหัวใจหลัก: ประมวลผล ค้นหา แยกห้อง และจัดเรียงคะแนน (Client-side Processing)
        function filterScoresTable() {
            const searchText = document.getElementById('searchBox').value.trim().toLowerCase();
            const selectedRoom = document.getElementById('roomFilter').value;
            const sortBy = document.getElementById('sortFilter').value;

            // Step 1: กรองข้อมูลตามการค้นหาและห้องเรียน
            let filtered = localStudentsData.filter(s => {
                const matchSearch = (s.name || '').toLowerCase().includes(searchText) || (s.student_id || '').toLowerCase().includes(searchText);
                const matchRoom = (selectedRoom === 'all') || (String(s.room) === String(selectedRoom));
                return matchSearch && matchRoom;
            });

            // Step 2: จัดเรียงลำดับข้อมูล (Sorting)
            if (sortBy === 'no') {
                // เรียงตามเลขที่ (จากน้อยไปมาก)
                filtered.sort((a, b) => Number(a.number || 999) - Number(b.number || 999));
            } else if (sortBy === 'scoreDesc') {
                // คะแนนมากไปน้อย
                filtered.sort((a, b) => Number(b.total_score || 0) - Number(a.total_score || 0));
            } else if (sortBy === 'scoreAsc') {
                // คะแนนน้อยไปมาก
                filtered.sort((a, b) => Number(a.total_score || 0) - Number(b.total_score || 0));
            } else if (sortBy === 'id') {
                // เรียงตามรหัสนักเรียน
                filtered.sort((a, b) => String(a.student_id).localeCompare(String(b.student_id)));
            }

            // วาดตารางใหม่ด้วยข้อมูลที่ประมวลผลแล้ว
            renderScoresTable(filtered);
        }

        function applyTheme(theme) { 
            document.body.setAttribute("data-theme", theme); 
            localStorage.setItem('admin_theme', theme);
            document.querySelectorAll('.theme-mini-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`.theme-mini-btn[onclick*="${theme}"]`);
            if(activeBtn) activeBtn.classList.add('active');
        }
    </script>
</body>
</html>
