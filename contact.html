<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดต่อ | ครูรัชพล</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Prompt', sans-serif; background: #0f172a; color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .contact-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-radius: 30px; padding: 50px; width: 90%; max-width: 500px; text-align: center; border: 1px solid rgba(59,130,246,0.3); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .contact-card h2 { color: #60a5fa; margin-bottom: 30px; }
        .contact-item { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; }
        .contact-item i { font-size: 1.5rem; color: #60a5fa; width: 40px; text-align: center; }
        .contact-item p { margin: 0; font-size: 1rem; }
        .btn-home { margin-top: 20px; display: inline-block; color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
        .btn-home:hover { color: white; }
    </style>
</head>
<body>
    <div class="contact-card">
        <h2><i class="fas fa-paper-plane"></i> ช่องทางการติดต่อ</h2>
        
        <div class="contact-item">
            <i class="fas fa-envelope"></i>
            <div>
                <strong>อีเมลส่วนตัว/โรงเรียน</strong>
                <p>ratchapon@prot.ac.th</p>
            </div>
        </div>

        <div class="contact-item">
            <i class="fas fa-map-marker-alt"></i>
            <div>
                <strong>สถานที่ติดต่อ</strong>
                <p>ห้องปฏิบัติการคอมพิวเตอร์ อาคาร 3</p>
            </div>
        </div>

        <div class="contact-item">
            <i class="fab fa-facebook"></i>
            <div>
                <strong>Facebook Fanpage</strong>
                <p>วิทยาการคำนวณ By ครูรัชพล</p>
            </div>
        </div>

        <a href="index.html" class="btn-home"><i class="fas fa-home"></i> กลับหน้าหลัก</a>
    </div>
</body>
</html>
