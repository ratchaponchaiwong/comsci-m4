<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผลงานนักเรียน | PROT Smart Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; min-height: 100vh; color: white; background: #0f172a; }
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(59,130,246,0.3); }
        .logo { font-size: 1.5rem; font-weight: 700; color: #60a5fa; text-decoration: none; display: flex; align-items: center; gap: 10px;}
        .nav-links { display: flex; gap: 20px; list-style: none; align-items: center; }
        .nav-links a { text-decoration: none; color: #e2e8f0; font-weight: 500; transition: 0.3s; padding: 8px 15px; border-radius: 30px; }
        .nav-links a:hover, .nav-links a.active { color: #f59e0b; background: rgba(245,158,11,0.1); }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .header-title { text-align: center; margin-bottom: 40px; color: #f59e0b; font-size: 2.2rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .port-card { background: rgba(30, 41, 59, 0.7); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; display: flex; flex-direction: column; }
        .port-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(245,158,11,0.2); border-color: #f59e0b; }
        .port-img { width: 100%; height: 220px; object-fit: cover; background: #1e293b; border-bottom: 3px solid #f59e0b; }
        .port-info { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .port-title { font-size: 1.2rem; font-weight: 700; color: white; margin-bottom: 10px; }
        .port-desc { font-size: 0.9rem; color: #cbd5e1; line-height: 1.6; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo"><i class="fas fa-robot"></i> PROT Smart Workspace</a>
        <ul class="nav-links">
            <li><a href="index.html">หน้าหลัก</a></li>
            <li><a href="student.html">ห้องเรียนของฉัน</a></li>
            <li><a href="teacher_profile.html">ข้อมูลผู้สอน</a></li>
            <li><a href="student_portfolio.html" class="active">ผลงานนักเรียน</a></li>
        </ul>
    </header>

    <div class="container">
        <h2 class="header-title"><i class="fas fa-trophy"></i> แกลเลอรีผลงานนักเรียน</h2>
        <div id="loading" style="text-align: center; font-size: 1.2rem; color: #f59e0b;"><i class="fas fa-spinner fa-spin"></i> กำลังโหลดผลงาน...</div>
        <div class="grid" id="portfolio-grid"></div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby901YIN3KkAJXTItn_ySYqqecw4tT8rArbASqOa768Mpgah8XQjYX8jMVSj9w0VC6C/exec";
        
        window.onload = async () => {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL + "?action=getCMS&t=" + Date.now());
                const data = await res.json();
                const ports = data.portfolio || [];
                const grid = document.getElementById('portfolio-grid');
                
                if(ports.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:#94a3b8; font-size:1.1rem;">ยังไม่มีการอัปโหลดผลงานในขณะนี้</div>';
                } else {
                    grid.innerHTML = ports.map(p => `
                        <div class="port-card">
                            <img src="${p.img || 'https://via.placeholder.com/400x250?text=No+Image'}" class="port-img" onerror="this.src='https://via.placeholder.com/400x250?text=Image+Error'">
                            <div class="port-info">
                                <div class="port-title">${p.title}</div>
                                <div class="port-desc">${p.desc}</div>
                            </div>
                        </div>
                    `).join('');
                }
                document.getElementById('loading').style.display = 'none';
            } catch(e) {
                document.getElementById('loading').innerHTML = '<span style="color:#ef4444;">⚠️ ไม่สามารถดึงข้อมูลได้ในขณะนี้</span>';
            }
        };
    </script>
</body>
</html>
