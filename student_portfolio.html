<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผลงานและกิจกรรมโรงเรียน | PROT Smart Workspace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; min-height: 100vh; display: flex; flex-direction: column; cursor: default;}
        
        body[data-theme="default"] { background: linear-gradient(135deg, #0a0f2a 0%, #0f172a 50%, #1e293b 100%); color: white; }
        body[data-theme="snow"] { background: linear-gradient(135deg, #cfe3ff 0%, #e0f0ff 50%, #f0f8ff 100%); color: #1e293b; }
        body[data-theme="forest"] { background: linear-gradient(135deg, #1a3c1a 0%, #2d5a2d 50%, #3e7a3e 100%); color: white; }
        body[data-theme="halloween"] { background: linear-gradient(135deg, #1a0b1a 0%, #2d1a2d 50%, #401040 100%); color: white; }
        body[data-theme="love"] { background: linear-gradient(135deg, #ffb7c5 0%, #ff9eb0 50%, #ff85a0 100%); color: #1e293b; }

        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .bg-animation .circle { position: absolute; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0) 70%); border-radius: 50%; animation: float 20s infinite ease-in-out; }
        body[data-theme="snow"] .bg-animation .circle { background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 70%); }
        body[data-theme="forest"] .bg-animation .circle { background: radial-gradient(circle, rgba(144,238,144,0.2) 0%, rgba(144,238,144,0) 70%); }
        body[data-theme="love"] .bg-animation .circle { background: radial-gradient(circle, rgba(255,105,180,0.25) 0%, rgba(255,105,180,0) 70%); }
        @keyframes float { 0%, 100% { transform: translateY(0) translateX(0) scale(1); } 25% { transform: translateY(-30px) translateX(20px) scale(1.05); } 75% { transform: translateY(30px) translateX(-20px) scale(0.95); } }
        .bg-animation .circle:nth-child(1) { width: 400px; height: 400px; top: -100px; left: -100px; animation-duration: 25s; }
        .bg-animation .circle:nth-child(2) { width: 600px; height: 600px; bottom: -200px; right: -100px; animation-duration: 30s; animation-delay: -5s; }
        
        .content-layer { position: relative; z-index: 10; display: flex; flex-direction: column; flex: 1; }
        
        header { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(12px); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 15px;}
        body[data-theme="snow"] header, body[data-theme="love"] header { background: rgba(255, 255, 255, 0.6); border-bottom-color: rgba(0,0,0,0.1); }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa, #3b82f6); -webkit-background-clip: text; color: transparent; text-decoration: none; display: flex; align-items: center; gap: 10px;}
        
        .nav-links { display: flex; gap: 20px; list-style: none; align-items: center; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: #e2e8f0; font-weight: 500; transition: 0.3s; padding: 8px 15px; border-radius: 30px; font-size: 0.95rem;}
        body[data-theme="snow"] .nav-links a, body[data-theme="love"] .nav-links a { color: #2d3748; }
        .nav-links a:hover, .nav-links a.active { color: #fff; background: #3b82f6; box-shadow: 0 4px 10px rgba(59,130,246,0.3); }

        .page-content-wrapper { padding: 40px 20px; max-width: 1200px; margin: 0 auto; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 30px; }

        .section-title { font-size: 1.8rem; font-weight: 700; color: #60a5fa; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        body[data-theme="snow"] .section-title, body[data-theme="love"] .section-title { color: #3b82f6; }

        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.15); color: inherit; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        body[data-theme="snow"] .glass-card, body[data-theme="love"] .glass-card { background: rgba(255, 255, 255, 0.85); border-color: rgba(0,0,0,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .glass-card:hover { transform: translateY(-10px) scale(1.02); border-color: #3b82f6; box-shadow: 0 20px 40px rgba(0,0,0,0.25); }

        .img-container { overflow: hidden; position: relative; height: 200px; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .glass-card:hover .card-img { transform: scale(1.1); }
        
        .card-body { padding: 20px; display: flex; flex-direction: column; flex: 1; }
        .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; line-height: 1.4; transition: 0.3s; }
        .glass-card:hover .card-title { color: #60a5fa; }
        body[data-theme="snow"] .glass-card:hover .card-title, body[data-theme="love"] .glass-card:hover .card-title { color: #3b82f6; }
        
        .card-desc { font-size: 0.9rem; opacity: 0.8; margin-bottom: 20px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .card-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 15px; }
        body[data-theme="snow"] .card-footer, body[data-theme="love"] .card-footer { border-top-color: rgba(0,0,0,0.1); }
        
        .read-more { color: #60a5fa; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        body[data-theme="snow"] .read-more, body[data-theme="love"] .read-more { color: #3b82f6; }
        .post-date { opacity: 0.6; display: flex; align-items: center; gap: 5px; }

        footer { text-align: center; padding: 25px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto; font-size: 0.85rem; opacity: 0.8; }
        body[data-theme="snow"] footer, body[data-theme="love"] footer { border-top-color: rgba(0,0,0,0.1); }
    </style>
</head>
<body data-theme="default">
    <div class="bg-animation"><div class="circle"></div><div class="circle"></div></div>

    <div class="content-layer">
        <header>
            <a href="index.html" class="logo"><i class="fas fa-robot"></i> PROT Smart Workspace</a>
            <ul class="nav-links">
                <li><a href="index.html">หน้าหลัก</a></li>
                <li><a href="student.html">ห้องเรียนของฉัน</a></li>
                <li><a href="student_portfolio.html" class="active">ผลงานนักเรียน</a></li>
            </ul>
        </header>

        <div class="page-content-wrapper">
            <h2 class="section-title"><i class="fas fa-images"></i> อัปเดตผลงานล่าสุด</h2>
            <div id="loading" style="text-align: center; padding: 60px; font-size: 1.2rem; opacity: 0.8;">
                <i class="fas fa-spinner fa-spin"></i> กำลังดึงข้อมูลจากฐานข้อมูล...
            </div>
            <div class="portfolio-grid" id="portfolioContainer"></div>
        </div>

        <footer>
            <p><i class="fas fa-copyright"></i> 2026 ห้องเรียนวิทยาการคำนวณ By ครูรัชพล</p>
        </footer>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby901YIN3KkAJXTItn_ySYqqecw4tT8rArbASqOa768Mpgah8XQjYX8jMVSj9w0VC6C/exec";
        
        function escapeHtml(text) {
            if(!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadPortfolios() {
            try {
                const response = await fetch(`${SCRIPT_URL}?action=readAll`);
                const data = await response.json();
                
                const container = document.getElementById('portfolioContainer');
                document.getElementById('loading').style.display = 'none';

                if (!data.portfolios || data.portfolios.length === 0) {
                    container.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 60px; opacity: 0.8;">ไม่มีข้อมูลผลงาน/กิจกรรม</div>`;
                    return;
                }

                container.innerHTML = data.portfolios.reverse().map((item, index) => `
                    <div class="glass-card" style="animation: fadeInUp 0.5s ease-out ${index * 0.05}s both;">
                        <div class="img-container">
                            <img src="${item.ImageLink || item.image_link}" class="card-img" onerror="this.src='https://via.placeholder.com/600x400?text=No+Image'">
                        </div>
                        <div class="card-body">
                            <h3 class="card-title">${escapeHtml(item.Title || item.title)}</h3>
                            <p class="card-desc">${escapeHtml(item.Description || item.desc || 'ไม่มีคำอธิบายเพิ่มเติม')}</p>
                            <div class="card-footer">
                                <span class="read-more">อ่านเพิ่ม <i class="fas fa-chevron-right"></i></span>
                                <span class="post-date"><i class="far fa-calendar-alt"></i> ${item.Date || item.date || '-'}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                document.getElementById('loading').innerHTML = `<span style='color:#ef4444;'><i class="fas fa-exclamation-triangle"></i> ดึงข้อมูลไม่สำเร็จ</span>`;
            }
        }
        
        window.onload = () => {
            const savedTheme = localStorage.getItem('smart_theme') || "default";
            document.body.setAttribute('data-theme', savedTheme);
            loadPortfolios();
        };
    </script>
</body>
</html>
