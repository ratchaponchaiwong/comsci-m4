<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>วิชาเพิ่มเติม | PROT Smart Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', 'Inter', sans-serif; transition: background 0.5s ease; min-height: 100vh; color: white; background: #0f172a; }
        header { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(59,130,246,0.3); }
        .logo { font-size: 1.5rem; font-weight: 700; color: #60a5fa; text-decoration: none; display: flex; align-items: center; gap: 10px;}
        .nav-links { display: flex; gap: 20px; list-style: none; align-items: center; }
        .nav-links a { text-decoration: none; color: #e2e8f0; font-weight: 500; transition: 0.3s; padding: 8px 15px; border-radius: 30px; }
        .nav-links a:hover, .nav-links a.active { color: #10b981; background: rgba(16,185,129,0.1); }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .header-title { text-align: center; margin-bottom: 40px; color: #10b981; font-size: 2.2rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .subj-card { background: rgba(30, 41, 59, 0.7); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; border-top: 5px solid #10b981;}
        .subj-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(16,185,129,0.2); }
        .subj-img { width: 100%; height: 180px; object-fit: cover; background: #1e293b; }
        .subj-info { padding: 25px; }
        .subj-code { background: rgba(16,185,129,0.2); color: #10b981; padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        .subj-title { font-size: 1.3rem; font-weight: 700; color: white; line-height: 1.4; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo"><i class="fas fa-robot"></i> PROT Smart Workspace</a>
        <ul class="nav-links">
            <li><a href="index.html">หน้าหลัก</a></li>
            <li><a href="student.html">ห้องเรียนของฉัน</a></li>
            <li><a href="extra_subjects.html" class="active">วิชาเพิ่มเติม</a></li>
        </ul>
    </header>

    <div class="container">
        <h2 class="header-title"><i class="fas fa-book"></i> รายวิชาเพิ่มเติมที่เปิดสอน</h2>
        <div id="loading" style="text-align: center; font-size: 1.2rem; color: #10b981;"><i class="fas fa-spinner fa-spin"></i> กำลังโหลดข้อมูล...</div>
        <div class="grid" id="subjects-grid"></div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby901YIN3KkAJXTItn_ySYqqecw4tT8rArbASqOa768Mpgah8XQjYX8jMVSj9w0VC6C/exec";
        
        window.onload = async () => {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL + "?action=getCMS&t=" + Date.now());
                const data = await res.json();
                const subjs = data.subjects || [];
                const grid = document.getElementById('subjects-grid');
                
                if(subjs.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:#94a3b8; font-size:1.1rem;">ยังไม่มีการเปิดสอนวิชาเพิ่มเติมในขณะนี้</div>';
                } else {
                    grid.innerHTML = subjs.map(s => `
                        <div class="subj-card">
                            <img src="${s.img || 'https://via.placeholder.com/400x200?text=Subject'}" class="subj-img" onerror="this.src='https://via.placeholder.com/400x200?text=Image+Error'">
                            <div class="subj-info">
                                <div class="subj-code"><i class="fas fa-barcode"></i> รหัสวิชา: ${s.code}</div>
                                <div class="subj-title">${s.title}</div>
                            </div>
                        </div>
                    `).join('');
                }
                document.getElementById('loading').style.display = 'none';
            } catch(e) {
                document.getElementById('loading').innerHTML = '<span style="color:#ef4444;">⚠️ ไม่สามารถดึงข้อมูลได้ในขณะนี้</span>';
            }
        };
    </script>
</body>
</html>
